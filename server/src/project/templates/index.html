<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="stylesheet" href="../static/css/main.css" />
        <title>Globalify</title>

    <body class="w-full bg-black text-white">
        <nav class="absolute left-0 top-0 flex h-24 w-full items-center justify-between px-9">
            <img class="h-[30px] w-[113px]" src="../static/elements/globalify.png" />
            <a href="/login" class="flex items-center justify-center">

                <div class="relative h-5 w-5">
                    <img class="w-50 h-5" src="../static/elements/arrow-right-alt.svg" />

        </nav>
        <main class="relative mt-24 flex w-full flex-col justify-center overflow-x-hidden text-white">
            <div class="flex flex-col items-center justify-center gap-6">

                <div class="flex max-w-[700px] text-center text-2xl text-stone-300">
                    Search for investors from all around the world on Globalify. Lorem ipsum dolor sit amet.
                </div>
                <a href="/register" class="flex h-10 w-48 items-center justify-center rounded-md bg-sky-400">
                    <div class="flex text-base font-medium">Find investors now!</div>
                </a>

            <div class="flex-col items-center justify-center gap-2.5 bg-white py-24 text-black">

                    <div class="max-w-[800px] text-center text-8xl">Tailored experience for specific regions</div>
                    <div class="max-w-[800px] text-center text-2xl text-stone-400">

                    <div class="inline-flex items-center justify-center gap-6">
                        <div class="relative h-[147px] w-[173px]">
                            <img src="../static/elements/jp.svg" alt="" />
                        </div>
                        <div class="relative h-[103px] w-[188px]">
                            <img src="../static/elements/kg.svg" alt="" />
                        </div>
                        <div class="relative h-[84px] w-[171px]">
                            <img src="../static/elements/kz.svg" alt="" />
                        </div>
                        <div class="relative h-[127px] w-[162px]">
                            <img src="../static/elements/hk.svg" alt="" />
                        </div>
                    </div>
                </div>
            </div>
            <div class="my-28 flex flex-col items-center justify-center gap-[51px] text-white">
                <div class="text-8xl">The team</div>
                <div class="flex flex-col items-start justify-center gap-[30px] xl:flex-row">
                    <div class="inline-flex flex-col items-start justify-start">
                        <div class="mb-1.5 h-[337px] w-[320px] bg-zinc-300"></div>
                        <div class="text-3xl">Eric Fung</div>
                        <div class="text-2xl text-stone-300">COO</div>
                    </div>
                    <div class="inline-flex flex-col items-start justify-start">
                        <div class="mb-1.5 h-[337px] w-[320px] bg-zinc-300"></div>
                        <div class="text-3xl">Arisa Ueno</div>
                        <div class="text-2xl text-stone-300">CEO</div>
                    </div>
                    <div class="inline-flex flex-col items-start justify-start">
                        <div class="mb-1.5 h-[337px] w-[320px] bg-zinc-300"></div>
                        <div class="text-3xl">Arstanbek Usenov</div>
                        <div class="text-2xl text-stone-300">CTO</div>
                    </div>
                </div>
