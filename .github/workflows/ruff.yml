name: Ruff

on:
    pull_request_review:
        types: [submitted]
    issue_comment:
        types: [created]

jobs:
    run-ruff:
        if: (github.event_name == 'pull_request_review' || (github.event_name == 'issue_comment' && github.event.comment.body == '/ruff')) && github.event.issue.pull_request
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: ["3.12"]
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v3
              with:
                  python-version: ${{ matrix.python-version }}
            - name: Install poetry
              uses: abatilo/actions-poetry@v2

            - name: Define a cache for the virtual environment based on the dependencies lock file
              uses: actions/cache@v3
              with:
                  path: ./.venv
                  key: venv-${{ hashFiles('poetry.lock') }}

            - name: Install dependencies
              run: poetry install --with dev

            - name: Comment PR
              uses: actions/github-script@v5
              with:
                  script: |
                      const issue_number = context.issue.number;
                      github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: issue_number,
                        body: 'Starting Ruff...'
                      });

            - name: Running Ruff linter
              run: |
                  poetry run ruff check --fix || echo "Ruff check made changes" > ruff-status

            - name: Running Ruff formatter
              run: |
                  poetry run ruff format || echo "Ruff format made changes" > ruff-status

            - name: Commit and push if needed
              run: |
                  git diff
                  git config --global user.email "actions@github.com"
                  git config --global user.name "GitHub Action"
                  git commit -am "Apply ruff fixes" || exit 0
                  git push

            - name: Comment PR
              uses: actions/github-script@v5
              with:
                  script: |
                      const issue_number = context.issue.number;
                      let ruff_status = 'Ruff completed without making changes.';
                      if (fs.existsSync('ruff-status')) {
                        ruff_status = fs.readFileSync('ruff-status', 'utf8');
                      }
                      github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: issue_number,
                        body: ruff_status
                      });
