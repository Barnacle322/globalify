{% macro render(industries, rounds) %}
<template id="investment-info-template">
    <div class="mx-auto flex h-full w-full max-w-xl flex-col gap-9 overflow-y-auto sm:justify-center">
        <div class="flex flex-col gap-2">
            <h1 class="text-3xl font-medium">Step 2 of 3: Investment Info</h1>
            <span class="">Tell us more about your investments</span>
        </div>
        <div class="grid grid-cols-6 gap-x-2 gap-y-1">
            <div class="relative col-span-full sm:col-span-3">
                <label class="text-sm font-medium text-gray-700" for="rounds">Rounds</label>
                <button
                    class="flex w-full items-center justify-center gap-1 rounded-xl border border-gray-500 bg-white px-2 py-3 text-sm ease-in-out group-has-[:checked]:border-sky-500"
                    id="round-options"
                    aria-haspopup="true"
                    aria-expanded="true"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="h-5 w-5"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"
                        />
                    </svg>
                    Rounds
                </button>
                <div class="relative">
                    <div
                        class="pointer-events-none absolute left-0 z-50 mt-2 max-h-60 w-full origin-top-right scale-95 overflow-y-auto overscroll-y-contain rounded-md bg-white opacity-0 shadow-lg transition duration-100 ease-in-out"
                        id="round-options-menu"
                        role="menu"
                        aria-orientation="vertical"
                        aria-labelledby="round-options-menu"
                    >
                        <div class="py-1" role="none">
                            {% for round in rounds %}
                            <label
                                class="flex w-full cursor-pointer items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 hover:text-gray-900"
                                role="menuitem"
                            >
                                <input
                                    type="checkbox"
                                    name="selected_rounds"
                                    class="form-checkbox mr-3 h-5 w-5 rounded-md border-2 border-slate-200 text-sky-500"
                                    value="{{ round.id }}"
                                    v-model="data.selectedRounds"
                                />
                                {{ round.name }}
                            </label>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>
            <div class="relative col-span-full sm:col-span-3">
                <label class="text-sm font-medium text-gray-700" for="location">Industries</label>
                <button
                    class="flex w-full items-center justify-center gap-1 rounded-xl border border-gray-500 bg-white px-2 py-3 text-sm ease-in-out group-has-[:checked]:border-sky-500"
                    id="industry-options"
                    aria-haspopup="true"
                    aria-expanded="true"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="h-5 w-5"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M2.25 7.125C2.25 6.504 2.754 6 3.375 6h6c.621 0 1.125.504 1.125 1.125v3.75c0 .621-.504 1.125-1.125 1.125h-6a1.125 1.125 0 01-1.125-1.125v-3.75zM14.25 8.625c0-.621.504-1.125 1.125-1.125h5.25c.621 0 1.125.504 1.125 1.125v8.25c0 .621-.504 1.125-1.125 1.125h-5.25a1.125 1.125 0 01-1.125-1.125v-8.25zM3.75 16.125c0-.621.504-1.125 1.125-1.125h5.25c.621 0 1.125.504 1.125 1.125v2.25c0 .621-.504 1.125-1.125 1.125h-5.25a1.125 1.125 0 01-1.125-1.125v-2.25z"
                        />
                    </svg>
                    Industries
                </button>
                <div
                    class="pointer-events-none absolute left-0 z-50 mt-2 max-h-60 w-full origin-top-right scale-95 overflow-y-auto overscroll-y-contain rounded-md bg-white opacity-0 shadow-lg transition duration-100 ease-in-out"
                    id="industry-options-menu"
                    role="menu"
                    aria-orientation="vertical"
                    aria-labelledby="industry-options-menu"
                >
                    <input
                        type="text"
                        id="search-industries"
                        placeholder="Search industries..."
                        class="sticky top-0 w-full rounded-md border bg-white px-3 py-2"
                        @input="searchIndustryList"
                    />
                    <div class="py-1" role="none" ref="industryListElement">
                        {% for category, industries_list in industries.items() %}
                        <label
                            class="flex items-center px-4 py-2 text-base text-gray-700 hover:bg-gray-100 hover:text-gray-900"
                        >
                            {{ category }}
                        </label>
                        {% for industry in industries_list %}
                        <label
                            class="flex w-full cursor-pointer items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 hover:text-gray-900"
                            role="menuitem"
                        >
                            <input
                                type="checkbox"
                                name="selected_industries"
                                value="{{ industry.id }}"
                                class="form-checkbox mr-3 h-5 w-5 rounded-md border-2 border-slate-200 text-sky-500"
                                v-model="data.selectedIndustries"
                            />
                            <span>{{ industry.name }}</span>
                        </label>
                        {% endfor %} {% endfor %}
                    </div>
                </div>
            </div>
            <div class="relative col-span-full">
                <label class="text-sm font-medium text-gray-700">Notable Investments</label>
                <button
                    class="flex w-full items-center justify-center gap-1 rounded-xl border border-gray-500 bg-white px-2 py-3 text-sm ease-in-out group-has-[:checked]:border-sky-500"
                    id="notable-investment-options"
                    aria-haspopup="true"
                    aria-expanded="true"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-5"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.277-4.216.42-6.378.42s-4.291-.143-6.378-.42c-1.085-.144-1.872-1.086-1.872-2.18v-4.25m16.5 0a2.18 2.18 0 0 0 .75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 0 0-3.413-.387m4.5 8.006c-.194.165-.42.295-.673.38A23.978 23.978 0 0 1 12 15.75c-2.648 0-5.195-.429-7.577-1.22a2.016 2.016 0 0 1-.673-.38m0 0A2.18 2.18 0 0 1 3 12.489V8.706c0-1.081.768-2.015 1.837-2.175a48.111 48.111 0 0 1 3.413-.387m7.5 0V5.25A2.25 2.25 0 0 0 13.5 3h-3a2.25 2.25 0 0 0-2.25 2.25v.894m7.5 0a48.667 48.667 0 0 0-7.5 0M12 12.75h.008v.008H12v-.008Z"
                        />
                    </svg>
                    Notable Investments
                </button>
                <div
                    class="z-49 pointer-events-none absolute left-0 mt-2 max-h-60 w-full origin-top-right scale-95 overflow-y-auto rounded-md bg-white opacity-0 shadow-lg transition duration-100 ease-in-out"
                    id="notable-investment-options-menu"
                    role="menu"
                    aria-orientation="vertical"
                    aria-labelledby="notable-investment-options-menu"
                >
                    <input
                        type="text"
                        id="search-notable-investments"
                        ref="searchInput"
                        placeholder="Search notable investments..."
                        class="sticky top-0 w-full rounded-md border bg-white px-3 py-2"
                        @input="debouncedFetchNotableInvestmentList($event)"
                    />
                    <div
                        role="none"
                        ref="notableInvestmentListElement"
                        v-for="(notableInvestment, index) in data.notableInvestmentList"
                        :key="index"
                    >
                        <label
                            class="flex w-full cursor-pointer items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 hover:text-gray-900"
                            role="menuitem"
                        >
                            <input
                                type="checkbox"
                                name="selected_notable_investments"
                                :value="notableInvestment.id"
                                class="form-checkbox mr-3 h-5 w-5 rounded-md border-2 border-slate-200 text-sky-500"
                                v-model="data.selectedNotableInvestments"
                            />
                            <span v-text="notableInvestment.name"></span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="col-span-full sm:col-span-3">
                <label class="text-sm font-medium text-gray-700" for="n_investments">№ Investments</label>
                <input
                    class="w-full rounded-lg bg-transparent bg-white"
                    type="number"
                    id="n_investments"
                    placeholder="14"
                    v-model.number="data.nInvestments"
                />
                <span v-if="errors.nInvestments" class="text-sm text-red-500" v-text="errors.nInvestments"></span>
            </div>
            <div class="col-span-full sm:col-span-3">
                <label class="text-sm font-medium text-gray-700" for="n_exits">№ Exits</label>
                <input
                    class="w-full rounded-lg bg-transparent bg-white"
                    type="number"
                    id="n_exits"
                    placeholder="5"
                    v-model.number="data.nExits"
                />
                <span v-if="errors.nExits" class="text-sm text-red-500" v-text="errors.nExits"></span>
            </div>
            <div class="col-span-full sm:col-span-3">
                <label class="text-sm font-medium text-gray-700" for="min_investment">Minimum Investment ($)</label>
                <input
                    class="w-full rounded-lg bg-transparent bg-white"
                    type="number"
                    id="min_investment"
                    placeholder="10000"
                    v-model.number="data.minInvestment"
                />
                <span v-if="errors.minInvestment" class="text-sm text-red-500" v-text="errors.minInvestment"></span>
            </div>
            <div class="col-span-full sm:col-span-3">
                <label class="text-sm font-medium text-gray-700" for="max_investment">Maximum Investment ($)</label>
                <input
                    class="w-full rounded-lg bg-transparent bg-white"
                    type="number"
                    id="max_investment"
                    placeholder="1000000"
                    v-model.number="data.maxInvestment"
                />
                <span v-if="errors.maxInvestment" class="text-sm text-red-500" v-text="errors.maxInvestment"></span>
            </div>
        </div>
        <div class="flex justify-between">
            <button
                class="mt-4 w-fit rounded-md bg-gray-300 px-3 py-2 text-black hover:bg-gray-400 hover:text-gray-800"
                @click="previousPage"
            >
                <div class="flex items-center gap-2">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-5"
                    >
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                    </svg>
                    <span>Back</span>
                </div>
            </button>
            <button class="mt-4 w-fit rounded-md bg-gray-500 px-3 py-2 text-white hover:bg-gray-700" @click="nextPage">
                <div class="flex items-center gap-2">
                    <span> Continue </span>
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-5"
                    >
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
                    </svg>
                </div>
            </button>
        </div>
    </div>
</template>
{% endmacro %}
