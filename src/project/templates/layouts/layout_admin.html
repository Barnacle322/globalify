<!doctype html>
<html lang="en" class="scroll-pt-12">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}Admin{% endblock %} · Globalify</title>
        <meta name="robots" content="noindex, nofollow" />

        <link rel="stylesheet" href="/static/css/main.css" />
        {% include "partials/_favicons.html" %}
        <link rel="preload" href="/static/elements/fonts/Poppins-Regular.ttf" as="font" type="font/ttf" crossorigin />
        <link rel="preload" href="/static/elements/fonts/fraunces-600.woff2" as="font" type="font/woff2" crossorigin />
        <link rel="preload" href="/static/elements/fonts/space-mono-400.woff2" as="font" type="font/woff2" crossorigin />
        <script src="/static/scripts/menu.js" defer></script>
        {% block head_extra %}{% endblock %}
    </head>
    <body class="font-poppins w-full bg-paper text-ink">
        {# ── Admin top bar (server-rendered; replaces the removed Vue shell) ── #}
        <header class="sticky top-0 z-50 w-full border-b border-rule bg-paper/95 backdrop-blur">
            <div class="mx-auto flex h-16 w-full max-w-8xl items-center justify-between px-5 sm:px-9">
                <div class="flex items-baseline gap-2">
                    <a href="/" class="flex items-baseline gap-0.5" aria-label="Globalify home">
                        <span class="font-display text-2xl font-semibold tracking-tight text-ink">Globalify</span>
                        <sup class="font-mono text-[9px] font-bold tracking-widest text-brand">DB</sup>
                    </a>
                    <span class="rounded-full border border-rule bg-panel px-2 py-0.5 font-mono text-[10px] uppercase tracking-[0.08em] text-soft">Admin</span>
                </div>
                <a href="/" class="font-mono text-[11px] uppercase tracking-[0.08em] text-soft transition-colors hover:text-brand">View site</a>
            </div>
        </header>
        <div class="mx-auto w-full max-w-8xl">
            {% block content %}{% endblock %}
        </div>
        {% block scripts %}{% endblock %}
    </body>
</html>
