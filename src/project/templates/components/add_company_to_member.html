{% macro render(user, companies_in_user) %}
<template id="add-company-template">
    <article
        class="fixed top-0 right-0 z-50 flex h-full w-full flex-col gap-4 bg-white p-8 sm:top-1/2 sm:right-1/2 sm:h-auto sm:max-w-2xl sm:translate-x-1/2 sm:-translate-y-1/2 sm:rounded-xl"
    >
        <button class="absolute top-3 right-3" @click="close">
            <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-6"
            >
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
        </button>

        <span class="font-medium">Add a company to a user</span>
        <div class="flex h-full flex-col gap-2">
            <label class="font-medium" for="email">Search company*</label>
            <div
                class="relative flex w-full items-center gap-4 rounded-xl border-2 border-sky-300 bg-sky-200 p-2 text-start text-sky-500"
                v-if="selectedCompany"
            >
                <img
                    class="size-12 rounded-lg"
                    v-if="selectedCompany.id"
                    :src="selectedCompany.picture_url ? selectedCompany.picture_url : '/static/elements/pfp_placeholder.jpeg'"
                    alt=""
                />
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="size-6"
                    v-else
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"
                    />
                </svg>
                <div>
                    <div class="flex items-center gap-2">
                        <h3 class="text-md font-semibold" v-text="selectedCompany.name"></h3>
                    </div>
                </div>
                <button class="absolute right-3" @click="clearUser">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-6"
                    >
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <input
                type="text"
                ref="searchInput"
                class="w-full rounded-xl border-2 border-stone-300"
                @input="debouncedGetCompanyList"
                placeholder="Apple"
                v-else
            />
            <ul class="max-h-60 space-y-2 overflow-y-auto">
                <li
                    class="flex w-full cursor-pointer items-center gap-4 rounded-xl border-2 border-stone-300 p-2 text-start hover:bg-stone-100"
                    v-if="companyList.length > 0"
                    v-for="(company, index) in companyList"
                    @click="selectCompany(company, $event)"
                    :class="{ 'pointer-events-none opacity-60': {{ companies_in_user }}.includes(company.id) }"
                >
                    <img
                        class="size-12 rounded-lg"
                        v-if="company.id"
                        :src="company.picture_url ? user.picture_url : '/static/elements/pfp_placeholder.jpeg'"
                        alt=""
                    />
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-6"
                        v-else
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"
                        />
                    </svg>
                    <div>
                        <div class="flex items-center gap-2">
                            <h3 class="text-md font-semibold" v-text="company.name"></h3>
                            <span
                                v-if="{{ companies_in_user }}.includes( company.id )"
                                class="text-sm text-gray-500 italic"
                            >
                                already a member
                            </span>
                        </div>
                        <p class="text-gray-500">Choose company</p>
                    </div>
                </li>
            </ul>
            <label class="font-medium" for="role">Select a role*</label>
            <select class="w-full rounded-xl border-2 border-stone-300" v-model="data.role">
                <option class="text-gray-500" disabled selected value>Select a role</option>
                <option
                    v-for="role in roles"
                    v-text="role[0].toUpperCase() + role.slice(1)"
                    :value="role.toUpperCase()"
                ></option>
            </select>
            <label class="font-medium" for="position">Position</label>
            <input
                class="w-full rounded-xl border-2 border-stone-300"
                placeholder="CEO"
                v-model="data.position"
                @input="limitPositionText"
                @blur="data.position = data.position.trim()"
            />
            <label class="inline-flex cursor-pointer items-center pt-2">
                <input class="peer sr-only" type="checkbox" v-model="data.is_primary" />
                <div
                    class="peer relative h-6 w-11 rounded-full bg-gray-200 peer-checked:bg-sky-500 peer-focus:ring-4 peer-focus:ring-blue-300 peer-focus:outline-hidden after:absolute after:start-[2px] after:top-[2px] after:h-5 after:w-5 after:rounded-full after:border after:border-gray-300 after:bg-white after:transition-all after:content-[''] peer-checked:after:translate-x-full peer-checked:after:border-white"
                ></div>
                <span class="ms-3 text-sm font-medium text-gray-900">Is primary</span>
            </label>
            <label class="inline-flex cursor-pointer items-center pt-2">
                <input class="peer sr-only" type="checkbox" v-model="data.is_public" />
                <div
                    class="peer relative h-6 w-11 rounded-full bg-gray-200 peer-checked:bg-sky-500 peer-focus:ring-4 peer-focus:ring-blue-300 peer-focus:outline-hidden after:absolute after:start-[2px] after:top-[2px] after:h-5 after:w-5 after:rounded-full after:border after:border-gray-300 after:bg-white after:transition-all after:content-[''] peer-checked:after:translate-x-full peer-checked:after:border-white"
                ></div>
                <span class="ms-3 text-sm font-medium text-gray-900">Is public</span>
            </label>

            <button
                class="mt-auto w-full rounded-xl bg-sky-400 px-3 py-2 text-white disabled:bg-gray-300 sm:mt-3"
                @click="addCompany({{ user.id }})"
            >
                Add
            </button>
        </div>
    </article>
</template>
{% endmacro %}
