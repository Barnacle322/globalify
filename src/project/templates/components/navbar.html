{% macro render(user) %}
<!-- prettier-ignore -->
{% import "components/aside.html" as aside %} 
{{ aside.render(user) }} 
{% import "components/aside_mobile.html" as aside_mobile %} 
{{ aside_mobile.render(user) }}
{% import "components/bookmark.html" as bookmark %} 
{{ bookmark.render(user) }}

<template id="navbar-template">
    <header class="sticky top-0 z-20 w-full bg-white">
        <nav class="mx-auto grid h-20 w-full max-w-8xl grid-cols-2 items-center border-b px-6 sm:grid-cols-2">
            <div class="flex items-center gap-4">
                <button @click="expandAside" class="w-fit text-lg font-medium">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="block size-5"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
                        />
                    </svg>
                </button>
                <a href="/search" class="relative flex items-center gap-1">
                    <img class="hidden h-6 lg:block" src="/static/elements/logo-black.png" alt="" />
                    <div
                        class="hidden h-fit w-fit rounded-full bg-sky-500 px-1 py-1 text-[8px] font-medium leading-none tracking-tight text-white lg:block"
                    >
                        BETA
                    </div>
                </a>
            </div>
            {% if user %}

            <!-- <div class="relative hidden w-full max-w-5xl justify-self-center sm:block">
                <div id="searchbox" class="peer"></div>
                <div
                    id="hits"
                    class="pointer-events-none absolute left-1/2 top-10 w-full -translate-x-1/2 opacity-0 transition-opacity ease-in-out hover:pointer-events-auto hover:opacity-100 peer-has-[:focus]:pointer-events-auto peer-has-[:focus]:opacity-100"
                ></div>
            </div> -->

            <div class="flex gap-5 justify-self-end">
                <div class="flex items-center justify-center gap-4">
                    <div class="flex items-center justify-center gap-2">
                        <div class="relative">
                            <transition enter-active-class="animate-zoom-in" leave-active-class="animate-zoom-out">
                                <bookmark
                                    v-if="bookmarksOpened"
                                    ref="bookmark"
                                    @closebookmarks="bookmarksOpened = false"
                                ></bookmark>
                            </transition>

                            <button @click="bookmarksOpened ? closeBookmark() : openBookmark()" class="flex">
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                    class="size-6"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z"
                                    />
                                </svg>
                            </button>
                        </div>
                    </div>
                    {% if user.user_info.picture_url %}
                    <img
                        src="{{ user.user_info.picture_url }}"
                        class="size-8 rounded-full border border-gray-200 bg-gray-50"
                    />
                    {% else %}
                    <img
                        src="/static/elements/pfp_placeholder.jpeg"
                        class="size-8 rounded-full border border-gray-200 bg-gray-50"
                    />
                    {% endif %}
                </div>
            </div>
            {% endif %}
        </nav>
    </header>
</template>
{% endmacro %}
