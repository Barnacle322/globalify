{% macro render(user) %}
<template id="contact-info-template">
    <div class="mx-auto mt-4 flex h-full w-full max-w-xl flex-col gap-9 overflow-y-auto p-4 sm:justify-center">
        <input type="hidden" ref="userEmail" value="{{ user.email }}" />

        <div class="flex flex-col gap-2">
            <h1 class="text-3xl font-medium">Step 3 of 3: Contact info</h1>
            <span class="">Let's connect, how can people reach out to you? </span>
        </div>
        <div class="grid grid-cols-6 gap-x-2 gap-y-1">
            <div class="col-span-full">
                <label class="text-sm font-medium text-gray-700" for="website">Website</label>
                <input
                    class="w-full rounded-lg bg-transparent bg-white"
                    type="text"
                    id="website"
                    placeholder="https://www.acme.com"
                    v-model="data.website"
                />
                <span v-if="errors.website" class="text-sm text-red-500" v-text="errors.website"></span>
            </div>
            <div class="col-span-full">
                <label class="text-sm font-medium text-gray-700" for="linkedin">Linkedin</label>
                <input
                    class="w-full rounded-lg bg-transparent bg-white"
                    type="text"
                    id="linkedin"
                    placeholder="https://www.linkedin.com/in/johndoe"
                    v-model="data.linkedin"
                />
                <span v-if="errors.linkedin" class="text-sm text-red-500" v-text="errors.linkedin"></span>
            </div>
            <div class="col-span-full">
                <label class="text-sm font-medium text-gray-700" for="twitter">Twitter</label>
                <input
                    class="w-full rounded-lg bg-transparent bg-white"
                    type="text"
                    id="twitter"
                    placeholder="https://twitter.com/johndoe"
                    v-model="data.twitter"
                />
                <span v-if="errors.twitter" class="text-sm text-red-500" v-text="errors.twitter"></span>
            </div>
            <div class="col-span-full sm:col-span-3">
                <label class="text-sm font-medium text-gray-700" for="email">Email</label>
                <input
                    class="w-full rounded-lg bg-transparent bg-white"
                    type="text"
                    id="email"
                    placeholder="johndoe@gmail.com"
                    v-model="data.email"
                />
                <span v-if="errors.email" class="text-sm text-red-500" v-text="errors.email"></span>
            </div>
            <div class="col-span-full sm:col-span-3">
                <label class="text-sm font-medium text-gray-700" for="phone_number">Phone Number</label>
                <input
                    class="w-full rounded-lg bg-transparent bg-white"
                    type="text"
                    id="phone_number"
                    placeholder="+1 123 456 7890"
                    v-model="data.phoneNumber"
                />
                <span v-if="errors.phoneNumber" class="text-sm text-red-500" v-text="errors.phoneNumber"></span>
            </div>
        </div>
        <div class="flex items-center justify-between">
            <button
                class="mt-4 w-fit rounded-md bg-gray-300 px-3 py-2 text-black hover:bg-gray-400 hover:text-gray-800"
                @click="previousPage"
            >
                <div class="flex items-center gap-2">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-5"
                    >
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                    </svg>
                    <span>Back</span>
                </div>
            </button>
            <button
                class="mt-4 w-fit rounded-md bg-gray-500 px-3 py-2 text-white hover:bg-gray-700"
                @click="submitRegistrationData"
            >
                <div class="flex items-center gap-2">
                    <span> Submit</span>
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-5"
                    >
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
                    </svg>
                </div>
            </button>
        </div>
    </div>
</template>
{% endmacro %}
