{% macro render(user) %}
<template id="full-company-template">
    <article
        class="fixed right-0 top-0 z-50 flex h-full w-full flex-col overflow-y-scroll bg-white transition-all"
        :class="isExpanded ? 'md:w-full lg:w-full 2xl:w-full' : 'md:w-4/5 md:rounded-l-3xl lg:w-2/3 2xl:w-1/2'"
    >
        <div v-if="isLoading" class="grid h-full w-full place-content-center">
            <svg class="size-6 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path
                    class="opacity-75"
                    fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                ></path>
            </svg>
        </div>

        <div v-else>
            <nav class="sticky right-0 top-0 z-10 flex w-full items-center justify-between bg-white px-7 py-4">
                <button
                    @click="toggleExpansion"
                    class="hidden rounded-lg p-1 transition-colors duration-75 ease-in-out hover:bg-gray-50 md:block"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-5"
                        v-if="!isExpanded"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"
                        />
                    </svg>
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-5"
                        v-else
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M9 9V4.5M9 9H4.5M9 9 3.75 3.75M9 15v4.5M9 15H4.5M9 15l-5.25 5.25M15 9h4.5M15 9V4.5M15 9l5.25-5.25M15 15h4.5M15 15v4.5m0-4.5 5.25 5.25"
                        />
                    </svg>
                </button>
                <button
                    @click="closeCompany"
                    class="ml-auto flex aspect-square h-full items-center justify-center rounded-lg p-1 transition-colors duration-75 ease-in-out hover:bg-gray-50"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-6"
                    >
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                    </svg>
                </button>
            </nav>
            <main class="mx-auto flex min-h-screen flex-col items-center gap-5 px-4 pb-16 pt-5 sm:px-9">
                <section class="flex w-full max-w-7xl items-center justify-between">
                    <div class="flex w-full max-w-7xl items-center gap-4">
                        <input type="hidden" id="csrf_token" name="csrf_token" value="{{ csrf_token() }}" />
                        <img
                            v-if="company.twitter"
                            class="shadow-card h-20 rounded-lg"
                            src="https://unavatar.io/twitter/company.twitter.split('/')[-1]"
                            alt=""
                            loading="lazy"
                        />

                        <h1 class="text-4xl font-semibold" v-text="company.name"></h1>
                        <button id="'bookmark-icon-company-' + company.id" @click="toggleCompanyBookmark(company.id)">
                            <svg
                                :id="'bookmark-svg-company-' + company.id"
                                :fill="bookmark ? '#FFC9FC' : 'none'"
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 23 23"
                                stroke-width="1.5"
                                stroke="currentColor"
                                class="h-7 w-7 ml-2"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z"
                                />
                            </svg>
                        </button>
                    </div>
                </section>
                <section
                    v-if="company.country || company.description"
                    class="grid w-full max-w-7xl grid-cols-1 gap-4 md:grid-cols-2"
                >
                    <article class="shadow-card w-full rounded-xl bg-white p-5">
                        <h2 class="text-xl font-medium">General</h2>
                        <div class="mt-5 flex flex-col gap-2 text-sm">
                            <div v-if="company.country" class="grid grid-cols-2">
                                <span class="inline-flex items-center gap-1 font-medium">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        fill="none"
                                        viewBox="0 0 24 24"
                                        stroke-width="1.5"
                                        stroke="currentColor"
                                        class="size-5"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
                                        />
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"
                                        />
                                    </svg>
                                    Location:
                                </span>
                                <span class="text-gray-700" v-text="company.country"></span>
                            </div>
                            <p class="mt-3" v-if="company.description" v-text="company.description"></p>
                        </div>
                    </article>

                    <article
                        v-if="company.industry || company.preferred_round"
                        class="shadow-card w-full rounded-xl bg-white p-5"
                    >
                        <h2 class="text-xl font-medium">Investment</h2>
                        <div v-if="company.preferred_round" class="mt-5 flex flex-col gap-2">
                            <span class="flex gap-1 text-sm font-medium"
                                ><svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                    class="size-5"
                                >
                                    <path

                                        stroke-linejoin="round"
                                        d="M2.25 18.75a60.07 60.07 0 0 1 15.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 0 1 3 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 0 0-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 0 1-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 0 0 3 15h-.75M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm3 0h.008v.008H18V10.5Zm-12 0h.008v.008H6V10.5Z"

                            </span>

                                <a
                                    class="text-nowrap rounded-full bg-[#ffdcfd] px-2 py-1.5 text-xs font-medium text-[#dd70d8]"

                                </a>
                            </div>
                        </div>
                        <div v-if="company.industry" class="mt-2 flex flex-col gap-2">
                            <span class="flex gap-1 text-sm font-medium"
                                ><svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                    class="size-5"
                                >
                                    <path

                                    />
                                </svg>
                                Industry:
                            </span>
                            <div class="flex flex-wrap gap-1">
                                <a
                                    class="text-nowrap rounded-lg bg-[#ccecff] px-2 py-1.5 text-xs font-medium text-[#26a3f1]"
                                    v-text="company.industry.name"
                                ></a>
                            </div>
                        </div>
                    </article>
                    <article
                        v-if="company.twitter || company.linkedin || instagram || company.website"
                        class="shadow-card w-full rounded-xl bg-white p-5"

                        <h2 class="text-xl font-medium">Contacts</h2>

                                        />

                                </span>

                                    class="flex select-text items-center gap-1 text-gray-700 underline"
                                >
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        viewBox="0 0 16 16"
                                        fill="currentColor"
                                        class="h-4 w-4"
                                    >
                                        <path

                                        />
                                        <path

                                </a>
                            </div>
                            <div v-if="company.linkedin" class="flex justify-between gap-3">
                                <span class="inline-flex items-center gap-1 font-medium">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" class="size-5">

                                        />
                                    </svg>
                                    LinkedIn:
                                </span>
                                <a
                                    href="company.linkedin"
                                    target="_blank"
                                    class="flex select-text items-center gap-1 text-gray-700 underline"
                                >
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        viewBox="0 0 16 16"
                                        fill="currentColor"
                                        class="h-4 w-4"

                                        />
                                    </svg>
                                    <span>linkedin.com</span>
                                </a>
                            </div>
                            <div v-if="company.instagram" class="flex justify-between gap-3">
                                <span class="inline-flex items-center gap-1 font-medium">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" class="size-5">
                                        <path

{% endmacro %}
