{% extends "layouts/base.html" %}

{% block content %}
<div class="flex min-h-[60vh] flex-col items-center justify-center gap-2 px-6 text-center">
    <div class="font-mono text-[11px] uppercase tracking-[0.12em] text-brand">Error</div>
    <div class="font-display text-[64px] font-semibold leading-none tracking-[-0.02em] text-ink">{% block status_code %}{% endblock %}</div>
    <div class="mt-1 text-[15px] text-soft">{% block status_message %}{% endblock %}</div>
    <a
        href="/"
        class="mt-5 rounded-[11px] bg-ink px-5 py-3 text-sm font-semibold text-paper transition-colors hover:bg-ink/90"
        >Back to home</a
    >
</div>
{% endblock %}
