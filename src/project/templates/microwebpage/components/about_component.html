{% macro render() %}
<script type="text/x-template" id="about-component-template">
    <div class="mx-auto mt-4 flex h-full w-full max-w-xl flex-col justify-center gap-9 overflow-y-auto">
        <div>
            <input type="hidden" v-model="formData.id" />
            <input type="hidden" v-model="formData.company_id" />
        </div>
        <div class="flex flex-col gap-2">
            <h1 class="text-4xl font-medium">Step 6 of 8: About & Values</h1>
            <span>Add optional information about your company and its values.</span>
        </div>
        <div class="grid grid-cols-2 gap-x-4 gap-y-6">
            <div class="flex items-center">
                <label for="about_title" class="text-sm font-medium text-gray-700">About Title</label>
            </div>
            <div>
                <input
                    class="w-full rounded-lg border border-black bg-white p-2"
                    v-model="formData.about_title"
                    type="text"
                    id="about_title"
                    placeholder="About headline (e.g., 'Our Story')"
                />
            </div>
            <div class="flex items-center">
                <label for="about_subtitle" class="text-sm font-medium text-gray-700">About Subtitle</label>
            </div>
            <div>
                <input
                    class="w-full rounded-lg border border-black bg-white p-2"
                    v-model="formData.about_subtitle"
                    type="text"
                    id="about_subtitle"
                    placeholder="About description (e.g., 'Who we are')"
                />
            </div>
            <div class="col-span-2">
                <div class="flex items-center">
                    <label class="text-sm font-medium text-gray-700">About Statements</label>
                </div>
                <div class="mt-2 space-y-4">
                    <div v-for="(statement, index) in formData.about_statement" :key="index" class="grid grid-cols-2 gap-4">
                        <input
                            class="w-full rounded-lg border border-black bg-white p-2"
                            v-model="statement.title"
                            type="text"
                            :placeholder="'Statement #' + (index + 1) + ' Title (e.g., Our History)'"
                        />
                        <div class="flex gap-2">
                            <textarea
                                class="w-full rounded-lg border border-black bg-white p-2"
                                v-model="statement.description"
                                :placeholder="'Description (e.g., Founded in 2010...)'"
                                rows="2"
                            ></textarea>
                            <button
                                @click="removeAboutStatement(index)"
                                class="rounded-md bg-red-500 p-2 text-white"
                            >
                                Remove
                            </button>
                        </div>
                    </div>
                    <button
                        @click="addAboutStatement"
                        class="mt-2 rounded-md bg-green-500 px-3 py-2 text-white"
                    >
                        Add About Statement
                    </button>
                </div>
            </div>
            <div class="flex items-center">
                <label for="values_title" class="text-sm font-medium text-gray-700">Values Title</label>
            </div>
            <div>
                <input
                    class="w-full rounded-lg border border-black bg-white p-2"
                    v-model="formData.values_title"
                    type="text"
                    id="values_title"
                    placeholder="Values headline (e.g., 'Our Core Values')"
                />
            </div>
            <div class="flex items-center">
                <label for="values_subtitle" class="text-sm font-medium text-gray-700">Values Subtitle</label>
            </div>
            <div>
                <input
                    class="w-full rounded-lg border border-black bg-white p-2"
                    v-model="formData.values_subtitle"
                    type="text"
                    id="values_subtitle"
                    placeholder="Values description (e.g., 'What we stand for')"
                />
            </div>
            <div class="col-span-2">
                <div class="flex items-center">
                    <label class="text-sm font-medium text-gray-700">Values Statements</label>
                </div>
                <div class="mt-2 space-y-4">
                    <div v-for="(statement, index) in formData.values_statement" :key="index" class="grid grid-cols-2 gap-4">
                        <input
                            class="w-full rounded-lg border border-black bg-white p-2"
                            v-model="statement.title"
                            type="text"
                            :placeholder="'Value #' + (index + 1) + ' Title (e.g., Integrity)'"
                        />
                        <div class="flex gap-2">
                            <textarea
                                class="w-full rounded-lg border border-black bg-white p-2"
                                v-model="statement.description"
                                :placeholder="'Description (e.g., We uphold honesty...)'"
                                rows="2"
                            ></textarea>
                            <button
                                @click="removeValuesStatement(index)"
                                class="rounded-md bg-red-500 p-2 text-white"
                            >
                                Remove
                            </button>
                        </div>
                    </div>
                    <button
                        @click="addValuesStatement"
                        class="mt-2 rounded-md bg-green-500 px-3 py-2 text-white"
                    >
                        Add Values Statement
                    </button>
                </div>
            </div>
        </div>
        <div class="flex justify-between">
            <button
                class="mt-4 w-fit rounded-md bg-gray-300 px-3 py-2 text-black transition-colors ease-in-out hover:bg-gray-200"
                @click="previousPage"
            >
                <div class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                    </svg>
                    <span>Back</span>
                </div>
            </button>
            <button class="bg-deep-purple mt-4 w-fit rounded-md px-3 py-2 text-white hover:scale-102" @click="nextPage">
                <div class="flex items-center gap-2">
                    <span>Continue</span>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
                    </svg>
                </div>
            </button>
        </div>
    </div>
</script>
{% endmacro %}
