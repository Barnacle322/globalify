<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../static/css/main.css" />
        <meta name="view-transition" content="same-origin" />

        <title>Document</title>
    </head>
    <body>
        <nav class="absolute left-0 top-0 flex h-24 w-full items-center justify-center bg-black text-white">
            <div class="flex w-full max-w-7xl items-center gap-7 px-9">
                <img class="h-[30px] w-[113px]" src="../static/elements/globalify.png" />
                <div class="hidden gap-7 sm:flex">
                    <a href="">Search</a>
                    <a href="">Blog</a>
                    <a href="">Resources</a>
                    <a href="">Help</a>
                </div>
            </div>
            <a href="/logout" class="">Logout</a>
        </nav>
        <main class="mt-28 flex flex-col items-center justify-center p-6 sm:mt-36">
            <form action="/login-form" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                <div class="space-y-12">
                    <div class="border-b border-gray-900/10 pb-12">
                        <h1 class="mb-4 text-3xl font-semibold leading-7 text-gray-900">Profile</h1>
                        <h2 class="text-xl font-medium leading-7 text-gray-900">Basic information</h2>
                        <p class="mt-1 text-sm leading-6 text-gray-600">
                            This information will be displayed publicly so be careful what you share.
                        </p>
                        <div class="mt-10 grid grid-cols-1 gap-x-6 gap-y-8 sm:grid-cols-6">
                            <div class="sm:col-span-3">
                                <label for="first-name" class="block text-sm font-medium leading-6 text-gray-900"
                                    >First name*</label
                                >
                                <div class="mt-2">
                                    <input
                                        type="text"
                                        name="first-name"
                                        id="first-name"
                                        autocomplete="given-name"
                                        value="{{ user_info.first_name }}"
                                        required
                                        class="block w-full rounded border-0 py-1.5 text-gray-900 shadow-sm ring-2 ring-inset ring-stone-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-sky-400 sm:text-sm sm:leading-6"
                                    />
                                </div>
                            </div>
                            <div class="sm:col-span-3">
                                <label for="last-name" class="block text-sm font-medium leading-6 text-gray-900"
                                    >Last name*</label
                                >
                                <div class="mt-2">
                                    <input
                                        type="text"
                                        name="last-name"
                                        id="last-name"
                                        autocomplete="family-name"
                                        value="{{ user_info.last_name }}"
                                        required
                                        class="block w-full rounded border-0 py-1.5 text-gray-900 shadow-sm ring-2 ring-inset ring-stone-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-sky-400 sm:text-sm sm:leading-6"
                                    />
                                </div>
                            </div>
                            <div class="sm:col-span-4">
                                <label for="username" class="block text-sm font-medium leading-6 text-gray-900"
                                    >Username*</label
                                >
                                <div class="mt-2">
                                    <div
                                        class="flex rounded shadow-sm ring-2 ring-inset ring-stone-300 focus-within:ring-2 focus-within:ring-inset focus-within:ring-sky-400 sm:max-w-md"
                                    >
                                        <span class="flex select-none items-center pl-3 text-gray-500 sm:text-sm">
                                            globalify.com/user/
                                        </span>
                                        <input
                                            type="text"
                                            name="username"
                                            id="username"
                                            autocomplete="username"
                                            class="block flex-1 border-0 bg-transparent py-1.5 pl-1 text-gray-900 placeholder:text-stone-400 focus:ring-0 sm:text-sm sm:leading-6"
                                            placeholder="janesmith"
                                            required
                                        />
                                    </div>
                                </div>
                            </div>

                            <div class="col-span-full">
                                <label for="about" class="block text-sm font-medium leading-6 text-gray-900"
                                    >About</label
                                >
                                <div class="mt-2">
                                    <textarea
                                        id="about"
                                        name="about"
                                        rows="3"
                                        class="block w-full rounded border-0 py-1.5 text-gray-900 shadow-sm ring-2 ring-inset ring-stone-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-sky-400 sm:text-sm sm:leading-6"
                                    ></textarea>
                                </div>
                                <p class="mt-3 text-sm leading-6 text-gray-600">
                                    Write a few sentences about yourself.
                                </p>
                            </div>
                            <div class="col-span-full">
                                <label for="photo" class="block text-sm font-medium leading-6 text-gray-900"
                                    >Photo</label
                                >
                                <div class="mt-2 flex items-center gap-x-3">
                                    <svg
                                        class="h-12 w-12 text-stone-300"
                                        viewBox="0 0 24 24"
                                        fill="currentColor"
                                        aria-hidden="true"
                                    >
                                        <path
                                            fill-rule="evenodd"
                                            d="M18.685 19.097A9.723 9.723 0 0021.75 12c0-5.385-4.365-9.75-9.75-9.75S2.25 6.615 2.25 12a9.723 9.723 0 003.065 7.097A9.716 9.716 0 0012 21.75a9.716 9.716 0 006.685-2.653zm-12.54-1.285A7.486 7.486 0 0112 15a7.486 7.486 0 015.855 2.812A8.224 8.224 0 0112 20.25a8.224 8.224 0 01-5.855-2.438zM15.75 9a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"
                                            clip-rule="evenodd"
                                        />
                                    </svg>
                                    <input 
                                        class="block w-full text-sm text-gray-900 border border-gray-300 rounded-lg cursor-pointer bg-gray-50 "
                                        type="file" 
                                        id="pfp"
                                        name="pfp" 
                                        accept="image/png, image/jpeg" 
                                    />
                                
                                </div>
                            </div>
                            <div class="sm:col-span-3">
                                <label for="language" class="block text-sm font-medium leading-6 text-gray-900"
                                    >Language*</label
                                >
                                <div class="mt-2">
                                    <select
                                        id="language"
                                        name="language"
                                        autocomplete="language"
                                        class="block w-full rounded border-0 py-1.5 text-gray-900 shadow-sm ring-2 ring-inset ring-stone-300 focus:ring-2 focus:ring-inset focus:ring-sky-400 sm:max-w-xs sm:text-sm sm:leading-6"
                                    >
                                        {% if languages %} {% for language in languages %}
                                        <option>{{ language }}</option>
                                        {% endfor %} {% endif %}
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="border-b border-gray-900/10 pb-12">
                        <h2 class="text-base font-semibold leading-7 text-gray-900">Social media</h2>
                        <p class="mt-1 text-sm leading-6 text-gray-600">
                            Put the links to your social media accounts here.
                        </p>
                        <div class="mt-10 grid grid-cols-1 gap-x-6 gap-y-8 sm:grid-cols-6">
                            <div class="col-span-full">
                                <label for="personal-website" class="block text-sm font-medium leading-6 text-gray-900"
                                    >Website</label
                                >
                                <div class="mt-2">
                                    <input
                                        type="url"
                                        name="personal-website"
                                        id="personal-website"
                                        autocomplete="personal-website"
                                        placeholder="https://example.com"
                                        class="block w-full rounded border-0 py-1.5 text-gray-900 shadow-sm ring-2 ring-inset ring-stone-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-sky-400 sm:text-sm sm:leading-6"
                                    />
                                </div>
                            </div>
                            <div class="col-span-full">
                                <label for="linkedin" class="block text-sm font-medium leading-6 text-gray-900"
                                    >Linkedin</label
                                >
                                <div class="mt-2">
                                    <input
                                        type="url"
                                        name="linkedin"
                                        id="linkedin"
                                        autocomplete="linkedin"
                                        placeholder="https://linkedin.com/in/username"
                                        class="block w-full rounded border-0 py-1.5 text-gray-900 shadow-sm ring-2 ring-inset ring-stone-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-sky-400 sm:text-sm sm:leading-6"
                                    />
                                </div>
                            </div>
                            <div class="col-span-full">
                                <label for="instagram" class="block text-sm font-medium leading-6 text-gray-900"
                                    >Instagram</label
                                >
                                <div class="mt-2">
                                    <input
                                        type="url"
                                        name="instagram"
                                        id="instagram"
                                        autocomplete="instagram"
                                        placeholder="https://instagram.com/username"
                                        class="block w-full rounded border-0 py-1.5 text-gray-900 shadow-sm ring-2 ring-inset ring-stone-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-sky-400 sm:text-sm sm:leading-6"
                                    />
                                </div>
                            </div>
                            <div class="col-span-full">
                                <label for="twitter" class="block text-sm font-medium leading-6 text-gray-900"
                                    >Twitter/𝕏</label
                                >
                                <div class="mt-2">
                                    <input
                                        type="url"
                                        name="twitter"
                                        id="twitter"
                                        autocomplete="twitter"
                                        placeholder="https://twitter.com/username"
                                        class="block w-full rounded border-0 py-1.5 text-gray-900 shadow-sm ring-2 ring-inset ring-stone-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-sky-400 sm:text-sm sm:leading-6"
                                    />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mt-6 flex items-center justify-end gap-x-6">
                    <button type="button" class="text-sm font-semibold leading-6 text-gray-900">Cancel</button>
                    <button
                        type="submit"
                        class="rounded-md bg-sky-400 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-sky-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-sky-400"
                    >
                        Save
                    </button>
                </div>
            </form>
        </main>
    </body>
</html>
