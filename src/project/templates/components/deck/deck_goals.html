{% macro render() %}
<template id="deck-goals-template">
    <article
        class="fixed top-0 right-0 z-50 flex h-full w-full flex-col bg-white p-8 sm:top-1/2 sm:right-1/2 sm:h-auto sm:max-w-2xl sm:translate-x-1/2 sm:-translate-y-1/2 sm:rounded-xl"
    >
        <input type="hidden" id="csrf_token" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="mx-auto w-full gap-4 rounded-t-lg border p-5">
            <div class="flex flex-row items-center justify-start gap-5 pb-5">
                <svg class="size-12 text-sky-500" fill="currentColor" viewBox="0 0 512.00 512.00" stroke-width="1.5">
                    <path
                        d="M512,76.228L435.915,0.143L330.168,105.891c-33.73-20.164-72.115-30.766-111.8-30.766C97.959,75.123,0,173.083,0,293.49 c0,58.33,22.714,113.166,63.956,154.41c41.243,41.244,96.08,63.956,154.41,63.956c58.33,0,113.168-22.714,154.41-63.956 s63.956-96.081,63.956-154.41c0-39.533-10.528-77.796-30.548-111.448L512,76.228z M435.915,44.392l31.836,31.836l-19.744,19.744 l-31.836-31.836L435.915,44.392z M394.046,86.26l31.836,31.836l-122.201,122.2l-31.432-32.24L394.046,86.26z M269.485,291.808 c0.017,0.559,0.033,1.119,0.033,1.682c0,28.206-22.946,51.152-51.152,51.152s-51.152-22.946-51.152-51.152 c0-28.206,22.946-51.152,51.152-51.152c0.686,0,1.372,0.016,2.055,0.043l-21.839,71.181L269.485,291.808z M245.797,266.346 l9.475-30.884l20.996,21.535L245.797,266.346z M232.257,203.801l-2.47,8.051c-3.766-0.524-7.578-0.802-11.42-0.802 c-45.458,0-82.441,36.983-82.441,82.441c0,45.457,36.982,82.441,82.441,82.441s82.441-36.983,82.441-82.441 c0-3.723-0.259-7.415-0.749-11.063l8.284-2.542l25.352-25.352c4.208,12.487,6.403,25.669,6.403,38.957 c0,67.123-54.608,121.731-121.731,121.731S96.635,360.613,96.635,293.49s54.608-121.731,121.731-121.731 c13.449,0,26.778,2.243,39.386,6.546L232.257,203.801z M218.367,480.568c-103.155,0-187.078-83.923-187.078-187.078 s83.923-187.078,187.078-187.078c31.323,0,61.69,7.707,88.86,22.418l-25.413,25.413c-19.805-9.026-41.508-13.772-63.449-13.772 c-84.376,0-153.02,68.645-153.02,153.02s68.645,153.02,153.02,153.02s153.02-68.645,153.02-153.02 c0-21.779-4.686-43.345-13.596-63.052l25.441-25.441c14.577,27.082,22.214,57.321,22.214,88.492 C405.445,396.645,321.522,480.568,218.367,480.568z"
                    ></path>
                </svg>
                <div class="flex flex-col gap-3">
                    <span class="font-bold">Set goals</span
                    ><span>Get tailored writing suggestions based on your goals and audience</span>
                </div>
            </div>
            <div class="flex flex-row items-center justify-start gap-8 border-t border-b pt-5 pb-5">
                <span class="w-28 pl-3">Audience</span>
                <div class="inline-flex cursor-pointer rounded-md shadow-xs" role="group">
                    <button
                        type="button"
                        :class="['cursor-pointer px-4 py-2 text-sm font-medium border rounded-s-lg focus:z-10 focus:ring-2', selectedAudience === 'profile' ? 'bg-sky-500 text-white' : 'bg-white text-gray-900 border-gray-200 hover:text-white hover:bg-sky-500']"
                        @click="selectedAudience = 'profile'"
                    >
                        Profile
                    </button>
                    <button
                        type="button"
                        :class="['cursor-pointer px-4 py-2 text-sm font-medium border-t border-b focus:z-10 focus:ring-2', selectedAudience === 'settings' ? 'bg-sky-500 text-white' : 'bg-white text-gray-900 border-gray-200 hover:text-white hover:bg-sky-500']"
                        @click="selectedAudience = 'settings'"
                    >
                        Settings
                    </button>
                    <button
                        type="button"
                        :class="['cursor-pointer px-4 py-2 text-sm font-medium border rounded-e-lg focus:z-10 focus:ring-2', selectedAudience === 'messages' ? 'bg-sky-500 text-white' : 'bg-white text-gray-900 border-gray-200 hover:text-white hover:bg-sky-500']"
                        @click="selectedAudience = 'messages'"
                    >
                        Messages
                    </button>
                </div>
            </div>
            <div class="flex flex-row items-center justify-start gap-8 border-b pt-5 pb-5">
                <span class="w-28 pl-3">Formality</span>
                <div class="inline-flex cursor-pointer rounded-md shadow-xs" role="group">
                    <button
                        type="button"
                        :class="['cursor-pointer px-4 py-2 text-sm font-medium border rounded-s-lg focus:z-10 focus:ring-2', selectedFormality === 'informal' ? 'bg-sky-500 text-white' : 'bg-white text-gray-900 border-gray-200 hover:text-white hover:bg-sky-500']"
                        @click="selectedFormality = 'informal'"
                    >
                        Informal
                    </button>
                    <button
                        type="button"
                        :class="['cursor-pointer px-4 py-2 text-sm font-medium border-t border-b focus:z-10 focus:ring-2', selectedFormality === 'neutral' ? 'bg-sky-500 text-white' : 'bg-white text-gray-900 border-gray-200 hover:text-white hover:bg-sky-500']"
                        @click="selectedFormality = 'neutral'"
                    >
                        Neutral
                    </button>
                    <button
                        type="button"
                        :class="['cursor-pointer px-4 py-2 text-sm font-medium border rounded-e-lg focus:z-10 focus:ring-2', selectedFormality === 'formal' ? 'bg-sky-500 text-white' : 'bg-white text-gray-900 border-gray-200 hover:text-white hover:bg-sky-500']"
                        @click="selectedFormality = 'formal'"
                    >
                        Formal
                    </button>
                </div>
            </div>
            <div class="flex flex-row items-center justify-start gap-8 pt-5">
                <span class="w-28 pl-3">Domain</span>
                <div class="inline-flex rounded-md shadow-xs" role="group">
                    <button
                        type="button"
                        :class="['cursor-pointer px-4 py-2 text-sm font-medium border rounded-s-lg focus:z-10 focus:ring-2', selectedDomain === 'academic' ? 'bg-sky-500 text-white' : 'bg-white text-gray-900 border-gray-200 hover:text-white hover:bg-sky-500']"
                        @click="selectedDomain = 'academic'"
                    >
                        Academic
                    </button>
                    <button
                        type="button"
                        :class="['cursor-pointer px-4 py-2 text-sm font-medium border-t border-b focus:z-10 focus:ring-2', selectedDomain === 'business' ? 'bg-sky-500 text-white' : 'bg-white text-gray-900 border-gray-200 hover:text-white hover:bg-sky-500']"
                        @click="selectedDomain = 'business'"
                    >
                        Business
                    </button>
                    <button
                        type="button"
                        :class="['cursor-pointer px-4 py-2 text-sm font-medium border rounded-e-lg focus:z-10 focus:ring-2', selectedDomain === 'general' ? 'bg-sky-500 text-white' : 'bg-white text-gray-900 border-gray-200 hover:text-white hover:bg-sky-500']"
                        @click="selectedDomain = 'general'"
                    >
                        General
                    </button>
                </div>
            </div>
        </div>
    </article>
</template>
{% endmacro %}
