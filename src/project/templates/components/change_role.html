{% macro render(company, current_user) %}
<template id="change-role-template">
    <article
        class="fixed max-w-[800px] md:max-h-96 h-full overflow-y-auto right-1/2 top-1/2 z-50 flex w-full lg:w-2/3 xl:w-1/2 -translate-y-1/2 translate-x-1/2 flex-col md:rounded-3xl bg-white transition-all ease-in-out"
    >
        <header class="sticky bg-white top-0 p-4">
            <span class="text-xl font-medium"
                >You are about to <b>revert</b> all changes made after claiming the profile. Are you sure you want to
                continue?
            </span>
        </header>

        <div class="grid grid-cols-12 px-4 gap-2">
            <div class="col-span-full flex flex-col gap-2">
                <label class="font-semibold">Change role for [[user.name]]</label>
                <select class="h-12 w-full rounded-xl border border-stone-300 px-2" ref="roleChange">
                    <option value="owner" :selected="user.role === 'owner'">Owner</option>
                    <option value="admin" :selected="user.role === 'admin'">Admin</option>
                    <option value="employee" :selected="user.role === 'employee'">Employee</option>
                </select>
            </div>
        </div>

        <div class="flex justify-end gap-5 p-4 mt-auto">
            <button @click="closeChangeRole" class="rounded-lg border border-gray-300 px-3 py-2">Cancel</button>
            <button @click="changeRole(user.id)" class="rounded-lg bg-sky-400 px-3 py-2 text-white">Confirm</button>
        </div>
    </article>
</template>
{% endmacro %}
