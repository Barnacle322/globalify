repos:
- repo: https://github.com/pycqa/isort
  rev: 5.12.0
  hooks:
    - id: isort
      name: isort (python)
      exclude: ^migrations/
      args: ["--profile", "black", "--filter-files"]

- repo: https://github.com/psf/black
  rev: 23.7.0
  hooks:
  - id: black
    exclude: ^migrations/
    language_version: python3.11

- repo: https://github.com/pycqa/flake8
  rev: 6.1.0
  hooks:
  - id: flake8
    exclude: ^migrations/