{% macro render(user) %}
<template id="gemini-template">
    <article
        class="fixed right-0 top-0 z-50 flex h-full w-full flex-col overflow-y-scroll overscroll-contain bg-white transition-all"
        :class="isExpanded ? 'md:w-full lg:w-full 2xl:w-full' : 'md:w-4/5 md:rounded-l-3xl lg:w-2/3 2xl:w-1/2'"
    >
        <nav
            class="h-[10%] sticky right-0 top-0 z-10 flex w-full items-center justify-between bg-white px-4 py-4 sm:px-9"
        >
            <div class="flex items-center gap-4">
                <button
                    @click="toggleHistory"
                    class="rounded-lg p-1 transition-colors duration-75 ease-in-out hover:bg-gray-50"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-6"
                    >
                        <path stroke-linecap="round" stroke-linejoin="round" />

                        <path
                            v-if="isHistoryVisible"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15"
                        />
                        <path
                            v-else
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
                        />
                    </svg>
                </button>
                <span
                    v-if="isHistoryVisible"
                    class="absolute left-1/2 -translate-x-1/2 -bottom-8 hidden group-hover:block bg-gray-800 text-white text-sm px-2 py-1 rounded whitespace-nowrap"
                >
                    Open chats history
                </span>
                <span
                    v-else
                    class="absolute left-1/2 -translate-x-1/2 -bottom-8 hidden group-hover:block bg-gray-800 text-white text-sm px-2 py-1 rounded whitespace-nowrap"
                >
                    Close chats history
                </span>
                <button @click="createChat" class="flex items-center gap-2 rounded-lg px-3 py-2 hover:bg-gray-100">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-5"
                    >
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                    </svg>
                    New Chat
                </button>
            </div>

            <div class="flex gap-3">
                <button
                    @click="toggleExpansion"
                    class="hidden rounded-lg p-1 transition-colors duration-75 ease-in-out hover:bg-gray-50 md:block"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-5"
                        v-if="!isExpanded"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"
                        />
                    </svg>
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-5"
                        v-else
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M9 9V4.5M9 9H4.5M9 9 3.75 3.75M9 15v4.5M9 15H4.5M9 15l-5.25 5.25M15 9h4.5M15 9V4.5M15 9l5.25-5.25M15 15h4.5M15 15v4.5m0-4.5 5.25 5.25"
                        />
                    </svg>
                </button>
                <button
                    @click="closeGemini"
                    class="ml-auto flex aspect-square h-full items-center justify-center rounded-lg p-1 transition-colors duration-75 ease-in-out hover:bg-gray-50"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-6"
                    >
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </nav>

        <main class="flex h-[90%] relative overflow-hidden">
            <transition name="history">
                <div
                    v-show="isHistoryVisible"
                    class="custom-scrollbar absolute left-0 top-0 h-full w-64 bg-slate-200 p-3 overflow-y-auto transform transition-transform duration-300 z-20"
                >
                    <div class="flex flex-col gap-5">
                        <div v-for="[day, chats] of userChats">
                            <span class="m-2 text-sm font-thin text-gray-600" v-text="formatDate(day)"></span>
                            <a class="flex relative" v-for="chat in chats" :key="chat.id">
                                <div
                                    class="w-full cursor-pointer hover:bg-slate-300 p-2 rounded-lg relative group"
                                    @click="selectChat(chat.id)"
                                    :class="{'bg-slate-300': selectedChatId === chat.id}"
                                >
                                    <span
                                        class="absolute top-0.5 right-1 text-xs tracking-tighter text-gray-400 group-hover:opacity-0"
                                        v-text="formatChatTime(chat.created)"
                                    ></span>

                                    <button
                                        data-dropdown-button
                                        @click.stop="toggleDropdown(chat.id)"
                                        class="absolute top-1.5 right-1 hidden group-hover:block transition-colors rounded-lg ease-in-out hover:bg-gray-200"
                                    >
                                        <svg
                                            xmlns="http://www.w3.org/2000/svg"
                                            fill="none"
                                            viewBox="0 0 24 24"
                                            stroke-width="1.5"
                                            stroke="currentColor"
                                            class="size-7 text-gray-500"
                                        >
                                            <path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                d="M12 6.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 12.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 18.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Z"
                                            />
                                        </svg>
                                    </button>
                                    <div>
                                        <span
                                            class="block whitespace-nowrap overflow-hidden mask-linear-gradient mr-5 ml-2"
                                            v-text="chat.name"
                                        ></span>
                                        <transition
                                            enter-active-class="animate-zoom-in"
                                            leave-active-class="animate-zoom-out"
                                        >
                                            <div
                                                v-if="openedDropdownChatId === chat.id"
                                                class="absolute right-1 top-8 z-10 flex w-24 origin-top-right flex-col items-start justify-center gap-1 rounded-lg border border-gray-200 bg-white p-1 shadow-sm"
                                            >
                                                <h1
                                                    class="flex w-full items-center gap-2 rounded-md px-2 py-1.5 text-start text-sm hover:bg-sky-500 hover:text-white"
                                                    :href="`/chat/rename/${chat.id}`"
                                                >
                                                    <span>Rename</span>
                                                    <svg
                                                        xmlns="http://www.w3.org/2000/svg"
                                                        fill="none"
                                                        viewBox="0 0 24 24"
                                                        stroke-width="1.5"
                                                        stroke="currentColor"
                                                        class="size-4"
                                                    >
                                                        <path
                                                            stroke-linecap="round"
                                                            stroke-linejoin="round"
                                                            d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10"
                                                        />
                                                    </svg>
                                                </h1>
                                                <h1
                                                    class="flex w-full items-center gap-2 rounded-md text-red-600 px-2 py-1.5 text-start text-sm hover:bg-sky-500 hover:text-white"
                                                    :href="`/chat/delete/${chat.id}`"
                                                >
                                                    <span>Delete</span>
                                                    <svg
                                                        xmlns="http://www.w3.org/2000/svg"
                                                        fill="none"
                                                        viewBox="0 0 24 24"
                                                        stroke-width="1.5"
                                                        stroke="currentColor"
                                                        class="w-5 h-5"
                                                    >
                                                        <path
                                                            stroke-linecap="round"
                                                            stroke-linejoin="round"
                                                            d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"
                                                        />
                                                    </svg>
                                                </h1>
                                            </div>
                                        </transition>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>
            </transition>
            <div class="flex flex-col bg-slate-300 w-full h-full relative">
                <input type="hidden" id="csrf_token" name="csrf_token" value="{{ csrf_token() }}" />

                <div
                    class="flex flex-col gap-5 p-5 overflow-y-auto h-[calc(100vh-17rem)] relative z-0"
                    v-if="response.length"
                    ref="chatContainer"
                >
                    <div
                        v-for="(message, index) in response"
                        :key="index"
                        :class="{'self-end': message.type === 'user', 'self-start': message.type === 'gemini'}"
                        class="flex items-start"
                    >
                        <div
                            v-text="message.content"
                            class="bg-gray-100 text-gray-800 rounded-lg p-4 max-w-[75%] shadow-sm text-sm sm:text-base"
                        ></div>
                    </div>
                </div>
                <div v-else class="flex flex-col gap-5 p-5 overflow-y-auto h-[calc(100vh-17rem)] relative z-0">
                    <div class="flex items-start">
                        <div
                            class="bg-gray-100 text-gray-800 rounded-lg p-4 max-w-[75%] shadow-sm text-sm sm:text-base"
                        >
                            Hi there! I'm Gemini, your virtual assistant. How can I help you today?
                        </div>
                    </div>
                </div>

                <div class="p-5 absolute bottom-0 w-full">
                    <div class="p-5 bg-slate-400 rounded-2xl flex justify-between">
                        <div
                            ref="prompt"
                            contenteditable="true"
                            translate="no"
                            onblur="this.textContent = this.textContent.trim()"
                            class="placeholder ring-0 outline-0 border-0 w-full"
                        ></div>
                        <button
                            @click="sendMessage(selectedChatId)"
                            @keyup.enter="sendMessage(selectedChatId)"
                            class="hover:translate-x-1 transition-transform ease-in-out"
                        >
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                fill="none"
                                viewBox="0 0 24 24"
                                stroke-width="1.5"
                                stroke="currentColor"
                                class="size-6"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5"
                                />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </article>
</template>

{% endmacro %}
