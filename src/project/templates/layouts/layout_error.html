<!doctype html>
<html class="h-full" lang="en">
    <head>
        {% block head %}
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="stylesheet" href="/static/css/main.css" />
        <link rel="icon" type="image/png" href="/static/elements/icon.png" />
        <title>{% block title %}{% endblock %} | Globalify</title>
        {% endblock %}
    </head>
    <body class="flex h-full flex-col items-center justify-center gap-3 bg-black text-white">
        <nav class="absolute left-0 top-0 flex h-24 w-full items-center justify-start px-9">
            <a href="/" class="relative flex items-center gap-1"
                ><img class="h-[30px] w-[113px]" src="/static/elements/globalify.png" />
                <div
                    class="h-fit w-fit rounded-full bg-sky-500 px-1 py-1 text-[8px] font-medium leading-none tracking-tight text-white"
                >
                    BETA
                </div></a
            >
        </nav>
        <div class="text-5xl">
            <span class="font-medium">{% block status_code %}{% endblock %}</span>
            <span class="text-2xl">{% block status_message %}{% endblock %}</span>
        </div>
        <a href="/search" class="inline-flex items-baseline justify-center gap-2 text-base text-stone-300">
            <img class="h-3" src="/static/elements/arrow-left-alt.svg" />
            Back to home
        </a>
    </body>
</html>
