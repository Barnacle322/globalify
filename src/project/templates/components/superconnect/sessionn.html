{% macro render(user) %}
<template id="session-template">
    <article
        class="fixed top-1/2 right-1/2 z-50 flex w-10/12 translate-x-1/2 -translate-y-1/2 flex-col gap-4 rounded-3xl bg-white px-8 py-6 transition-all sm:w-1/2 sm:rounded-xl xl:w-2/5"
    >
        <div class="relative w-full">
            <nav class="sticky top-20 z-10 h-12 w-full overflow-x-auto border-b bg-white">
                <div class="flex h-full items-center justify-between px-4">
                    <div class="flex gap-2 text-sm">
                        <a
                            href="/settings/general"
                            class="flex items-center justify-center gap-2 border-b-2 border-sky-500 px-3 py-2 font-medium transition-colors ease-in-out"
                        >
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                fill="none"
                                viewBox="0 0 24 24"
                                stroke-width="1.5"
                                stroke="currentColor"
                                aria-hidden="true"
                                class="size-6 shrink-0"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z"
                                ></path>
                            </svg>
                            Sessions
                        </a>
                    </div>
                    <div class="ml-auto">
                        <a
                            href="#"
                            class="flex shrink-0 cursor-pointer items-center justify-center gap-2 border-b-2 border-transparent px-3 py-2 font-medium transition-colors ease-in-out hover:border-sky-500"
                        >
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 -960 960 960"
                                class="size-6"
                                fill="#000000"
                            >
                                <path
                                    d="M480-120q-138 0-240.5-91.5T122-440h82q14 104 92.5 172T480-200q117 0 198.5-81.5T760-480q0-117-81.5-198.5T480-760q-69 0-129 32t-101 88h110v80H120v-240h80v94q51-64 124.5-99T480-840q75 0 140.5 28.5t114 77q48.5 48.5 77 114T840-480q0 75-28.5 140.5t-77 114q-48.5 48.5-114 77T480-120Zm112-192L440-464v-216h80v184l128 128-56 56Z"
                                />
                            </svg>
                            Filter
                        </a>
                    </div>
                </div>
            </nav>
            <main class="p-4 sm:p-6">
                <div class="container mx-auto p-4">
                    <div v-for="(group, index) in filteredGroups" :key="index">
                        <h2 class="text-2xl font-bold mb-4" v-text="group.title"></h2>

                        <div
                            v-for="session in group.sessions"
                            :key="session.id"
                            class="rounded-lg shadow-lg p-4 mb-4 border-l-4"
                            :class="{
                     'border-blue-500': group.type === 'pending',
                     'border-green-500': group.type === 'upcoming',
                     'border-red-500': group.type === 'past'
                 }"
                        >
                            <div class="flex items-center justify-between m-2 text-lg">
                                <div class="text-center w-1/4 flex items-center">
                                    <img
                                        class="h-16 w-16 flex-none rounded-xl bg-gray-400 object-cover mr-4"
                                        :src="session.expert.picture_url || '/static/elements/default_pfp.svg'"
                                        alt="Expert picture"
                                    />
                                    Expert:
                                    <span class="font-bold" v-text="session.expert.name"></span>
                                </div>

                                <div class="text-center w-1/4">
                                    Created at:
                                    <span class="font-bold" v-text="formatTime(session.created_at)"></span>
                                </div>

                                <div class="text-center w-1/4">Type: <span class="font-bold">training</span></div>

                                <a href="#" class="text-blue-600 hover:underline w-1/4 text-right mr-4"> Details → </a>
                            </div>

                            <div class="text-gray-500 text-sm" v-text="formatDate(session.created_at)"></div>

                            <div
                                v-if="group.type === 'past'"
                                class="text-red-500 text-sm"
                                v-text="'Status: ' +  session.status"
                            ></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </article>
</template>
{% endmacro %}
