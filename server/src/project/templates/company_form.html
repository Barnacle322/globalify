<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../static/css/main.css" />
        <meta name="view-transition" content="same-origin" />

        <title>Company</title>
    </head>
    <body class="bg-slate-50">
        <nav class="absolute left-0 top-0 flex h-24 w-full items-center justify-center bg-black text-white">
            <div class="flex w-full max-w-7xl items-center gap-7 px-9">
                <a href="/"><img class="h-[30px] w-[113px]" src="../static/elements/globalify.png" /></a>
                <div class="hidden gap-7 sm:flex">
                    <a href="">Search</a>
                    <a href="">Blog</a>
                    <a href="">Resources</a>
                    <a href="">Help</a>
                </div>
            </div>
            <a href="/logout" class="mr-9">Logout</a>
        </nav>
        <main class="mt-28 flex flex-col items-center justify-center overflow-x-hidden p-6 sm:mt-36">
            <form action="/company-form" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                <div class="space-y-12">
                    <div class="border-b border-gray-900/10 pb-12">
                        <h1 class="mb-4 text-3xl font-semibold leading-7 text-gray-900">Company profile</h1>
                        <h2 class="text-xl font-medium leading-7 text-gray-900">Basic information</h2>
                        <p class="mt-1 text-sm leading-6 text-gray-600">
                            This information will be displayed publicly so be careful what you share.
                        </p>
                        <div class="mt-10 grid grid-cols-1 gap-x-6 gap-y-8 sm:grid-cols-6">
                            <div class="col-span-full">
                                <label for="company-name" class="block text-sm font-medium leading-6 text-gray-900"
                                    >Company name*</label
                                >
                                <div class="mt-2">
                                    <input
                                        type="text"
                                        name="company-name"
                                        id="company-name"
                                        autocomplete="organization-title"
                                        required
                                        class="h-12 w-full rounded-xl border-2 border-stone-300 bg-transparent px-2"
                                    />
                                </div>
                            </div>
                            <div class="col-span-full">
                                <label for="about" class="block text-sm font-medium leading-6 text-gray-900"
                                    >Description</label
                                >
                                <div class="mt-2">
                                    <textarea
                                        id="about"
                                        name="about"
                                        rows="3"
                                        class="h-44 w-full rounded-xl border-2 border-stone-300 bg-transparent px-2"
                                    ></textarea>
                                </div>
                                <p class="mt-3 text-sm leading-6 text-gray-600">
                                    Write a few sentences that describe your company.
                                </p>
                            </div>
                            <div class="col-span-full">
                                <label for="photo" class="block text-sm font-medium leading-6 text-gray-900"
                                    >Photo</label
                                >
                                <div class="mt-2 flex items-center gap-x-3">
                                    <svg
                                        class="h-12 w-12 text-stone-300"
                                        viewBox="0 0 24 24"
                                        fill="currentColor"
                                        aria-hidden="true"
                                    >
                                        <path
                                            fill-rule="evenodd"
                                            d="M18.685 19.097A9.723 9.723 0 0021.75 12c0-5.385-4.365-9.75-9.75-9.75S2.25 6.615 2.25 12a9.723 9.723 0 003.065 7.097A9.716 9.716 0 0012 21.75a9.716 9.716 0 006.685-2.653zm-12.54-1.285A7.486 7.486 0 0112 15a7.486 7.486 0 015.855 2.812A8.224 8.224 0 0112 20.25a8.224 8.224 0 01-5.855-2.438zM15.75 9a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"
                                            clip-rule="evenodd"
                                        />
                                    </svg>
                                    <input
                                        class="h-12 w-full cursor-pointer rounded-xl border-2 border-stone-300 bg-transparent pr-2 file:mr-4 file:h-full file:cursor-pointer file:rounded-md file:border-0 file:bg-sky-500 file:text-sm file:font-semibold file:text-white file:transition-colors file:ease-in-out file:hover:bg-sky-400"
                                        type="file"
                                        id="pfp"
                                        name="pfp"
                                        accept="image/png, image/jpeg"
                                    />
                                </div>
                            </div>
                            <div class="sm:col-span-full">
                                <label for="country" class="block text-sm font-medium leading-6 text-gray-900"
                                    >Country*</label
                                >
                                <div class="mt-2">
                                    <select
                                        id="country"
                                        name="country"
                                        autocomplete="country-name"
                                        class="h-12 w-full rounded-xl border-2 border-stone-300 bg-transparent px-2"
                                        required
                                    >
                                        <option value="" disabled selected hidden>Select a country</option>
                                        {% if countries %} {% for country in countries %}
                                        <option value="{{ country.id }}">{{ country.name }}</option>
                                        {% endfor %} {% endif %}
                                    </select>
                                </div>
                            </div>
                            <div class="sm:col-span-full">
                                <label for="round" class="block text-sm font-medium leading-6 text-gray-900"
                                    >Preferred round*</label
                                >
                                <div class="mt-2">
                                    <select
                                        id="round"
                                        name="round"
                                        class="h-12 w-full rounded-xl border-2 border-stone-300 bg-transparent px-2"
                                        required
                                    >
                                        <option value="" disabled selected hidden>Select a round</option>
                                        {% if rounds %} {% for round in rounds %}
                                        <option value="{{ round.id }}">{{ round.name }}</option>
                                        {% endfor %} {% endif %}
                                    </select>
                                </div>
                            </div>
                            <div class="sm:col-span-full">
                                <label for="industry" class="block text-sm font-medium leading-6 text-gray-900"
                                    >Industry*</label
                                >
                                <div class="mt-2">
                                    <select
                                        id="industry"
                                        name="industry"
                                        class="h-12 w-full rounded-xl border-2 border-stone-300 bg-transparent px-2"
                                        required
                                    >
                                        <option value="" disabled selected hidden>Select industries</option>
                                        {% for category, industry in industries.items() %}
                                        <optgroup label="{{ category }}">
                                            {% for ind in industry %}
                                            <option value="{{ ind.id }}">{{ ind.name }}</option>
                                            {% endfor %}
                                        </optgroup>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="border-b border-gray-900/10 pb-12">
                        <h2 class="text-base font-semibold leading-7 text-gray-900">Social media</h2>
                        <p class="mt-1 text-sm leading-6 text-gray-600">
                            Put the links to your social media accounts here.
                        </p>
                        <div class="mt-10 grid grid-cols-1 gap-x-6 gap-y-8 sm:grid-cols-6">
                            <div class="col-span-full">
                                <label for="personal-website" class="block text-sm font-medium leading-6 text-gray-900"
                                    >Website</label
                                >
                                <div class="mt-2">
                                    <input
                                        type="url"
                                        name="personal-website"
                                        id="personal-website"
                                        autocomplete="personal-website"
                                        placeholder="https://example.com"
                                        class="h-12 w-full rounded-xl border-2 border-stone-300 bg-transparent px-2"
                                    />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mt-6 flex items-center justify-end gap-x-6">
                    <button type="button" class="text-sm font-semibold leading-6 text-gray-900">Cancel</button>
                    <button
                        type="submit"
                        class="inline-flex h-12 items-center justify-center rounded-xl bg-sky-500 px-4 text-white transition-colors ease-in-out hover:bg-sky-400"
                    >
                        Save
                    </button>
                </div>
            </form>
        </main>
    </body>
</html>
