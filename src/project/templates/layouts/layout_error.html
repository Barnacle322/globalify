{% extends "layouts/base.html" %}

{% block content %}
<div class="flex min-h-[60vh] flex-col items-center justify-center gap-3 px-6 text-center">
    <div class="text-6xl font-semibold text-slate-900">{% block status_code %}{% endblock %}</div>
    <div class="text-xl text-slate-600">{% block status_message %}{% endblock %}</div>
    <a
        href="/"
        class="mt-4 rounded-xl bg-slate-900 px-5 py-3 text-sm font-medium text-white transition-colors hover:bg-slate-700"
        >Back to home</a
    >
</div>
{% endblock %}
