{% macro render() %}
<template id="investor-registration-template">
    <div class="fixed mx-auto flex w-full max-w-xl flex-col gap-9">
        <h1 class="text-4xl">Investor Account Application</h1>
        <div class="flex flex-col gap-1 rounded-lg border p-4">
            <h2>Welcome!</h2>
            <p class="text-sm text-gray-500">
                We are excited to have you join our platform. Please fill out the following information to get started.
            </p>
            <button class="hover mt-4 w-fit rounded-md bg-black px-3 py-2 text-white" @click="openRegistrationPage">
                Start Application
            </button>
        </div>
    </div>
</template>
{% endmacro %}
