{% extends "layouts/base.html" %}

{% block title %}History{% endblock %}

{% block content %}
<div class="min-h-screen bg-paper">
    <main class="flex w-full flex-col p-4 sm:p-6">
                <input type="hidden" id="csrf_token" name="csrf_token" value="{{ csrf_token() }}" />
                <h2 class="font-display text-3xl font-semibold sm:text-4xl">Search History</h2>

                <div
                    class="relative mt-5 flex h-10 max-w-lg items-center divide-x divide-rule rounded-xl border border-brand bg-surface shadow-md"
                >
                    <input
                        id="search"
                        class="h-full flex-grow border-0 bg-transparent px-3 text-sm focus:ring-0"
                        placeholder="Search"
                        v-model="searchString"
                        @input="handleSearch"
                    />
                    <div class="flex h-full items-center" ref="dropdownContainer">
                        <button
                            @click="dropdownOpened = !dropdownOpened"
                            class="flex h-full items-center gap-2 px-4 transition-colors"
                        >
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                fill="none"
                                viewBox="0 0 24 24"
                                stroke-width="1.5"
                                stroke="currentColor"
                                class="size-5"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M10.5 6h9.75M10.5 6a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-9.75 0h9.75"
                                />
                            </svg>
                            <span
                                class="shrink-0 text-sm"
                                v-text="historyTypes.find(type => type.value === searchType)?.readable || 'All' "
                            >
                            </span>
                        </button>
                        <transition enter-active-class="animate-zoom-in" leave-active-class="animate-zoom-out">
                            <div
                                v-if="dropdownOpened"
                                class="absolute right-0 top-full z-50 mt-1 rounded-lg border border-rule bg-surface p-1 text-sm shadow-lg"
                            >
                                <button
                                    @click="selectType('all')"
                                    class="flex w-full gap-2 rounded-md px-2 py-1.5 hover:bg-brand hover:text-white"
                                >
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        fill="none"
                                        viewBox="0 0 24 24"
                                        stroke-width="1.5"
                                        stroke="currentColor"
                                        class="size-5"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            d="M6 6.878V6a2.25 2.25 0 0 1 2.25-2.25h7.5A2.25 2.25 0 0 1 18 6v.878m-12 0c.235-.083.487-.128.75-.128h10.5c.263 0 .515.045.75.128m-12 0A2.25 2.25 0 0 0 4.5 9v.878m13.5-3A2.25 2.25 0 0 1 19.5 9v.878m0 0a2.246 2.246 0 0 0-.75-.128H5.25c-.263 0-.515.045-.75.128m15 0A2.25 2.25 0 0 1 21 12v6a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 18v-6c0-.98.626-1.813 1.5-2.122"
                                        />
                                    </svg>

                                    <span>All</span>
                                </button>

                                <button
                                    v-for="type in historyTypes"
                                    @click="selectType(type.value)"
                                    class="flex w-full gap-2 whitespace-nowrap rounded-md px-2 py-1.5 hover:bg-brand hover:text-white"
                                >
                                    <svg
                                        v-if="type.value === 'investor'"
                                        xmlns="http://www.w3.org/2000/svg"
                                        fill="none"
                                        viewBox="0 0 24 24"
                                        stroke-width="1.5"
                                        stroke="currentColor"
                                        class="size-5"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"
                                        />
                                    </svg>
                                    <svg
                                        v-if="type.value === 'investmentfirm'"
                                        xmlns="http://www.w3.org/2000/svg"
                                        fill="none"
                                        viewBox="0 0 24 24"
                                        stroke-width="1.5"
                                        stroke="currentColor"
                                        class="size-5"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3.75h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Z"
                                        />
                                    </svg>
                                    <svg
                                        v-if="type.value === 'company'"
                                        xmlns="http://www.w3.org/2000/svg"
                                        fill="none"
                                        viewBox="0 0 24 24"
                                        stroke-width="1.5"
                                        stroke="currentColor"
                                        class="size-5"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            d="M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.277-4.216.42-6.378.42s-4.291-.143-6.378-.42c-1.085-.144-1.872-1.086-1.872-2.18v-4.25m16.5 0a2.18 2.18 0 0 0 .75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 0 0-3.413-.387m4.5 8.006c-.194.165-.42.295-.673.38A23.978 23.978 0 0 1 12 15.75c-2.648 0-5.195-.429-7.577-1.22a2.016 2.016 0 0 1-.673-.38m0 0A2.18 2.18 0 0 1 3 12.489V8.706c0-1.081.768-2.015 1.837-2.175a48.111 48.111 0 0 1 3.413-.387m7.5 0V5.25A2.25 2.25 0 0 0 13.5 3h-3a2.25 2.25 0 0 0-2.25 2.25v.894m7.5 0a48.667 48.667 0 0 0-7.5 0M12 12.75h.008v.008H12v-.008Z"
                                        />
                                    </svg>
                                    <span v-text="type.readable"></span>
                                </button>
                            </div>
                        </transition>
                    </div>
                </div>

                <div class="mb-4 mt-4 flex flex-col sm:mt-6" v-for="[day, histories] of searchHistories" :key="day">
                    <span class="mb-1 text-lg font-medium text-soft" v-text="formatDate(day)"></span>
                    <transition-group name="list" tag="div">
                        <div
                            class="group flex gap-4 rounded-lg p-2 transition-colors ease-in-out hover:bg-panel"
                            v-for="item in histories"
                            :key="item.id"
                        >
                            <div class="hidden min-w-24 items-center gap-3 sm:flex">
                                <input
                                    class="rounded-sm border-2"
                                    type="checkbox"
                                    :checked="selectedItems.has(item.id)"
                                    @click.stop="toggleSelection(item.id)"
                                />
                                <span class="text-sm" v-text="item.created_at"></span>
                            </div>
                            <a
                                :href="`/search${ item.type === 'investmentfirm' ? '/investment-firms': item.type === 'company' ? '/companies' : ''}?search=${ item.query }`"
                                class="flex w-full items-center gap-3 sm:gap-2"
                            >
                                <svg
                                    v-if="item.type === 'investor'"
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                    class="size-5"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"
                                    />
                                </svg>
                                <svg
                                    v-if="item.type === 'investmentfirm'"
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                    class="size-5"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3.75h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Z"
                                    />
                                </svg>
                                <svg
                                    v-if="item.type === 'company'"
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                    class="size-5"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.277-4.216.42-6.378.42s-4.291-.143-6.378-.42c-1.085-.144-1.872-1.086-1.872-2.18v-4.25m16.5 0a2.18 2.18 0 0 0 .75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 0 0-3.413-.387m4.5 8.006c-.194.165-.42.295-.673.38A23.978 23.978 0 0 1 12 15.75c-2.648 0-5.195-.429-7.577-1.22a2.016 2.016 0 0 1-.673-.38m0 0A2.18 2.18 0 0 1 3 12.489V8.706c0-1.081.768-2.015 1.837-2.175a48.111 48.111 0 0 1 3.413-.387m7.5 0V5.25A2.25 2.25 0 0 0 13.5 3h-3a2.25 2.25 0 0 0-2.25 2.25v.894m7.5 0a48.667 48.667 0 0 0-7.5 0M12 12.75h.008v.008H12v-.008Z"
                                    />
                                </svg>
                                <div class="flex flex-col items-baseline sm:flex-row sm:gap-2">
                                    <span class="font-medium" v-text="item.query"></span>
                                    <span class="text-sm text-soft" v-text="item.readable_type"></span>
                                </div>
                                <span class="mb-auto ml-auto text-xs sm:hidden" v-text="item.created_at"></span>
                            </a>
                            <button
                                @click.stop="deleteItems([item.id])"
                                class="my-auto flex size-8 items-center justify-center rounded-lg font-medium text-faint transition-opacity hover:bg-rule hover:text-red-500 group-hover:opacity-100"
                            >
                                X
                            </button>
                        </div>
                    </transition-group>
                </div>
                <div class="mt-4 h-2" ref="historySentinel"></div>
                <div class="m-3 flex items-center justify-center" v-if="loading">
                    <svg class="size-6 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle
                            class="opacity-25"
                            cx="12"
                            cy="12"
                            r="10"
                            stroke="currentColor"
                            stroke-width="4"
                        ></circle>
                        <path
                            class="opacity-75"
                            fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                        ></path>
                    </svg>
                </div>
            </main>
</div>
{% endblock %}
