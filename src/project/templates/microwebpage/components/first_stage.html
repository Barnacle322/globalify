{% macro render() %}
<script type="text/x-template" id="first-stage-template">
    <div class="mx-auto mt-4 flex h-full w-full max-w-xl flex-col justify-center gap-9 overflow-y-auto">
        <!-- Hidden Inputs -->
        <div>
            <input type="hidden" />
            <input type="hidden" />
        </div>

        <!-- Header Section -->
        <div class="flex flex-col gap-2">
            <h1 class="text-4xl font-medium">Step 1 of 2: Main</h1>
            <span>Please fill out main important fields.</span>
        </div>

        <!-- Input Fields -->
        <div class="grid grid-cols-2 gap-x-4 gap-y-6">
            <div class="flex items-center">
                <label for="logo" class="text-sm font-medium text-gray-700">Logo (PNG)</label>
            </div>
            <div>
                <input
                    class="w-full rounded-lg border border-black bg-white p-2"
                    @change="handleLogoUpload"
                    type="file"
                    id="logo"
                    ref="logoInput"
                />
            </div>

            <div class="flex items-center">
                <label for="hero_title" class="text-sm font-medium text-gray-700">Hero Title</label>
            </div>
            <div class="border-b-emerald-400">
                <input
                    class="w-full rounded-lg border-black bg-white"
                    v-model="formData.hero_title"
                    type="text"
                    id="hero_title"
                    placeholder="Your compelling headline (e.g., 'Innovating for a Better Tomorrow')"
                    required
                />
                <span v-if="errors.hero_title" class="text-sm text-red-500">[[ errors.hero_title ]]</span>
            </div>

            <div class="flex items-center">
                <label for="hero_subtitle" class="text-sm font-medium text-gray-700">Hero Subtitle</label>
            </div>
            <div>
                <input
                    class="w-full rounded-lg bg-white"
                    v-model="formData.hero_subtitle"
                    type="text"
                    id="hero_subtitle"
                    placeholder="Brief description of who you serve (e.g., 'Empowering small businesses with AI solutions')"
                    required
                />
                <span v-if="errors.hero_subtitle" class="text-sm text-red-500">[[ errors.hero_subtitle ]]</span>
            </div>

            <div class="flex items-center">
                <label class="text-sm font-medium text-gray-700" for="mission_title">Mission Title</label>
            </div>
            <div>
                <input
                    class="w-full rounded-lg bg-white"
                    v-model="formData.mission_title"
                    type="text"
                    id="mission_title"
                    placeholder="What drives your company? (e.g., 'Our Commitment to Excellence')"
                    required
                />
                <span v-if="errors.mission_title" class="text-sm text-red-500">[[ errors.mission_title ]]</span>
            </div>

            <div class="flex items-center">
                <label class="text-sm font-medium text-gray-700" for="mission_statement">Mission Statement</label>
            </div>
            <div>
                <input
                    class="w-full rounded-lg bg-white"
                    v-model="formData.mission_statement"
                    type="text"
                    id="mission_statement"
                    placeholder="Your company's purpose in 1-2 sentences (e.g., 'We exist to simplify technology for everyday users')"
                    required
                />
                <span v-if="errors.mission_statement" class="text-sm text-red-500">[[ errors.mission_statement ]]</span>
            </div>

            <div class="flex items-center">
                <label class="text-sm font-medium text-gray-700" for="leadership_title">Leadership Title</label>
            </div>
            <div>
                <input
                    class="w-full rounded-lg bg-white"
                    v-model="formData.leadership_title"
                    type="text"
                    id="leadership_title"
                    placeholder="Section header for leadership (e.g., 'Meet Our Visionary Team')"
                    required
                />
                <span v-if="errors.leadership_title" class="text-sm text-red-500">[[ errors.leadership_title ]]</span>
            </div>

            <div class="flex items-center">
                <label class="text-sm font-medium text-gray-700" for="leadership_subtitle">Leadership Subtitle</label>
            </div>
            <div>
                <input
                    class="w-full rounded-lg bg-white"
                    v-model="formData.leadership_subtitle"
                    type="text"
                    id="leadership_subtitle"
                    placeholder="Brief intro about your team (e.g., 'Experienced professionals driving innovation')"
                    required
                />
                <span v-if="errors.leadership_subtitle" class="text-sm text-red-500">[[ errors.leadership_subtitle ]]</span>
            </div>

            <div class="flex items-center">
                <label class="text-sm font-medium text-gray-700" for="customer_testimonials_title">Customer Testimonials Title</label>
            </div>
            <div>
                <input
                    class="w-full rounded-lg bg-white"
                    v-model="formData.customer_testimonials_title"
                    type="text"
                    id="customer_testimonials_title"
                    placeholder="Section header for testimonials (e.g., 'What Our Clients Say')"
                    required
                />
                <span v-if="errors.customer_testimonials_title" class="text-sm text-red-500">[[ errors.customer_testimonials_title ]]</span>
            </div>

            <div class="flex items-center">
                <label class="text-sm font-medium text-gray-700" for="customer_testimonials_subtitle">Customer Testimonials Subtitle</label>
            </div>
            <div>
                <input
                    class="w-full rounded-lg bg-white"
                    v-model="formData.customer_testimonials_subtitle"
                    type="text"
                    id="customer_testimonials_subtitle"
                    placeholder="Intro to testimonials (e.g., 'Hear from businesses we've transformed')"
                    required
                />
                <span v-if="errors.customer_testimonials_subtitle" class="text-sm text-red-500">[[ errors.customer_testimonials_subtitle ]]</span>
            </div>

            <!-- Image Upload -->
            <div class="flex items-center">
                <label for="company_images" class="text-sm font-medium text-gray-700">Company Photos</label>
            </div>
            <div>
                <input
                    class="w-full rounded-lg border border-black bg-white p-2"
                    @change="handleImageUpload"
                    type="file"
                    id="company_images"
                    ref="imageInput"
                    multiple
                    accept="image/*"
                />
                <div class="mt-2 grid grid-cols-3 gap-2" v-if="formData.images.length > 0">
                    <div v-for="(image, index) in formData.images" :key="index" class="relative">
                        <img :src="image.preview" class="h-24 w-full rounded-md object-cover" />
                        <button
                            @click="removeImage(index)"
                            class="absolute right-1 top-1 rounded-full bg-red-500 p-1 text-white"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                </div>
                <span v-if="errors.images" class="text-sm text-red-500">[[ errors.images ]]</span>
            </div>
        </div>

        <!-- Navigation -->
        <div class="flex justify-between">
            <button
                class="mt-4 w-fit rounded-md bg-gray-300 px-3 py-2 text-black transition-colors ease-in-out hover:bg-gray-200"
                @click="goBack"
            >
                <div class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                    </svg>
                    <span>Back</span>
                </div>
            </button>
            <button class="bg-deep-purple mt-4 w-fit rounded-md px-3 py-2 text-white hover:scale-102" @click="nextPage">
                <div class="flex items-center gap-2">
                    <span>Continue</span>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
                    </svg>
                </div>
            </button>
        </div>
    </div>
</script>
{% endmacro %}
