{% macro render(user) %}
<template id="zero-step-registration-template">
    <div class="flex h-full w-full max-w-3xl flex-col justify-center gap-6">
        <transition enter-active-class="animate-fade-in" leave-active-class="animate-fade-out">
            <div
                v-if="selectedInvestorSlug"
                @click="selectedInvestorSlug = null"
                class="fixed left-0 top-0 z-50 h-full w-full bg-black/70"
            ></div>
        </transition>
        <transition enter-active-class="animate-slide-in-right" leave-active-class="animate-slide-out-right">
            <full-investor
                @close-investor="selectedInvestorSlug = null"
                :slug="selectedInvestorSlug"
                :rendercontacts="false"
                v-if="selectedInvestorSlug"
            ></full-investor>
        </transition>
        <input type="hidden" ref="userFirstName" value="{{ user.user_info.first_name }}" />
        <input type="hidden" ref="userLastName" value="{{ user.user_info.last_name }}" />
        <div class="flex flex-col gap-2">
            <h1 class="text-3xl font-medium">Try to find your profile using the search below!</h1>
            <span class="text-gray-600">Please review the investors below to confirm your identity.</span>
        </div>
        <div class="flex flex-col items-center justify-center gap-10 rounded-2xl bg-deep-purple px-5 py-10">
            <h1
                class="w-fit bg-gradient-to-r from-[#36B7FF] to-[#DE7CC8] bg-clip-text p-3 text-center text-3xl font-bold tracking-tight text-transparent sm:text-4xl xl:text-5xl"
            >
                Globalify Investors
            </h1>
            <div
                class="mx-auto flex w-full gap-2 rounded-full border-2 bg-white py-2 pr-3 text-2xl placeholder:text-2xl"
            >
                <input
                    type="search"
                    ref="searchInput"
                    class="w-full border-0 bg-transparent py-3 pl-6 pr-0 focus:ring-0"
                    placeholder="Search"
                    autocapitalize="off"
                    autocorrect="off"
                    autocomplete="off"
                    aria-autocomplete="both"
                    required
                    @input="debouncedInvestors"
                />
            </div>
        </div>
        <div class="grid max-h-full grid-cols-1 gap-4 overflow-visible sm:grid-cols-2">
            <article
                v-for="investor in investors"
                :key="investor.id"
                class="shadow-card-hover flex flex-col rounded-lg bg-white p-6 transition-shadow ease-in-out"
            >
                <div class="flex items-center justify-between">
                    <button
                        @click="selectInvestorSlug(investor.slug)"
                        v-text="investor.name"
                        class="text-xl font-bold leading-none"
                    ></button>
                </div>
                <div class="mt-5 flex flex-col gap-2 text-sm">
                    <div v-if="investor.location" class="grid grid-cols-2">
                        <span class="inline-flex items-center gap-1 text-gray-700">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                fill="none"
                                viewBox="0 0 24 24"
                                stroke-width="1.5"
                                stroke="currentColor"
                                class="size-5"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
                                />
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"
                                />
                            </svg>
                            Location
                        </span>
                        <span v-text="investor.location"></span>
                    </div>
                    <div v-if="investor.firm_name" class="grid grid-cols-2 text-sm">
                        <span class="inline-flex items-center gap-1 text-gray-700">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                fill="none"
                                viewBox="0 0 24 24"
                                stroke-width="1.5"
                                stroke="currentColor"
                                class="size-5"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.277-4.216.42-6.378.42s-4.291-.143-6.378-.42c-1.085-.144-1.872-1.086-1.872-2.18v-4.25m16.5 0a2.18 2.18 0 0 0 .75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 0 0-3.413-.387m4.5 8.006c-.194.165-.42.295-.673.38A23.978 23.978 0 0 1 12 15.75c-2.648 0-5.195-.429-7.577-1.22a2.016 2.016 0 0 1-.673-.38m0 0A2.18 2.18 0 0 1 3 12.489V8.706c0-1.081.768-2.015 1.837-2.175a48.111 48.111 0 0 1 3.413-.387m7.5 0V5.25A2.25 2.25 0 0 0 13.5 3h-3a2.25 2.25 0 0 0-2.25 2.25v.894m7.5 0a48.667 48.667 0 0 0-7.5 0M12 12.75h.008v.008H12v-.008Z"
                                />
                            </svg>
                            Company
                        </span>
                        <span v-text="investor.firm_name"></span>
                    </div>
                    <div v-if="investor.rounds.length !== 0" class="mt-5 flex flex-col gap-2">
                        <span class="flex gap-1 text-sm text-gray-700"
                            ><svg
                                xmlns="http://www.w3.org/2000/svg"
                                fill="none"
                                viewBox="0 0 24 24"
                                stroke-width="1.5"
                                stroke="currentColor"
                                class="size-5"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M2.25 18.75a60.07 60.07 0 0 1 15.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 0 1 3 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 0 0-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 0 1-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 0 0 3 15h-.75M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm3 0h.008v.008H18V10.5Zm-12 0h.008v.008H6V10.5Z"
                                />
                            </svg>
                            Series:
                        </span>
                        <div class="flex flex-wrap gap-1">
                            <a
                                v-for="round in investor.rounds"
                                :key="round.id"
                                class="text-nowrap rounded-full bg-[#ffdcfd] px-2 py-1.5 text-xs font-medium text-[#dd70d8]"
                                v-text="round"
                            >
                            </a>
                        </div>
                    </div>
                    <p
                        v-if="investor.industries"
                        v-text="investor.industries.join(', ')"
                        class="text-sm text-gray-500"
                    ></p>
                </div>
            </article>
            <article
                v-if="Array.isArray(investors) && investors.length == 0"
                class="col-span-full flex flex-col items-center justify-center gap-3"
            >
                <h2 class="text-2xl font-medium">Woah, a unicorn 🦄!</h2>
                <p class="max-w-lg text-center text-gray-600">
                    We can't seem to find you in our database. You can still create an account, just go back a step and
                    select an option to create a new account
                </p>
            </article>
        </div>
        <button
            class="mt-4 w-fit rounded-md bg-gray-300 px-3 py-2 text-black hover:bg-gray-400 hover:text-gray-800"
            @click="previousPage"
        >
            <div class="flex items-center gap-2">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="size-5"
                >
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
                <span>Back</span>
            </div>
        </button>
    </div>
</template>
{% endmacro %}
