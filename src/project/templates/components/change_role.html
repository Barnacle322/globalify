{% macro render(company) %}
<template id="change-role-template">
    <article
        class="fixed right-1/2 top-1/2 z-50 m-4 flex w-full max-w-2xl -translate-y-1/2 translate-x-1/2 flex-col gap-4 rounded-3xl bg-white px-8 py-6 transition-all"
    >
        <input type="hidden" ref="companyId" value="{{ company.id }}" />
        <div class="flex flex-col items-center justify-center gap-2">
            <button class="absolute right-3 top-3" @click="closeChangeRole">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="size-6"
                >
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                </svg>
            </button>
            <!-- Role Change Dropdown -->
            <div class="flex flex-col gap-1">
                <label class="font-medium" for="roleChange">Change Role: </label>
                <h1 v-text="user.id"></h1>
                <select class="h-12 w-full rounded-xl border border-stone-300 px-2" ref="roleChange">
                    <option value="owner" :selected="user.role === 'owner'">Owner</option>
                    <option value="admin" :selected="user.role === 'admin'">Admin</option>
                    <option value="employee" :selected="user.role === 'employee'">Employee</option>
                </select>
                <button class="mt-2 h-10 w-full rounded-xl bg-blue-500 text-white" @click="changeRole(user.id)">
                    Change Role
                </button>
            </div>
            <!-- Remove Member Button -->
            <button class="mt-4 px-4 py-2 bg-red-500 text-white rounded-xl" @click="removeMember(user.id)">
                Remove Member
            </button>
        </div>
    </article>
</template>
{% endmacro %}
