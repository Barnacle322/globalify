{% macro render(user) %}
<template id="gemini-template">
    <article
        class="fixed right-0 top-0 z-50 flex h-full w-full flex-col bg-gray-100 transition-all rounded-l-2xl"
        :class="isExpanded ? 'md:w-full' : 'md:w-4/5 lg:w-2/3 2xl:w-1/2'"
    >
        <nav
            class="sticky top-0 z-10 flex h-20 items-center justify-between bg-white px-4 py-4 sm:px-6 shadow-lg rounded-l-2xl"
        >
            <div class="flex items-center gap-3">
                <button @click="toggleHistory" class="rounded-lg p-2 transition-colors hover:bg-gray-100">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-6"
                    >
                        <path
                            v-if="isHistoryVisible"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3"
                        />
                        <path
                            v-else
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
                        />
                    </svg>
                </button>
                <button @click="createChat" class="flex items-center gap-2 rounded-lg px-3 py-2 hover:bg-gray-100">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-5"
                    >
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                    </svg>
                    New Chat
                </button>
            </div>

            <div class="flex gap-2">
                <button @click="toggleExpansion" class="hidden rounded-lg p-2 hover:bg-gray-100 md:block">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-5"
                        :class="{'rotate-180': isExpanded}"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"
                        />
                    </svg>
                </button>
                <button @click="closeGemini" class="rounded-lg p-2 hover:bg-gray-100">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-6"
                    >
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </nav>

        <main class="flex h-[90%] relative overflow-hidden">
            <transition name="history">
                <div
                    v-show="isHistoryVisible"
                    class="custom-scrollbar absolute h-full w-64 bg-slate-100 border-r p-3 overflow-y-auto"
                >
                    <div class="flex flex-col gap-3 bg-slate-100">
                        <div v-for="[date, chats] of userChats">
                            <span class="text-xs text-gray-500 px-2" v-text="date"></span>
                            <a v-for="chat in chats" :key="chat.id">
                                <div
                                    class="w-full cursor-pointer p-2 rounded-lg relative group"
                                    @click="selectChat(chat.id)"
                                    :class="selectedChatId === chat.id ? 'bg-sky-500 hover:bg-sky-400 ' : 'hover:bg-[#ccecff] '"
                                >
                                    <span
                                        class="block whitespace-nowrap overflow-hidden mask-linear-gradient mr-5 ml-2"
                                        :class="selectedChatId === chat.id ? 'text-white' : 'text-black'"
                                        v-text="chat.name"
                                    ></span>
                                    <span
                                        class="absolute top-0.5 right-1 text-xs tracking-tighter group-hover:opacity-0"
                                        :class="selectedChatId === chat.id ? 'text-slate-500' : 'text-gray-400'"
                                        v-text="formatChatTime(chat.created)"
                                    ></span>

                                    <button
                                        data-dropdown-button
                                        @click.stop="toggleDropdown(chat.id)"
                                        class="absolute top-1.5 right-1 hidden group-hover:block transition-colors rounded-lg ease-in-out hover:bg-gray-50"
                                    >
                                        <svg
                                            xmlns="http://www.w3.org/2000/svg"
                                            fill="none"
                                            viewBox="0 0 24 24"
                                            stroke-width="1.5"
                                            stroke="currentColor"
                                            class="size-7 text-gray-700"
                                        >
                                            <path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                d="M12 6.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 12.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 18.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Z"
                                            />
                                        </svg>
                                    </button>

                                    <transition
                                        enter-active-class="animate-zoom-in"
                                        leave-active-class="animate-zoom-out"
                                    >
                                        <div
                                            v-if="openedDropdownChatId === chat.id"
                                            class="absolute right-1 top-8 z-10 flex w-24 origin-top-right flex-col items-start justify-center gap-1 rounded-lg border border-gray-200 bg-white p-1 shadow-sm"
                                        >
                                            <h1
                                                class="flex w-full items-center gap-2 rounded-md px-2 py-1.5 text-start text-sm hover:bg-sky-500 hover:text-white"
                                                :href="`/chat/rename/${chat.id}`"
                                            >
                                                <span>Rename</span>
                                                <svg
                                                    xmlns="http://www.w3.org/2000/svg"
                                                    fill="none"
                                                    viewBox="0 0 24 24"
                                                    stroke-width="1.5"
                                                    stroke="currentColor"
                                                    class="size-4"
                                                >
                                                    <path
                                                        stroke-linecap="round"
                                                        stroke-linejoin="round"
                                                        d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10"
                                                    />
                                                </svg>
                                            </h1>
                                            <h1
                                                class="flex w-full items-center gap-2 rounded-md text-red-600 px-2 py-1.5 text-start text-sm hover:bg-sky-500 hover:text-white"
                                                :href="`/chat/delete/${chat.id}`"
                                            >
                                                <span>Delete</span>
                                                <svg
                                                    xmlns="http://www.w3.org/2000/svg"
                                                    fill="none"
                                                    viewBox="0 0 24 24"
                                                    stroke-width="1.5"
                                                    stroke="currentColor"
                                                    class="w-5 h-5"
                                                >
                                                    <path
                                                        stroke-linecap="round"
                                                        stroke-linejoin="round"
                                                        d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"
                                                    />
                                                </svg>
                                            </h1>
                                        </div>
                                    </transition>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>
            </transition>
            <div
                class="flex-1 flex flex-col overflow-hidden transition-all duration-300 relative"
                :class="{'ml-64': isHistoryVisible}"
            >
                <input type="hidden" id="csrf_token" name="csrf_token" value="{{ csrf_token() }}" />
                <div class="flex-1 overflow-y-auto p-4 custom-scrollbar" ref="chatContainer">
                    <template v-if="response.length">
                        <div
                            v-for="(message, index) in response"
                            :key="index"
                            class="flex mb-4"
                            :class="{'justify-end': message.type === 'user'}"
                        >
                            <div
                                class="max-w-[75%] rounded-xl p-3 shadow-lg relative"
                                :class="{
                                'bg-sky-500 text-white rounded-br-none': message.type === 'user',
                                'bg-white text-gray-800 rounded-bl-none': message.type === 'gemini'
                            }"
                            >
                                <div v-text="message.content"></div>
                                <div
                                    class="absolute -bottom-2 w-3 h-3"
                                    :class="{
                                    'right-0 bg-sky-500': message.type === 'user',
                                    'left-0 bg-white': message.type === 'gemini'
                                    }"
                                    :style="{
                                    clipPath: message.type === 'user' 
                                    ? 'polygon(0 0, 100% 0, 100% 100%)' 
                                    : 'polygon(0 0, 100% 0, 0 100%)'
                                    }"
                                ></div>
                            </div>
                        </div>
                    </template>
                    <div v-else class="flex">
                        <div
                            class="bg-white text-gray-800 rounded-xl rounded-bl-none p-4 shadow-lg max-w-[75%] relative"
                        >
                            Hi there! I'm Gemini, your virtual assistant. How can I help you today?
                            <div
                                class="absolute -bottom-2 left-0 w-3 h-3 bg-white"
                                style="clip-path: 'polygon(0 0, 100% 0, 100% 100%)"
                            ></div>
                        </div>
                    </div>
                </div>

                <div class="sticky bottom-0 left-0 right-0 p-4 bg-white border-t border-gray-200">
                    <div class="relative flex items-center">
                        <div
                            ref="prompt"
                            contenteditable="true"
                            class="w-full p-4 pr-12 rounded-xl outline-none max-h-48 border-2 border-sky-500 bg-white shadow-sm"
                        ></div>
                        <button
                            @click="sendMessage(selectedChatId)"
                            class="absolute right-2 top-1/2 -translate-y-1/2 p-2 rounded-lg hover:bg-sky-100 transition-colors"
                        >
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                fill="none"
                                viewBox="0 0 24 24"
                                stroke-width="1.5"
                                stroke="#0ea5e9"
                                class="size-6"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M6 12L3.269 3.125A59.769 59.769 0 0121.485 12 59.768 59.768 0 013.27 20.875L5.999 12zm0 0h7.5"
                                />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </article>
</template>

{% endmacro %}
