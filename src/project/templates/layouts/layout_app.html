<!doctype html>
<html lang="en">
    <head>
        {% block head %}
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Primary Meta Tags -->
        <meta name="title" content="Globalify — Connect to the whole world of investment" />
        <meta
            name="description"
            content="Join Globalify on a mission to help entrepreneurs expand their business around the world!"
        />

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://globalify.xyz/" />
        <meta property="og:title" content="Globalify — Connect to the whole world of investment" />
        <meta
            property="og:description"
            content="Join Globalify on a mission to help entrepreneurs expand their business around the world!"
        />
        <meta property="og:image" content="https://globalify.xyz/static/elements/metapreview.png" />

        <!-- Twitter -->
        <meta property="twitter:card" content="summary_large_image" />
        <meta property="twitter:url" content="https://globalify.xyz/" />
        <meta property="twitter:title" content="Globalify — Connect to the whole world of investment" />
        <meta
            property="twitter:description"
            content="Join Globalify on a mission to help entrepreneurs expand their business around the world!"
        />
        <meta property="twitter:image" content="https://globalify.xyz/static/elements/metapreview.png" />

        <meta name="view-transition" content="same-origin" />
        <link rel="stylesheet" href="/static/css/main.css" />
        <link rel="icon" type="image/png" href="/static/elements/icon.png" />
        <script src="/static/scripts/menu.js" defer></script>

        {% block additional_scripts %}{% endblock %}
        <title>{% block title %}{% endblock %} | Globalify</title>
        {% endblock %}
    </head>
    <body class="h-full">
        <nav class="mx-auto flex h-20 w-full max-w-7xl items-center justify-center bg-white px-4">
            <div class="flex w-full max-w-7xl items-center gap-7">
                <button class="block sm:hidden" onclick="openMenu()">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="h-7 w-7"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
                        />
                    </svg>
                </button>
                <a href="/search" class="relative flex items-center gap-1"
                    ><img class="hidden h-6 min-[640px]:block" src="/static/elements/logo-black.png" />
                    <div
                        class="hidden h-fit w-fit rounded-full bg-sky-500 px-1 py-1 text-[8px] font-medium leading-none tracking-tight text-white min-[640px]:block"
                    >
                        BETA
                    </div></a
                >
                <div class="hidden gap-7 text-sm min-[640px]:flex">
                    <a href="/search">Search</a>
                    <a target="_blank" href="https://hub.globalify.xyz">Knowledge Hub</a>
                    <a target="_blank" href="https://blog.globalify.xyz">Blog</a>
                </div>
            </div>
            <div class="relative ml-3">
                <button
                    type="button"
                    class="flex h-8 w-8 items-center justify-center rounded-full bg-gray-400 text-sm"
                    id="user-menu-button"
                    aria-expanded="false"
                    aria-haspopup="true"
                >
                    <span class="sr-only">Open user menu</span>
                    {% if not current_user.user_info.picture_url %}
                    <img
                        class="aspect-square h-6 w-6 rounded-full"
                        src="/static/elements/default_pfp.svg"
                        alt="Profile picture"
                    />
                    {% else %}
                    <img
                        class="aspect-square h-8 w-8 rounded-full"
                        src="{{ current_user.user_info.picture_url }}"
                        alt="Profile picture"
                    />
                    {% endif %}
                </button>
                <div
                    class="pointer-events-none absolute right-0 z-10 mt-2 w-48 origin-top-right scale-95 transform rounded-md bg-white py-1 opacity-0 shadow-lg ring-1 ring-black ring-opacity-5 transition duration-100 ease-in-out focus:outline-none"
                    id="user-menu"
                    role="menu"
                    aria-orientation="vertical"
                    aria-labelledby="user-menu-button"
                    tabindex="-1"
                >
                    <a
                        href="/profile/{{ current_user.id }}"
                        class="block px-4 py-2 text-sm text-gray-700 transition-colors duration-100 ease-in hover:bg-gray-100"
                        role="menuitem"
                        tabindex="-1"
                        id="user-menu-item-0"
                        >Profile</a
                    >

                    <a
                        href="/settings"
                        class="block px-4 py-2 text-sm text-gray-700 transition-colors duration-100 ease-in hover:bg-gray-100"
                        role="menuitem"
                        tabindex="-1"
                        id="user-menu-item-1"
                        >Settings</a
                    >
                    <a
                        href="/bookmarks"
                        class="block px-4 py-2 text-sm text-gray-700 transition-colors duration-100 ease-in hover:bg-gray-100"
                        role="menuitem"
                        tabindex="-1"
                        id="user-menu-item-2"
                        >Bookmarks</a
                    >
                    <a
                        href="/logout"
                        class="block px-4 py-2 text-sm text-gray-700 transition-colors duration-100 ease-in hover:bg-gray-100"
                        role="menuitem"
                        tabindex="-1"
                        id="user-menu-item-2"
                        >Logout</a
                    >
                </div>
            </div>
        </nav>
        <div id="menu" class="hidden sm:hidden" role="dialog" aria-modal="true">
            <div
                class="fixed inset-y-0 right-0 z-50 w-full overflow-y-auto bg-white px-9 py-8 sm:max-w-sm sm:ring-gray-900/10"
            >
                <div class="flex items-center justify-between">
                    <a href="/search" class="relative -m-1.5 flex items-center gap-1 p-1.5">
                        <span class="sr-only">Globalify</span>
                        <img class="h-8 w-auto" src="/static/elements/logo-black.png" alt="" />
                        <div
                            class="h-fit w-fit rounded-full bg-sky-500 px-1 py-1 text-[8px] font-medium leading-none tracking-tight text-white"
                        >
                            BETA
                        </div>
                    </a>
                    <button type="button" class="-m-2.5 rounded-md p-2.5 text-gray-700" onclick="closeMenu()">
                        <span class="sr-only">Close menu</span>
                        <svg
                            class="h-6 w-6"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="1.5"
                            stroke="currentColor"
                            aria-hidden="true"
                        >
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                <div class="mt-6 flow-root">
                    <div class="-my-6 divide-y divide-gray-500/10">
                        <div class="space-y-2 py-6">
                            <a
                                href="/search"
                                class="-mx-3 block rounded-lg px-3 py-2 text-base leading-7 text-gray-900 hover:bg-slate-100"
                                >Search</a
                            >
                            <a
                                href="https://hub.globalify.xyz"
                                class="-mx-3 block rounded-lg px-3 py-2 text-base leading-7 text-gray-900 hover:bg-slate-100"
                                >Knowledge Hub</a
                            >
                            <a
                                href="https://blog.globalify.xyz"
                                class="-mx-3 block rounded-lg px-3 py-2 text-base leading-7 text-gray-900 hover:bg-slate-100"
                                >Blog</a
                            >
                        </div>
                    </div>
                </div>
            </div>
        </div>

        {% block content %} {% endblock %}
    </body>
</html>
