{% macro render(user) %}
<template id="upload-file-template">
    <!doctype html>
    <html lang="en">
        <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />

            <!-- Primary Meta Tags -->
            <meta name="title" content="Deck | Globalify User Profile" />
            <meta name="description" content="{{ description }}" />

            <!-- Open Graph / Facebook -->
            <meta property="og:type" content="website" />
            <meta property="og:url" content="https://globalify.xyz/" />
            <meta property="og:title" content="Deck | Globalify User Profile" />
            <meta property="og:description" content="{{ description }}" />
            <meta property="og:image" content="https://globalify.xyz/static/elements/metapreview.png" />

            <!-- Twitter -->
            <meta property="twitter:card" content="summary_large_image" />
            <meta property="twitter:url" content="https://globalify.xyz/" />
            <meta property="twitter:title" content="Deck | Globalify User Profile" />
            <meta property="twitter:description" content="{{ description }}" />
            <meta property="twitter:image" content="https://globalify.xyz/static/elements/metapreview.png" />

            <link rel="stylesheet" href="/static/css/main.css" />
            <link rel="icon" type="image/png" href="/static/elements/icon.png" />

            <!-- Vue -->
            <script src="https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.global.min.js"></script>

            <script src="/static/vue/base.js"></script>
            <script defer src="/static/vue/deck.js"></script>

            <!-- Font -->
            <link rel="preconnect" href="https://fonts.googleapis.com" />
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
            <link
                href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
                rel="stylesheet"
            />

            <title>| Globalify Pitch deck</title>
        </head>

        <!-- prettier-ignore -->
        {#        {% import "components/navbar.html" as navbar %}#}
{#    {{ navbar.render(current_user) }}#}

        <body class="h-full overflow-x-clip" id="app">
            <navbar-component @open-aside="asideExpanded = true, asideMinified = !asideMinified"></navbar-component>
            <div class="max-w-8xl relative mx-auto flex h-full min-h-screen w-full">
                <aside-component :minified="asideMinified"></aside-component>
                <transition enter-active-class="pop-in" leave-active-class="pop-out">
                    <div
                        v-if="asideExpanded"
                        @click="asideExpanded = false"
                        class="fixed top-0 z-50 block h-full w-full bg-black/60 lg:hidden"
                    ></div>
                </transition>
                <transition enter-active-class="animate-slide-in-left" leave-active-class="animate-slide-out-left">
                    <aside-mobile-component
                        v-if="asideExpanded"
                        @close-aside="asideExpanded = false"
                    ></aside-mobile-component>
                </transition>
                <main class="flex h-screen w-full flex-col items-center gap-5 px-4 pt-5 pb-16 sm:px-9">
                    <div class="mx-auto mt-[50px] w-full max-w-4xl shadow-md">
                        <!-- Upload Section -->
                        <div
                            class="rounded-lg bg-white p-10 shadow-[0_10px_20px_rgba(0,0,0,0.15),0_4px_6px_rgba(0,0,0,0.1)]"
                        >
                            <!-- User Prompt -->
                            <div class="mb-8 text-center">
                                <h2 class="text-3xl font-semibold text-gray-800">Upload Your Presentation</h2>
                                <p class="mt-2 text-lg text-gray-500">
                                    "Eager to get feedback on your presentation? Upload your PDF here and let us analyze
                                    it for insights!"
                                </p>
                            </div>

                            <!-- File Input Section -->
                            <div class="flex flex-col items-center justify-center">
                                <div
                                    v-if="filename"
                                    class="mb-2 text-gray-700"
                                    v-text="'Selected File: ' + filename"
                                ></div>
                                <input type="hidden" id="csrf_token" name="csrf_token" value="{{ csrf_token() }}" />

                                <!-- File Input -->
                                <label
                                    for="pdf-upload"
                                    class="cursor-pointer rounded-lg bg-gradient-to-r from-sky-400 to-sky-600 px-6 py-3 text-lg text-white shadow-md transition-all duration-300 ease-in-out hover:scale-105"
                                >
                                    Upload File
                                    <input
                                        id="pdf-upload"
                                        type="file"
                                        class="hidden"
                                        accept=".pdf"
                                        @change="handleFileUpload"
                                    />
                                </label>

                                <!-- Analyze Button -->
                                <button
                                    v-if="filename"
                                    class="mt-4 rounded-lg bg-green-500 px-4 py-2 font-bold text-white hover:bg-green-700"
                                    @click="analyzeFile"
                                >
                                    Analyze
                                </button>

                                <input id="file-upload" type="file" class="hidden" />

                                <div v-if="uploadStatus" class="mt-4 text-center" v-text="uploadStatus"></div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </body>
    </html>
</template>
{% endmacro %}
