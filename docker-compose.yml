# Globalify stack: app (granian WSGI) + Typesense. Postgres is a managed/external
# database — provide its connection string as `_DATABASE_URL` in .env.
#
# Secrets (SECRET_KEY, _DATABASE_URL, GEMINI_API_KEY, RESEND/R2/PADDLE/CAP, …) are read
# from .env via `env_file`. Service-to-service wiring (Typesense host, prod mode) is set
# explicitly under each service's `environment:` so it ALWAYS overrides whatever host/dev
# values happen to be in .env.
#
# Quickstart:
#   cp .env.example .env            # fill SECRET_KEY, _DATABASE_URL (+ GEMINI_API_KEY for semantic search)
#   docker compose up -d --build
#   docker compose run --rm app uv run flask --app project setup   # create tables + seed demo + build Typesense index
#   open http://localhost:8000
#
# See docs/deployment-docker-compose.md for prod notes (migrations, real data, semantic search).

services:
  typesense:
    image: typesense/typesense:30.2
    restart: unless-stopped
    command: ["--data-dir", "/data", "--api-key=${_TYPESENSE_API_KEY:-xyz}", "--enable-cors"]
    volumes:
      - typesense-data:/data
    ports:
      # Bound to localhost only — lets host tooling (flask reindex) reach Typesense.
      - "127.0.0.1:8108:8108"
    healthcheck:
      # Typesense ships curl in its image; fall back to a TCP probe if absent.
      test: ["CMD-SHELL", "curl -sf http://localhost:8108/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Explicit overrides — these win over .env so the deployed app is wired to the
      # sibling Typesense service and runs in production mode regardless of local .env
      # values. _DATABASE_URL is NOT set here: it comes from .env (managed database).
      FLASK_ENV: production
      PORT: "80"
      _TYPESENSE_HOST: typesense
      _TYPESENSE_PORT: "8108"
    depends_on:
      # The app degrades gracefully when Typesense is unreachable (browse returns
      # empty, search falls back), so `service_started` is sufficient here.
      typesense:
        condition: service_started
    ports:
      - "${APP_PORT:-8000}:80"

volumes:
  typesense-data:
