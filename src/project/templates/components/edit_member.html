{% macro render(company) %}
<template id="edit-member-template">
    <article
        class="fixed right-0 top-0 z-50 h-full w-full bg-white p-8 gap-4 flex flex-col sm:right-1/2 sm:top-1/2 sm:h-auto sm:max-w-2xl sm:-translate-y-1/2 sm:translate-x-1/2 sm:rounded-xl"
    >
        <button class="absolute right-3 top-3" @click="close">
            <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-6"
            >
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
        </button>
        <h2 class="text-xl font-medium">Edit [[ user.name ]] in {{ company.name }}</h2>
        <div class="grid grid-cols-12 gap-2">
            <div class="col-span-full flex flex-col gap-2">
                <label class="font-normal">Role</label>
                <select class="h-12 w-full rounded-xl border border-stone-300 px-2" ref="roleChange">
                    <option value="OWNER" :selected="user.role === 'owner'">Owner</option>
                    <option value="ADMIN" :selected="user.role === 'admin'">Admin</option>
                    <option value="TEAM" :selected="user.role === 'team'">Team</option>
                </select>

                <label class="font-normal">Position</label>
                <input
                    class="h-12 w-full rounded-xl border border-stone-300 px-2"
                    placeholder="CEO"
                    ref="positionChange"
                    v-text="user.position"
                    :value="user.position"
                />
            </div>
        </div>
        <button @click="removeMember(user.id, {{ company.id }})" class="underline w-fit text-red-500">
            Remove User
        </button>
        <button
            @click="changeRole(user.id, {{ company.id }})"
            class="mt-auto w-full rounded-xl bg-sky-400 px-3 py-2 text-white disabled:bg-gray-300 sm:mt-3"
        >
            Confirm
        </button>
    </article>
</template>
{% endmacro %}
