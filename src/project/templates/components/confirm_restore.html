{% macro render(user) %}
<template id="confirm-restore-template">
    <article
        class="fixed top-1/2 right-1/2 z-50 flex h-full w-full max-w-[800px] -translate-y-1/2 translate-x-1/2 flex-col overflow-y-auto bg-white transition-all ease-in-out md:max-h-96 md:rounded-3xl lg:w-2/3 xl:w-1/2"
    >
        <header class="sticky top-0 bg-white p-4">
            <span class="text-xl font-medium"
                >You are about to <b>revert</b> all changes made after claiming the profile. Are you sure you want to
                continue?
            </span>
        </header>

        <div class="grid grid-cols-12 gap-2 px-4">
            <div v-if="investor_point_origin.first_name" class="col-span-6 flex flex-col">
                <span class="font-semibold">First name</span>
                <span v-text="investor_point_origin.first_name"></span>
            </div>
            <div v-if="investor_point_origin.last_name" class="col-span-6 flex flex-col">
                <span class="font-semibold">Last name</span>
                <span v-text="investor_point_origin.last_name"></span>
            </div>
            <div v-if="investor_point_origin.firm_name" class="col-span-full flex flex-col md:col-span-4">
                <span class="font-semibold">Firm name</span>
                <span v-text="investor_point_origin.firm_name"></span>
            </div>
            <div v-if="investor_point_origin.position" class="col-span-full flex flex-col md:col-span-4">
                <span class="font-semibold">Position</span>
                <span v-text="investor_point_origin.position"></span>
            </div>
            <div v-if="investor_point_origin.location" class="col-span-full flex flex-col md:col-span-4">
                <span class="font-semibold">Location</span>
                <span v-text="investor_point_origin.location"></span>
            </div>
            <div v-if="investor_point_origin.about" class="col-span-full flex flex-col">
                <span class="font-semibold">About</span>
                <span v-text="investor_point_origin.about"></span>
            </div>
            <div v-if="investor_point_origin.website" class="col-span-full flex flex-col">
                <span class="font-semibold">Website</span>
                <span v-text="investor_point_origin.website"></span>
            </div>
            <div v-if="investor_point_origin.linkedin" class="col-span-full flex flex-col">
                <span class="font-semibold">Linkedin</span>
                <span v-text="investor_point_origin.linkedin"></span>
            </div>
            <div v-if="investor_point_origin.twitter" class="col-span-full flex flex-col">
                <span class="font-semibold">Twitter</span>
                <span v-text="investor_point_origin.twitter"></span>
            </div>
            <div v-if="investor_point_origin.email" class="col-span-full flex flex-col md:col-span-6">
                <span class="font-semibold">Email</span>
                <span v-text="investor_point_origin.email"></span>
            </div>
            <div v-if="investor_point_origin.phone_number" class="col-span-full flex flex-col md:col-span-6">
                <span class="font-semibold">Phone number</span>
                <span v-text="investor_point_origin.phone_number"></span>
            </div>
            <div v-if="investor_point_origin.n_investments" class="col-span-6 flex flex-col md:col-span-3">
                <span class="font-semibold">№ Investments</span>
                <span v-text="investor_point_origin.n_investments"></span>
            </div>
            <div v-if="investor_point_origin.n_exits" class="col-span-6 flex flex-col md:col-span-3">
                <span class="font-semibold">№ Exits</span>
                <span v-text="investor_point_origin.n_exits"></span>
            </div>
            <div v-if="investor_point_origin.min_investment" class="col-span-6 flex flex-col md:col-span-3">
                <span class="font-semibold">Min investment</span>
                <span v-text="investor_point_origin.min_investment"></span>
            </div>
            <div v-if="investor_point_origin.max_investment" class="col-span-6 flex flex-col md:col-span-3">
                <span class="font-semibold">Max investment</span>
                <span v-text="investor_point_origin.max_investment"></span>
            </div>

            <div v-if="notableInvestmentsTitles" class="col-span-full flex flex-col">
                <span class="font-semibold">Notable investments</span>
                <span v-text="notableInvestmentsTitles"></span>
            </div>
            <div v-if="roundsTitles" class="col-span-full flex flex-col">
                <span class="font-semibold">Rounds</span>
                <span v-text="roundsTitles"></span>
            </div>
            <div v-if="industriesTitles" class="col-span-full flex flex-col">
                <span class="font-semibold">Industries</span>
                <span v-text="industriesTitles"></span>
            </div>
        </div>

        <div class="mt-auto flex justify-end gap-5 p-4">
            <button @click="closeConfirmRestore" class="rounded-lg border border-gray-300 px-3 py-2">Cancel</button>
            <button @click="restorePointOrigin" class="rounded-lg bg-sky-400 px-3 py-2 text-white">Confirm</button>
        </div>
    </article>
</template>
{% endmacro %}
