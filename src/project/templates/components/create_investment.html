{% macro render(id, type, created_by_admin) %}
<template id="create-investment-template">
    <article
        class="fixed right-1/2 top-1/2 z-50 flex w-10/12 -translate-y-1/2 translate-x-1/2 flex-col gap-4 rounded-3xl bg-white px-8 py-6 transition-all sm:w-1/2 sm:rounded-xl xl:w-2/5"
    >
        <transition enter-active-class="animate-fade-in" leave-active-class="animate-fade-out">
            <div v-if="searchInvestmentOpened" class="fixed left-0 top-0 z-50 h-full w-full bg-black/70"></div>
        </transition>
        <transition enter-active-class="animate-slide-in-right" leave-active-class="animate-slide-out-right">
            <search-investment-component
                @close-search-investment="searchInvestmentOpened = null"
                v-if="searchInvestmentOpened"
            ></search-investment-component>
        </transition>
        <input type="hidden" id="csrf_token" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="grid grid-cols-6 gap-x-2 gap-y-1">
            <h2 class="col-span-full mt-3 text-2xl font-medium">General info</h2>

            {% if type != 'investor' and type != 'investment_firm' %}
            <div class="col-span-full">
                <label for="investor" class="text-sm font-medium text-gray-700">Investor</label>
                <input
                    @click="searchInvestmentOpened = true;"
                    class="w-full rounded-lg bg-transparent bg-white"
                    type="text"
                />
            </div>

            {% endif %} {% if type != 'investment_firm' and type != 'investor' %}
            <div class="col-span-full">
                <label for="investment_firm" class="text-sm font-medium text-gray-700">Investment Firm</label>
                <input class="w-full rounded-lg bg-transparent bg-white" type="text" />
            </div>

            {% endif %}

            <div class="col-span-full">
                <label for="custom_name">Custom Name</label>
                <input
                    class="w-full rounded-lg bg-transparent bg-white"
                    id="custom_name"
                    placeholder="Jhone Doe"
                    type="text"
                />
            </div>

            <div class="col-span-full">
                <label for="funding_round" class="text-sm font-medium text-gray-700">Funding Round</label>
                <div>
                    <select
                        id="funding_round"
                        name="funding_round"
                        class="h-12 w-full rounded-xl px-2"
                        v-model="selectedFundingRound"
                        required
                    >
                        <option value="" disabled selected>Select a funding round</option>
                        <option
                            v-for="funding_round in fundingRounds"
                            :key="funding_round.id"
                            :value="funding_round.id"
                            v-text="funding_round.company_name"
                        ></option>
                    </select>
                </div>
            </div>
            {% if type != 'company' %}
            <div class="col-span-full">
                <label class="text-sm font-medium text-gray-700" for="company_name">Custom Company name</label>
                <input
                    class="w-full rounded-lg bg-transparent bg-white"
                    type="text"
                    id="company_name"
                    placeholder="Globalify"
                    required
                />
            </div>
            {% endif %}

            <div class="col-span-full">
                <label class="text-sm font-medium text-gray-700" for="amount">Amount</label>
                <input class="w-full rounded-lg bg-transparent bg-white" type="number" id="amount" placeholder="14" />
            </div>
        </div>
        <div class="flex justify-end gap-5">
            <button @click="closeCreateInvestmentModal" class="rounded-lg border border-gray-300 px-3 py-2">
                Cancel
            </button>
            <button
                @click="createInvestment({{id}}, '{{type}}', '{{created_by_admin}}')"
                class="rounded-lg bg-sky-500 px-3 py-2 text-white hover:bg-sky-600"
            >
                Create
            </button>
        </div>
    </article>
</template>
{% endmacro %}
