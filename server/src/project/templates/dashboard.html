<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../static/css/main.css" />
        <meta name="view-transition" content="same-origin" />
        <script src="../static/scripts/dashboard.js" defer></script>

        <title>Dashboard</title>
    </head>
    <body class="h-full">
        <nav class="absolute left-0 top-0 flex h-24 w-full items-center justify-center bg-black text-white">
            <div class="flex w-full max-w-7xl items-center gap-7 px-9">
                <a href="/"><img class="h-[30px] w-[113px]" src="../static/elements/globalify.png" /></a>
                <div class="hidden gap-7 sm:flex">
                    <a href="">Search</a>
                    <a href="">Blog</a>
                    <a href="">Resources</a>
                    <a href="">Help</a>
                </div>
            </div>
            <div class="pr-9">
                <!-- <a href="/logout">Logout</a> -->
                <div class="relative ml-3">
                    <button
                        type="button"
                        class="w-8 h-8 items-center text-sm bg-gray-800 rounded-full"
                        id="user-menu-button"
                        aria-expanded="false"
                        aria-haspopup="true"
                    >
                        <span class="sr-only">Open user menu</span>
                        <img
                            class="w-8 h-8 rounded-full aspect-square"
                            src="data:image/png;base64,{{ pfp_base64 }}"
                            alt="Profile picture"
                        />
                    </button>
                    <div
                        class="absolute right-0 z-10 w-48 py-1 mt-2 transition duration-100 ease-in-out origin-top-right transform scale-95 bg-white rounded-md shadow-lg opacity-0 ring-1 ring-black ring-opacity-5 focus:outline-none"
                        id="user-menu"
                        role="menu"
                        aria-orientation="vertical"
                        aria-labelledby="user-menu-button"
                        tabindex="-1"
                    >
                        <!-- Active: "bg-gray-100", Not Active: "" -->
                        <a
                            href="/profile"
                            class="block px-4 py-2 text-sm text-gray-700 transition-colors duration-100 ease-in hover:bg-gray-100"
                            role="menuitem"
                            tabindex="-1"
                            id="user-menu-item-0"
                            >Profile</a
                        >

                        <a
                            href="/settings"
                            class="block px-4 py-2 text-sm text-gray-700 transition-colors duration-100 ease-in hover:bg-gray-100"
                            role="menuitem"
                            tabindex="-1"
                            id="user-menu-item-1"
                            >Settings</a
                        >

                        <a
                            href="/logout"
                            class="block px-4 py-2 text-sm text-gray-700 transition-colors duration-100 ease-in hover:bg-gray-100"
                            role="menuitem"
                            tabindex="-1"
                            id="user-menu-item-2"
                            >Logout</a
                        >
                    </div>
                </div>
            </div>
        </nav>
        <main class="mt-28 flex h-full items-center justify-center">
            <a href="/">Home</a>
            <a href="/payment">Payment</a>
            <a href="/search">Search</a>
        </main>
    </body>
</html>
