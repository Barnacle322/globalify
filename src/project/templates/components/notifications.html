{% macro render() %}
<template id="notifications-template">
    <div
        class="fixed top-0 right-0 z-50 flex h-full w-full flex-col border bg-white shadow-xl sm:absolute sm:top-7 sm:right-0 sm:h-auto sm:max-h-96 sm:w-96 sm:rounded-xl"
    >
        <input type="hidden" id="csrf_token" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="border-b p-5 pb-0">
            <div class="flex items-center justify-between">
                <h3 class="text-xl font-semibold">Notifications</h3>
                <svg
                    @click="$emit('close')"
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="size-7 cursor-pointer rounded-md p-1 hover:bg-gray-50"
                >
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                </svg>
            </div>
            <ul class="mt-2 flex gap-3 text-sm">
                <li
                    @click="selectedTab = 'inbox'"
                    data-selected="true"
                    ref="inbox"
                    class="border-gray-300 py-2 transition-all ease-in-out hover:border-b-[3px] data-[selected=true]:border-b-[3px] data-[selected=true]:border-gray-800"
                >
                    <button>Inbox</button>
                </li>
                <li
                    @click="selectedTab = 'archive'"
                    ref="archive"
                    class="border-gray-300 py-2 transition-all ease-in-out hover:border-b-[3px] data-[selected=true]:border-b-[3px] data-[selected=true]:border-gray-800"
                >
                    <button>Archive</button>
                </li>
            </ul>
        </div>
        <div class="flex flex-col gap-1 overflow-y-auto overscroll-contain p-5 pt-3">
            <div class="flex">
                <button
                    v-if="notifications.length > 0 && selectedTab === 'inbox'"
                    class="ml-auto flex items-center gap-1 rounded-md p-1 hover:bg-gray-50"
                    title="Mark all as read"
                    @click="markAllAsRead"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        height="24"
                        viewBox="0 -960 960 960"
                        width="24"
                        class="size-5"
                    >
                        <path
                            d="M70-438q-12-12-11.5-28T71-494q12-11 28-11.5t28 11.5l142 142 14 14 14 14q12 12 11.5 28T296-268q-12 11-28 11.5T240-268L70-438Zm424 85 340-340q12-12 28-11.5t28 12.5q11 12 11.5 28T890-636L522-268q-12 12-28 12t-28-12L296-438q-11-11-11-27.5t11-28.5q12-12 28.5-12t28.5 12l141 141Zm169-282L522-494q-11 11-27.5 11T466-494q-12-12-12-28.5t12-28.5l141-141q11-11 27.5-11t28.5 11q12 12 12 28.5T663-635Z"
                        />
                    </svg>
                    <span class="text-xs">Clear All</span>
                </button>
            </div>
            <div
                v-if="notifications.length > 0"
                v-for="notification in notifications"
                class="transition-color relative flex items-center rounded-lg p-2 ease-in-out hover:bg-gray-50"
            >
                <div v-if="notification.json_data.type === 'system'">
                    <a
                        href="#"
                        :class="{ 'cursor-default': !notification.json_data.item.url }"
                        @click="markAsReadWithRedirect(notification.id)"
                    >
                        <div class="flex gap-3">
                            <svg
                                v-if="notification.json_data.item.type === 'info'"
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 20 20"
                                fill="#add8e6"
                                class="size-10 shrink-0 rounded-md"
                            >
                                <path
                                    fill-rule="evenodd"
                                    d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-7-4a1 1 0 1 1-2 0 1 1 0 0 1 2 0ZM9 9a.75.75 0 0 0 0 1.5h.253a.25.25 0 0 1 .244.304l-.459 2.066A1.75 1.75 0 0 0 10.747 15H11a.75.75 0 0 0 0-1.5h-.253a.25.25 0 0 1-.244-.304l.459-2.066A1.75 1.75 0 0 0 9.253 9H9Z"
                                    clip-rule="evenodd"
                                />
                            </svg>
                            <svg
                                v-if="notification.json_data.item.type === 'warning'"
                                width="20"
                                height="20"
                                viewBox="0 0 20 20"
                                fill="none"
                                xmlns="http://www.w3.org/2000/svg"
                                class="size-10 shrink-0 rounded-md"
                            >
                                <rect x="9" y="5" width="2" height="10" fill="white" />
                                <path
                                    fill-rule="evenodd"
                                    clip-rule="evenodd"
                                    d="M18 10C18 12.1217 17.1571 14.1566 15.6569 15.6569C14.1566 17.1571 12.1217 18 10 18C7.87827 18 5.84344 17.1571 4.34315 15.6569C2.84285 14.1566 2 12.1217 2 10C2 7.87827 2.84285 5.84344 4.34315 4.34315C5.84344 2.84285 7.87827 2 10 2C12.1217 2 14.1566 2.84285 15.6569 4.34315C17.1571 5.84344 18 7.87827 18 10ZM10 5C10.1989 5 10.3897 5.07902 10.5303 5.21967C10.671 5.36032 10.75 5.55109 10.75 5.75V10.25C10.75 10.4489 10.671 10.6397 10.5303 10.7803C10.3897 10.921 10.1989 11 10 11C9.80109 11 9.61032 10.921 9.46967 10.7803C9.32902 10.6397 9.25 10.4489 9.25 10.25V5.75C9.25 5.55109 9.32902 5.36032 9.46967 5.21967C9.61032 5.07902 9.80109 5 10 5ZM10 15C10.2652 15 10.5196 14.8946 10.7071 14.7071C10.8946 14.5196 11 14.2652 11 14C11 13.7348 10.8946 13.4804 10.7071 13.2929C10.5196 13.1054 10.2652 13 10 13C9.73478 13 9.48043 13.1054 9.29289 13.2929C9.10536 13.4804 9 13.7348 9 14C9 14.2652 9.10536 14.5196 9.29289 14.7071C9.48043 14.8946 9.73478 15 10 15Z"
                                    fill="#FECACA"
                                />
                            </svg>

                            <div class="flex flex-col gap-1">
                                <div class="flex flex-col">
                                    <span
                                        v-text="notification.json_data.title"
                                        class="text-sm font-semibold text-gray-900"
                                    ></span>
                                    <span v-text="notification.json_data.msg" class="text-sm font-normal"></span>
                                </div>
                                <span
                                    v-text="timeDifference(Date.now(), new Date(notification.created_at))"
                                    class="text-xs text-gray-500"
                                ></span>
                            </div>
                        </div>
                    </a>
                </div>

                <button
                    v-if="!notification.is_read"
                    @click="markAsRead(notification.id)"
                    class="group ml-auto rounded-lg hover:bg-gray-50"
                >
                    <div class="relative p-2">
                        <div
                            class="size-2 rounded-full bg-sky-500 transition-all duration-100 ease-in-out group-hover:opacity-0"
                        ></div>
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 20 20"
                            fill="currentColor"
                            class="absolute inset-1 size-4 opacity-0 transition-all duration-100 ease-in-out group-hover:opacity-100"
                        >
                            <path
                                fill-rule="evenodd"
                                d="M16.704 4.153a.75.75 0 0 1 .143 1.052l-8 10.5a.75.75 0 0 1-1.127.075l-4.5-4.5a.75.75 0 0 1 1.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 0 1 1.05-.143Z"
                                clip-rule="evenodd"
                            />
                        </svg>
                    </div>
                </button>
            </div>
            <div class="h-2" id="notification-sentinel"></div>
            <div class="m-3 flex items-center justify-center" v-if="loading && reachedEnd">
                <svg class="size-6 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path
                        class="opacity-75"
                        fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                    ></path>
                </svg>
            </div>
            <div v-else-if="notifications.length === 0" class="w-full py-5 text-center text-sm text-gray-500">
                Such Empty...
            </div>
        </div>
    </div>
</template>
{% endmacro %}
