<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Primary Meta Tags -->
        <meta name="title" content="Globalify — Connect to the whole world of investment" />
        <meta
            name="description"
            content="Join Globalify on a mission to help entrepreneurs expand their business around the world!"
        />

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://globalify.xyz/" />
        <meta property="og:title" content="Globalify — Connect to the whole world of investment" />
        <meta
            property="og:description"
            content="Join Globalify on a mission to help entrepreneurs expand their business around the world!"
        />
        <meta property="og:image" content="https://globalify.xyz/static/elements/metapreview.png" />

        <!-- Twitter -->
        <meta property="twitter:card" content="summary_large_image" />
        <meta property="twitter:url" content="https://globalify.xyz/" />
        <meta property="twitter:title" content="Globalify — Connect to the whole world of investment" />
        <meta
            property="twitter:description"
            content="Join Globalify on a mission to help entrepreneurs expand their business around the world!"
        />
        <meta property="twitter:image" content="https://globalify.xyz/static/elements/metapreview.png" />

        <link rel="stylesheet" href="/static/css/main.css" />
        <link rel="icon" type="image/png" href="/static/elements/icon.png" />

        <!-- Vue -->
        <script src="https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.global.min.js"></script>
        <script src="/static/vue/base.js"></script>
        {#
        <script src="/static/scripts/menu.js" defer></script>
        #}
        <script src="/static/vue/microwebpage.js" defer></script>

        <!-- Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
            rel="stylesheet"
        />
        <title>Create MicroWebPage | Globalify</title>
    </head>

    <!-- prettier-ignore -->
    {% import "microwebpage/components/first_stage.html" as first_stage %}
    {{ first_stage.render() }}
    {% import "microwebpage/components/second_stage.html" as second_stage %}
    {{ second_stage.render() }}

    <body class="h-full overflow-x-clip" id="app">
        <input type="hidden" id="company_id" value="{{ company.id }}" />
        <input type="hidden" id="csrf_token" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="max-w-8xl relative mx-auto flex h-full min-h-screen w-full items-center justify-center">
            <transition :enter-active-class="enterClass" :leave-active-class="leaveClass" mode="out-in">
                <component
                    :is="currentComponent"
                    :form-data="formData"
                    @change-page="changePage"
                    @submit-form="submitForm"
                ></component>
            </transition>
        </div>
    </body>
</html>
