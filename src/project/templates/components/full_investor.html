{% macro render(user) %}
<template id="full-investor-template">
    <article
        class="fixed right-0 top-0 z-50 flex h-full w-full flex-col overflow-y-scroll bg-white transition-all"
        :class="isExpanded ? 'md:w-full lg:w-full 2xl:w-full' : 'md:w-4/5 md:rounded-l-3xl lg:w-2/3 2xl:w-1/2'"
    >
        <div v-if="isLoading" class="grid h-full w-full place-content-center">
            <svg class="size-6 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path
                    class="opacity-75"
                    fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                ></path>
            </svg>
        </div>

        <div v-else>
            <nav class="sticky right-0 top-0 z-10 flex w-full items-center justify-between bg-white px-7 py-4">
                <button
                    @click="toggleExpansion"
                    class="hidden rounded-lg p-1 transition-colors duration-75 ease-in-out hover:bg-gray-50 md:block"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-5"
                        v-if="!isExpanded"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"
                        />
                    </svg>
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-5"
                        v-else
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M9 9V4.5M9 9H4.5M9 9 3.75 3.75M9 15v4.5M9 15H4.5M9 15l-5.25 5.25M15 9h4.5M15 9V4.5M15 9l5.25-5.25M15 15h4.5M15 15v4.5m0-4.5 5.25 5.25"
                        />
                    </svg>
                </button>
                <button
                    @click="closeInvestor"
                    class="ml-auto flex aspect-square h-full items-center justify-center rounded-lg p-1 transition-colors duration-75 ease-in-out hover:bg-gray-50"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-6"
                    >
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                    </svg>
                </button>
            </nav>
            <main class="mx-auto pt-5 flex flex-col items-center gap-5 pb-16 px-4 sm:px-9">
                <section class="w-full max-w-7xl flex justify-between items-center">
                    <div class="w-full max-w-7xl flex gap-4 items-center">
                        <input type="hidden" id="csrf_token" name="csrf_token" value="{{ csrf_token() }}" />

                        <img
                            v-if="investor.twitter"
                            class="h-20 rounded-lg shadow-card"
                            src="https://unavatar.io/twitter/investor.twitter.split('/')[-1]"
                            alt=""
                            loading="lazy"
                        />

                        <h1 class="text-4xl font-semibold" v-text="investor.name"></h1>
                        <div class="flex col">
                            <a
                                v-if="!investor.user_id"
                                :href="`/investor/${investor.slug}/claim`"
                                class="rounded-lg bg-sky-500 px-2 py-1 text-sm text-white transition-colors ease-in-out hover:bg-sky-400"
                            >
                                Claim
                            </a>
                            <svg
                                v-else
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 20 20"
                                fill="rgb(14 165 233)"
                                class="size-5"
                            >
                                <path
                                    fill-rule="evenodd"
                                    d="M16.403 12.652a3 3 0 0 0 0-5.304 3 3 0 0 0-3.75-3.751 3 3 0 0 0-5.305 0 3 3 0 0 0-3.751 3.75 3 3 0 0 0 0 5.305 3 3 0 0 0 3.75 3.751 3 3 0 0 0 5.305 0 3 3 0 0 0 3.751-3.75Zm-2.546-4.46a.75.75 0 0 0-1.214-.883l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z"
                                    clip-rule="evenodd"
                                />
                            </svg>
                        </div>
                    </div>

                    <a
                        v-if="investor.user_id == {{user.id}}"
                        href="/settings/investor"
                        class="rounded-lg bg-sky-500 px-2 py-1 h-10 w-16 text-sm text-white transition-colors ease-in-out hover:bg-sky-400 flex justify-center items-center"
                        >Edit</a
                    >
                </section>
                <section class="max-w-7xl grid grid-cols-1 md:grid-cols-2 w-full gap-4">
                    <article
                        v-if="investor.location || investor.firm_name || investor.about"
                        class="bg-white shadow-card p-5 rounded-xl w-full"
                    >
                        <h2 class="text-xl font-medium">General</h2>
                        <div class="flex flex-col gap-2 text-sm mt-5">
                            <div v-if="investor.location" class="grid grid-cols-2">
                                <span class="inline-flex items-center gap-1 font-medium">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        fill="none"
                                        viewBox="0 0 24 24"
                                        stroke-width="1.5"
                                        stroke="currentColor"
                                        class="size-5"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
                                        />
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"
                                        />
                                    </svg>
                                    Location:
                                </span>
                                <span class="text-gray-700" v-text="investor.location"></span>
                            </div>

                            <div v-if="investor.firm_name" class="grid grid-cols-2 text-sm">
                                <span class="inline-flex items-center gap-1 font-medium">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        fill="none"
                                        viewBox="0 0 24 24"
                                        stroke-width="1.5"
                                        stroke="currentColor"
                                        class="size-5"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            d="M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.277-4.216.42-6.378.42s-4.291-.143-6.378-.42c-1.085-.144-1.872-1.086-1.872-2.18v-4.25m16.5 0a2.18 2.18 0 0 0 .75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 0 0-3.413-.387m4.5 8.006c-.194.165-.42.295-.673.38A23.978 23.978 0 0 1 12 15.75c-2.648 0-5.195-.429-7.577-1.22a2.016 2.016 0 0 1-.673-.38m0 0A2.18 2.18 0 0 1 3 12.489V8.706c0-1.081.768-2.015 1.837-2.175a48.111 48.111 0 0 1 3.413-.387m7.5 0V5.25A2.25 2.25 0 0 0 13.5 3h-3a2.25 2.25 0 0 0-2.25 2.25v.894m7.5 0a48.667 48.667 0 0 0-7.5 0M12 12.75h.008v.008H12v-.008Z"
                                        />
                                    </svg>
                                    Company:
                                </span>
                                <span class="text-gray-700" v-text="investor.firm_name"></span>
                            </div>

                            <p v-if="investor.about" class="mt-3" v-text="investor.about"></p>
                        </div>
                    </article>
                    <article
                        v-if="investor.rounds.length > 0 || investor.industries.length > 0 || investor.notable_investments.length > 0 || investor.min_max_investment || investor.n_investments || investor.n_exits"
                        class="bg-white shadow-card p-5 rounded-xl w-full"
                    >
                        <h2 class="text-xl font-medium">Investment</h2>

                        <div v-if="investor.rounds.length !== 0" class="flex flex-col gap-2 mt-5">
                            <span class="flex font-medium gap-1 text-sm"
                                ><svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                    class="size-5"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M2.25 18.75a60.07 60.07 0 0 1 15.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 0 1 3 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 0 0-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 0 1-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 0 0 3 15h-.75M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm3 0h.008v.008H18V10.5Zm-12 0h.008v.008H6V10.5Z"
                                    />
                                </svg>
                                Series:
                            </span>
                            <div class="flex flex-wrap gap-1">
                                <a
                                    v-for="round in investor.rounds"
                                    :key="round.id"
                                    class="text-nowrap rounded-full bg-[#ffdcfd] px-2 font-medium py-1.5 text-xs text-[#dd70d8]"
                                    v-text="round.name"
                                >
                                </a>
                            </div>
                        </div>

                        <div v-if="investor.industries.length !== 0" class="flex flex-col gap-2 mt-2">
                            <span class="flex font-medium gap-1 text-sm"
                                ><svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                    class="size-5"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M2.25 7.125C2.25 6.504 2.754 6 3.375 6h6c.621 0 1.125.504 1.125 1.125v3.75c0 .621-.504 1.125-1.125 1.125h-6a1.125 1.125 0 0 1-1.125-1.125v-3.75ZM14.25 8.625c0-.621.504-1.125 1.125-1.125h5.25c.621 0 1.125.504 1.125 1.125v8.25c0 .621-.504 1.125-1.125 1.125h-5.25a1.125 1.125 0 0 1-1.125-1.125v-8.25ZM3.75 16.125c0-.621.504-1.125 1.125-1.125h5.25c.621 0 1.125.504 1.125 1.125v2.25c0 .621-.504 1.125-1.125 1.125h-5.25a1.125 1.125 0 0 1-1.125-1.125v-2.25Z"
                                    />
                                </svg>
                                Industries:
                            </span>
                            <div class="flex flex-wrap gap-1">
                                <a
                                    v-for="industry in investor.industries"
                                    :key="industry.id"
                                    class="text-nowrap rounded-lg bg-[#ccecff] px-2 font-medium py-1.5 text-xs text-[#26a3f1]"
                                    v-text="industry.name"
                                ></a>
                            </div>
                        </div>
                        <div v-if="investor.min_max_investment" class="grid grid-cols-2 mt-5">
                            <span class="flex font-medium gap-1 text-sm"
                                ><svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                    class="size-5"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M3 7.5 7.5 3m0 0L12 7.5M7.5 3v13.5m13.5 0L16.5 21m0 0L12 16.5m4.5 4.5V7.5"
                                    />
                                </svg>
                                Investment Range:
                            </span>
                            <span class="text-sm text-gray-700" v-text="investor.min_max_investment"></span>
                        </div>

                        <div v-if="investor.n_investments && investor.n_exits" class="grid grid-cols-2 mt-5">
                            <span class="flex font-medium gap-1 text-sm"
                                ><svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                    class="size-5"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M12 3v17.25m0 0c-1.472 0-2.882.265-4.185.75M12 20.25c1.472 0 2.882.265 4.185.75M18.75 4.97A48.416 48.416 0 0 0 12 4.5c-2.291 0-4.545.16-6.75.47m13.5 0c1.01.143 2.01.317 3 .52m-3-.52 2.62 10.726c.122.499-.106 1.028-.589 1.202a5.988 5.988 0 0 1-2.031.352 5.988 5.988 0 0 1-2.031-.352c-.483-.174-.711-.703-.59-1.202L18.75 4.971Zm-16.5.52c.99-.203 1.99-.377 3-.52m0 0 2.62 10.726c.122.499-.106 1.028-.589 1.202a5.989 5.989 0 0 1-2.031.352 5.989 5.989 0 0 1-2.031-.352c-.483-.174-.711-.703-.59-1.202L5.25 4.971Z"
                                    />
                                </svg>

                                Investments/exits:
                            </span>
                            <span
                                class="text-sm text-gray-700"
                                v-text="`${investor.n_investments}/${investor.n_exits}`"
                            ></span>
                        </div>
                        <div v-if="investor.n_investments" class="grid grid-cols-2 mt-5">
                            <span class="flex font-medium gap-1 text-sm"
                                ><svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                    class="size-5"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M3 7.5 7.5 3m0 0L12 7.5M7.5 3v13.5m13.5 0L16.5 21m0 0L12 16.5m4.5 4.5V7.5"
                                    />
                                </svg>
                                Investments:
                            </span>
                            <span class="text-sm text-gray-700" v-text="investor.n_investments"></span>
                        </div>
                        <div v-if="investor.n_exits" class="grid grid-cols-2 mt-5">
                            <span class="flex font-medium gap-1 text-sm"
                                ><svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                    class="size-5"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M2.25 18 9 11.25l4.306 4.306a11.95 11.95 0 0 1 5.814-5.518l2.74-1.22m0 0-5.94-2.281m5.94 2.28-2.28 5.941"
                                    />
                                </svg>

                                Exits:
                            </span>
                            <span class="text-sm text-gray-700" v-text="investor.n_exits"></span>
                        </div>
                        <div v-if="investor.notable_investments.length !== 0">
                            <h2 class="font-medium mt-5">Notable Investments</h2>
                            <div class="flex flex-wrap gap-1 mt-2">
                                <div v-for="investment in investor.notable_investments" :key="investment.id">
                                    <a
                                        v-if="investment.company"
                                        v-text="investment.name"
                                        href="/profile/company/investment.company.slug"
                                        class="text-nowrap rounded-lg bg-violet-200 px-2 font-medium py-1.5 text-xs text-violet-500 hover:bg-violet-300"
                                    ></a>
                                    <a
                                        v-else
                                        v-text="investment.name"
                                        class="text-nowrap rounded-lg bg-violet-200 px-2 font-medium py-1.5 text-xs text-violet-500"
                                    ></a>
                                </div>
                            </div>
                        </div>
                    </article>
                </section>
            </main>
        </div>
    </article>
</template>
{% endmacro %}
