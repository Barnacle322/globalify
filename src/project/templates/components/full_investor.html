{% macro render(user) %}
<template id="full-investor-template">
    <article
        class="fixed right-0 top-0 z-50 flex h-full w-full flex-col overflow-y-scroll overscroll-contain bg-white transition-all"
        :class="isExpanded ? 'md:w-full lg:w-full 2xl:w-full' : 'md:w-4/5 md:rounded-l-3xl lg:w-2/3 2xl:w-1/2'"
    >
        <nav class="sticky right-0 top-0 z-10 flex w-full items-center justify-between bg-white px-4 py-4 sm:px-9">
            <button
                @click="toggleExpansion"
                class="hidden rounded-lg p-1 transition-colors duration-75 ease-in-out hover:bg-gray-50 md:block"
            >
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="size-5"
                    v-if="!isExpanded"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"
                    />
                </svg>
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="size-5"
                    v-else
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M9 9V4.5M9 9H4.5M9 9 3.75 3.75M9 15v4.5M9 15H4.5M9 15l-5.25 5.25M15 9h4.5M15 9V4.5M15 9l5.25-5.25M15 15h4.5M15 15v4.5m0-4.5 5.25 5.25"
                    />
                </svg>
            </button>
            <button
                @click="closeInvestor"
                class="ml-auto flex aspect-square h-full items-center justify-center rounded-lg p-1 transition-colors duration-75 ease-in-out hover:bg-gray-50"
            >
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="size-6"
                >
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                </svg>
            </button>
        </nav>
        <div v-if="isLoading" class="grid h-full w-full place-content-center">
            <svg class="size-6 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path
                    class="opacity-75"
                    fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                ></path>
            </svg>
        </div>
        <div v-else-if="!isLoading">
            <main class="mx-auto flex flex-col items-center gap-5 px-4 pb-16 pt-5 sm:px-9">
                <section class="flex w-full max-w-7xl items-center justify-between gap-2">
                    <input type="hidden" id="csrf_token" name="csrf_token" value="{{ csrf_token() }}" />
                    <img
                        v-if="investor.twitter"
                        :src="'https://unavatar.io/twitter/' + getTwitterHandle(investor.twitter)"
                        class="size-20 rounded-md bg-black"
                        loading="lazy"
                    />
                    <h1 class="text-4xl font-semibold" v-text="investor.name"></h1>
                    <div v-if="investor.user_id" class="relative">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 20 20"
                            fill="rgb(14 165 233)"
                            class="size-5"
                            @mouseenter="showPopover = true"
                            @mouseleave="showPopover = false"
                        >
                            <path
                                fill-rule="evenodd"
                                d="M16.403 12.652a3 3 0 0 0 0-5.304 3 3 0 0 0-3.75-3.751 3 3 0 0 0-5.305 0 3 3 0 0 0-3.751 3.75 3 3 0 0 0 0 5.305 3 3 0 0 0 3.75 3.751 3 3 0 0 0 5.305 0 3 3 0 0 0 3.751-3.75Zm-2.546-4.46a.75.75 0 0 0-1.214-.883l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z"
                                clip-rule="evenodd"
                            />
                        </svg>
                        <transition enter-active-class="animate-zoom-in" leave-active-class="animate-zoom-out">
                            <div
                                v-if="showPopover"
                                class="absolute left-auto right-full top-full z-10 mt-1 w-48 rounded border border-gray-300 bg-white p-2 shadow-lg md:left-full"
                            >
                                This user is verified.
                            </div>
                        </transition>
                    </div>

                    <!-- rendercontacts variable is false during the onboarding process.  -->
                    <!-- The additional check is to prevent an almost impossible edge case -->
                    <!-- Where a user with claimed invesor profile is doing onboarding again -->
                    <a
                        v-if="investor.user_id == {{ user.id if user else 0 }} && rendercontacts"
                        href="/settings/investor"
                        class="flex h-10 w-16 items-center justify-center rounded-lg bg-sky-500 px-2 py-1 text-sm text-white transition-colors ease-in-out hover:bg-sky-400"
                        >Edit
                    </a>

                    <div class="relative ml-auto self-start" ref="dropdownContainer">
                        <button @click.stop="dropdownOpened = !dropdownOpened">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                fill="none"
                                viewBox="0 0 24 24"
                                stroke-width="1.5"
                                stroke="currentColor"
                                class="size-6"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M12 6.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 12.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 18.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Z"
                                />
                            </svg>
                        </button>

                        <transition enter-active-class="animate-zoom-in" leave-active-class="animate-zoom-out">
                            <div
                                v-if="dropdownOpened"
                                class="absolute right-2 top-6 z-10 flex w-36 origin-top-right flex-col items-start justify-center gap-1 rounded-lg border border-gray-200 bg-white p-1 shadow-sm"
                            >
                                {% if user %}
                                <button
                                    @click="toggleBookmark(investor.id)"
                                    class="flex w-full items-center gap-2 rounded-md px-2 py-1.5 text-start text-sm hover:bg-sky-500 hover:text-white"
                                >
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        fill="none"
                                        viewBox="0 0 24 24"
                                        stroke-width="1.5"
                                        stroke="currentColor"
                                        class="size-5"
                                        :class="isBookmarked? 'fill-[#FFC9FC]' : 'fill-none'"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z"
                                        />
                                    </svg>
                                    <span v-if="isBookmarked">Unbookmark</span>
                                    <span v-else>Bookmark</span>
                                </button>
                                {% else %}
                                <a
                                    href="/login"
                                    class="flex w-full items-center gap-2 rounded-md px-2 py-1.5 text-start text-sm hover:bg-sky-500 hover:text-white"
                                >
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        fill="none"
                                        viewBox="0 0 24 24"
                                        stroke-width="1.5"
                                        stroke="currentColor"
                                        class="size-5 fill-none"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z"
                                        />
                                    </svg>
                                    <span>Bookmark</span>
                                </a>
                                {% endif %}
                                <a
                                    class="flex w-full items-center gap-2 rounded-md px-2 py-1.5 text-start text-sm hover:bg-sky-500 hover:text-white"
                                    v-if="!investor.user_id"
                                    :href="`/investor/${investor.slug}/claim`"
                                >
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        fill="none"
                                        viewBox="0 0 24 24"
                                        stroke-width="1.5"
                                        stroke="currentColor"
                                        class="size-4"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            d="M3 3v1.5M3 21v-6m0 0 2.77-.693a9 9 0 0 1 6.208.682l.108.054a9 9 0 0 0 6.086.71l3.114-.732a48.524 48.524 0 0 1-.005-10.499l-3.11.732a9 9 0 0 1-6.085-.711l-.108-.054a9 9 0 0 0-6.208-.682L3 4.5M3 15V4.5"
                                        />
                                    </svg>
                                    <span>Claim</span>
                                </a>

                                {% if user.is_admin %}
                                <hr class="h-px w-full bg-gray-700" />
                                <a
                                    class="flex w-full items-center gap-2 rounded-md px-2 py-1.5 text-start text-sm hover:bg-sky-500 hover:text-white"
                                    :href="`/admin/investors/${investor.id}`"
                                >
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        fill="none"
                                        viewBox="0 0 24 24"
                                        stroke-width="1.5"
                                        stroke="currentColor"
                                        class="size-4"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10"
                                        />
                                    </svg>
                                    <span>Edit</span>
                                </a>
                                {% endif %}
                            </div>
                        </transition>
                    </div>
                </section>
                <section class="grid w-full max-w-7xl grid-cols-1 gap-4 md:grid-cols-2">
                    <article
                        v-if="investor.location || investor.firm_name || investor.about"
                        class="shadow-card w-full rounded-xl bg-white p-5"
                    >
                        <h2 class="text-xl font-medium">General</h2>
                        <div class="mt-5 flex flex-col gap-2 text-sm">
                            <div v-if="investor.location" class="grid grid-cols-2">
                                <span class="inline-flex items-center gap-1 font-medium">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        fill="none"
                                        viewBox="0 0 24 24"
                                        stroke-width="1.5"
                                        stroke="currentColor"
                                        class="size-5"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
                                        />
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"
                                        />
                                    </svg>
                                    Location:
                                </span>
                                <span class="text-gray-700" v-text="investor.location"></span>
                            </div>

                            <div v-if="investor.firm_name" class="grid grid-cols-2 text-sm">
                                <span class="inline-flex items-center gap-1 font-medium">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        fill="none"
                                        viewBox="0 0 24 24"
                                        stroke-width="1.5"
                                        stroke="currentColor"
                                        class="size-5"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            d="M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.277-4.216.42-6.378.42s-4.291-.143-6.378-.42c-1.085-.144-1.872-1.086-1.872-2.18v-4.25m16.5 0a2.18 2.18 0 0 0 .75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 0 0-3.413-.387m4.5 8.006c-.194.165-.42.295-.673.38A23.978 23.978 0 0 1 12 15.75c-2.648 0-5.195-.429-7.577-1.22a2.016 2.016 0 0 1-.673-.38m0 0A2.18 2.18 0 0 1 3 12.489V8.706c0-1.081.768-2.015 1.837-2.175a48.111 48.111 0 0 1 3.413-.387m7.5 0V5.25A2.25 2.25 0 0 0 13.5 3h-3a2.25 2.25 0 0 0-2.25 2.25v.894m7.5 0a48.667 48.667 0 0 0-7.5 0M12 12.75h.008v.008H12v-.008Z"
                                        />
                                    </svg>
                                    Company:
                                </span>
                                <span class="text-gray-700" v-text="investor.firm_name"></span>
                            </div>

                            <p v-if="investor.about" class="mt-3" v-text="investor.about"></p>
                        </div>
                    </article>
                    <article
                        v-if="investor.rounds.length > 0 || investor.industries.length > 0 || investor.notable_investments.length > 0 || investor.min_max_investment || investor.n_investments || investor.n_exits && !unpaid"
                        class="shadow-card w-full rounded-xl bg-white p-5"
                    >
                        <h2 class="text-xl font-medium">Investment</h2>
                        <div v-if="investor.rounds.length !== 0" class="mt-5 flex flex-col gap-2">
                            <span class="flex gap-1 text-sm font-medium"
                                ><svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                    class="size-5"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M2.25 18.75a60.07 60.07 0 0 1 15.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 0 1 3 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 0 0-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 0 1-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 0 0 3 15h-.75M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm3 0h.008v.008H18V10.5Zm-12 0h.008v.008H6V10.5Z"
                                    />
                                </svg>
                                Series:
                            </span>
                            <div class="flex flex-wrap gap-1">
                                <a
                                    v-for="round in investor.rounds"
                                    :key="round.id"
                                    class="text-nowrap rounded-full bg-[#ffdcfd] px-2 py-1.5 text-xs font-medium text-[#dd70d8]"
                                    v-text="round.name"
                                >
                                </a>
                            </div>
                        </div>

                        <div v-if="investor.industries.length !== 0" class="mt-2 flex flex-col gap-2">
                            <span class="flex gap-1 text-sm font-medium"
                                ><svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                    class="size-5"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M2.25 7.125C2.25 6.504 2.754 6 3.375 6h6c.621 0 1.125.504 1.125 1.125v3.75c0 .621-.504 1.125-1.125 1.125h-6a1.125 1.125 0 0 1-1.125-1.125v-3.75ZM14.25 8.625c0-.621.504-1.125 1.125-1.125h5.25c.621 0 1.125.504 1.125 1.125v8.25c0 .621-.504 1.125-1.125 1.125h-5.25a1.125 1.125 0 0 1-1.125-1.125v-8.25ZM3.75 16.125c0-.621.504-1.125 1.125-1.125h5.25c.621 0 1.125.504 1.125 1.125v2.25c0 .621-.504 1.125-1.125 1.125h-5.25a1.125 1.125 0 0 1-1.125-1.125v-2.25Z"
                                    />
                                </svg>
                                Industries:
                            </span>
                            <div class="flex flex-wrap gap-1">
                                <a
                                    v-for="industry in investor.industries"
                                    :key="industry.id"
                                    class="text-nowrap rounded-lg bg-[#ccecff] px-2 py-1.5 text-xs font-medium text-[#26a3f1]"
                                    v-text="industry.name"
                                ></a>
                            </div>
                        </div>
                        <div v-if="investor.min_max_investment" class="mt-5 grid grid-cols-2">
                            <span class="flex gap-1 text-sm font-medium"
                                ><svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                    class="size-5"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M3 7.5 7.5 3m0 0L12 7.5M7.5 3v13.5m13.5 0L16.5 21m0 0L12 16.5m4.5 4.5V7.5"
                                    />
                                </svg>
                                Cheque Size:
                            </span>
                            <span class="text-sm text-gray-700" v-text="investor.min_max_investment"></span>
                        </div>

                        <div v-if="investor.n_investments && investor.n_exits" class="mt-5 grid grid-cols-2">
                            <span class="flex gap-1 text-sm font-medium"
                                ><svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                    class="size-5"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M12 3v17.25m0 0c-1.472 0-2.882.265-4.185.75M12 20.25c1.472 0 2.882.265 4.185.75M18.75 4.97A48.416 48.416 0 0 0 12 4.5c-2.291 0-4.545.16-6.75.47m13.5 0c1.01.143 2.01.317 3 .52m-3-.52 2.62 10.726c.122.499-.106 1.028-.589 1.202a5.988 5.988 0 0 1-2.031.352 5.988 5.988 0 0 1-2.031-.352c-.483-.174-.711-.703-.59-1.202L18.75 4.971Zm-16.5.52c.99-.203 1.99-.377 3-.52m0 0 2.62 10.726c.122.499-.106 1.028-.589 1.202a5.989 5.989 0 0 1-2.031.352 5.989 5.989 0 0 1-2.031-.352c-.483-.174-.711-.703-.59-1.202L5.25 4.971Z"
                                    />
                                </svg>

                                Investments/exits:
                            </span>
                            <span
                                class="text-sm text-gray-700"
                                v-text="`${investor.n_investments}/${investor.n_exits}`"
                            ></span>
                        </div>
                        <div
                            v-if="
                            investor.notable_investments.length !== 0 &&
                            investor.notable_investments.some((investment) => investment.name)
                        "
                        >
                            <h2 class="mt-5 font-medium">Notable Investments</h2>
                            <div class="mt-2 flex h-fit flex-wrap gap-1 gap-y-2">
                                <div v-for="investment in investor.notable_investments" :key="investment.id">
                                    <a
                                        v-if="investment.company"
                                        v-text="investment.name"
                                        href="/profile/company/investment.company.slug"
                                        class="text-nowrap rounded-lg bg-violet-200 px-2 py-1.5 text-xs font-medium text-violet-500 hover:bg-violet-300"
                                    ></a>
                                    <a
                                        v-if="investment.name"
                                        v-text="investment.name"
                                        class="text-nowrap rounded-lg bg-violet-200 px-2 py-1.5 text-xs font-medium text-violet-500"
                                    ></a>
                                </div>
                            </div>
                        </div>
                    </article>
                    <article
                        v-if="investor.user_id && investor.user_id != {{ user.id if user else 0 }} && !rendercontacts"
                        class="shadow-card w-full rounded-xl bg-white p-5"
                    >
                        <h2 class="text-xl font-medium">This profile has already been claimed by another user.</h2>
                        <p>
                            If you think that there has been a mistake please contact us at
                            <b>partners@globalify.xyz</b>
                        </p>
                    </article>
                    <!-- The additional check is to prevent an almost impossible edge case -->
                    <!-- Where a user with claimed invesor profile is doing onboarding again -->
                    <article
                        v-if="investor.user_id == {{ user.id if user else 0 }} && !rendercontacts"
                        class="shadow-card w-full rounded-xl bg-white p-5"
                    >
                        <h2 class="text-xl font-medium">Hey! You aren't supposed to be here!</h2>
                        <p>
                            You already have access to this profile. If you want to edit it, please go to your settings
                            page. If you are stuck in the onboarding flow, contact us at
                            <b>partners@globalify.xyz</b>
                        </p>
                    </article>
                    <article
                        v-if="!unpaid && rendercontacts && (investor.twitter || investor.linkedin || investor.website || investor.email)"
                        class="shadow-card w-full rounded-xl bg-white p-5"
                    >
                        <h2 class="text-xl font-medium">Contacts</h2>
                        <div class="mt-5 flex flex-col gap-2 text-sm">
