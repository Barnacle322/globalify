<!DOCTYPE html>
<html lang="en" class="h-full">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="stylesheet" href="../static/css/main.css" />
        <title>Login</title>
    </head>
    <body class="flex h-full w-full flex-row items-center justify-between overflow-hidden bg-black text-white">
        <nav class="absolute left-0 top-0 flex h-24 w-full items-center justify-start px-9">
            <a href="/"><img class="h-[30px] w-[113px]" src="../static/elements/globalify.png" /></a>
        </nav>
        <main class="inline-flex w-full px-16 sm:w-1/2">
            <form action="/register" method="POST" class="flex w-[313px] flex-col gap-[25px] font-medium">
                <div class="">
                    <div class="text-4xl">Welcome</div>
                    <div clas s="text-4xl">{{ status }}</div>
                    <div class="">
                        <span class="text-sm">Have an account? Click </span
                        ><a href="/login" class="text-class underline">here</a
                        ><span class="text-class"> to sign in</span>
                    </div>
                </div>
                <div class="flex w-full flex-col gap-[7px]">
                    <div class="text-base">Email</div>
                    <input
                        id="email"
                        name="email"
                        type="email"
                        class="h-9 w-full rounded border-2 border-stone-300 bg-black px-2"
                        required
                    />
                </div>
                <div class="flex w-full flex-col gap-[7px]">
                    <div class="text-base">Password</div>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        class="h-9 w-full rounded border-2 border-stone-300 bg-black px-2"
                        required
                    />
                </div>
                <div class="flex w-full flex-col gap-[7px]">
                    <div class="text-base">Confirm Password</div>
                    <input
                        id="confirm_password"
                        name="confirm_password"
                        type="password"
                        class="h-9 w-full rounded border-2 border-stone-300 bg-black px-2"
                        required
                    />
                </div>
                <button
                    type="submit"
                    class="inline-flex h-8 w-full items-center justify-center rounded bg-sky-400 hover:bg-sky-500"
                >
                    <div class="text-base">Sign in</div>
                </button>
                <div class="w-full text-center text-sm">Or continue with</div>
                <div class="gap-2">
                    <div class="inline-flex h-[30px] w-full gap-4 text-base">
                        <a
                            href=""
                            class="flex w-full items-center justify-center gap-1 rounded bg-white hover:bg-gray-200"
                        >
                            <img src="../static/elements/apple.svg" alt="" />
                            <div class="text-black">Apple</div>
                        </a>
                        <a
                            href=""
                            class="flex w-full items-center justify-center gap-1 rounded bg-white hover:bg-gray-200"
                        >
                            <img src="../static/elements/google.svg" alt="" />
                            <div class="text-black">Google</div>
                        </a>
                    </div>
                    <div class="my-2 text-xs text-stone-300">
                        <span>By signing up, you agree to </span><span class="underline">Terms of Service</span
                        ><span> and </span><span class="underline">Privacy Policy</span>
                    </div>
                </div>
            </form>
        </main>
        <div class="mt-48 hidden h-full w-1/2 overflow-hidden rounded-tl-3xl bg-white sm:block">
            <img class="h-full w-full object-cover" src="../static/elements/register_stock.png" alt="" />
        </div>
    </body>
</html>
