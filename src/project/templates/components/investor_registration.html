{% macro render() %}
<template id="investor-registration-template">
    <div class="mx-auto flex w-full max-w-xl flex-col gap-9 fixed px-4">
        <h1 class="text-4xl">Investor Account Registration</h1>
        <div class="flex flex-col border rounded-lg p-4 gap-1">
            <h2>Welcome to Globalify!</h2>
            <p class="text-sm text-gray-500">
                We are very excited to have you on board. Please fill out the form below to get started!
            </p>
            <button class="bg-black text-white rounded-md w-fit px-3 py-2 mt-4 hover" @click="openRegistrationPage">
                Continue
            </button>
        </div>
    </div>
</template>
{% endmacro %}
