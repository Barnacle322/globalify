<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="stylesheet" href="/static/css/main.css" />
        <link rel="icon" type="image/png" href="/static/elements/icon.png" />

        <!-- Vue -->
        <script src="https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.global.min.js"></script>
        <script src="/static/vue/base.js"></script>
        <script defer src="/static/vue/deck.js"></script>

        <!-- Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap"
            rel="stylesheet"
        />

        <title>Globalify Presentation Tools</title>
    </head>
    <body class="h-full overflow-x-clip" id="app">
        <!-- Navbar -->
        {% import "components/navbar.html" as navbar %} {{ navbar.render(current_user) }}

        <navbar-component @open-aside="asideExpanded = true, asideMinified = !asideMinified"></navbar-component>
        <div class="max-w-8xl relative mx-auto flex h-full min-h-screen w-full">
            <aside-component :minified="asideMinified"></aside-component>
            <transition enter-active-class="pop-in" leave-active-class="pop-out">
                <div
                    v-if="asideExpanded"
                    @click="asideExpanded = false"
                    class="fixed top-0 z-50 block h-full w-full bg-black/60 lg:hidden"
                ></div>
            </transition>
            <transition enter-active-class="animate-slide-in-left" leave-active-class="animate-slide-out-left">
                <aside-mobile-component
                    v-if="asideExpanded"
                    @close-aside="asideExpanded = false"
                ></aside-mobile-component>
            </transition>
            <main class="flex h-screen w-full flex-col items-center px-4 pt-5 pb-16 sm:px-9">
                <div class="flex w-full justify-center gap-5 rounded-t-lg border p-3">
                    <a class="rounded bg-blue-100 px-3 py-1 font-bold text-blue-500" href="/deck/upload">Upload</a>
                    <a class="px-3 py-1" href="/deck/list/{{ current_user.id }}">Leaderboard</a>
                </div>
                <div
                    class="bg-deep-purple flex h-48 w-full items-center justify-center rounded-b-lg p-4 text-center text-xl font-bold text-amber-50 shadow-md"
                >
                    <h1
                        class="w-fit bg-gradient-to-r from-[#36B7FF] to-[#DE7CC8] bg-clip-text p-3 text-center text-4xl font-bold tracking-tight text-transparent sm:text-5xl xl:text-6xl"
                    >
                        Globalify Presentation Tools
                    </h1>
                </div>
                <div class="mx-auto mt-[50px] w-full cursor-pointer rounded-lg border">
                    <label for="pdf-upload" class="cursor-pointer">
                        <div
                            class="m-5 rounded-md border-2 border-dashed p-10"
                            :class="fileData ? 'bg-green-50' : 'bg-blue-50'"
                            :style="fileData ? 'border-color: rgb(34 197 94)' : 'border-color: rgb(0 67 206)'"
                        >
                            <div class="flex flex-col items-center justify-center">
                                <div v-if="fileData" class="mb-2 text-gray-700">
                                    <span
                                        class="font-bold text-green-700"
                                        v-text="'Selected File: ' + fileData.filename"
                                    ></span>
                                </div>
                                <input type="hidden" id="csrf_token" name="csrf_token" value="{{ csrf_token() }}" />
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    viewBox="0 -960 960 960"
                                    class="size-12"
                                    :fill="fileData ? 'rgb(34 197 94)' : 'rgb(0 67 206)'"
                                >
                                    <path
                                        d="M260-160q-91 0-155.5-63T40-377q0-78 47-139t123-78q25-92 100-149t170-57q117 0 198.5 81.5T760-520q69 8 114.5 59.5T920-340q0 75-52.5 127.5T740-160H520q-33 0-56.5-23.5T440-240v-206l-64 62-56-56 160-160 160 160-56 56-64-62v206h220q42 0 71-29t29-71q0-42-29-71t-71-29h-60v-80q0-83-58.5-141.5T480-720q-83 0-141.5 58.5T280-520h-20q-58 0-99 41t-41 99q0 58 41 99t99 41h100v80H260Zm220-280Z"
                                    />
                                </svg>
                                <span
                                    class="cursor-pointer text-lg underline"
                                    :style="fileData ? 'color: rgb(34 197 94)' : 'color: rgb(0 67 206)'"
                                >
                                    Select a file to upload
                                </span>
                                <input
                                    id="pdf-upload"
                                    type="file"
                                    class="hidden"
                                    accept=".pdf"
                                    @change="handleFileUpload"
                                />
                                <span class="text-md text-gray-500">
                                    <sub>
                                        Supported formats: .txt, .docx, .odt, .epub, .pdf, .html, .htm, .tsv, .json,
                                        .xls, .xlsx
                                    </sub>
                                </span>
                                <button
                                    v-if="fileData"
                                    class="mt-4 cursor-pointer rounded-lg bg-green-500 px-4 py-2 font-bold text-white hover:bg-green-700"
                                    @click="analyzeFile"
                                >
                                    Analyze
                                </button>
                            </div>
                        </div>
                    </label>
                    <div class="flex flex-row gap-5">
                        <span>Audience</span>
                        <div class="flex gap-2"></div>
                    </div>
                </div>

                <!-- Loading Component (Place it here) -->
                <transition enter-active-class="animate-fade-in" leave-active-class="animate-fade-out">
                    <div v-if="isAnalyzing" class="fixed inset-0 z-50 flex items-center justify-center bg-white/90">
                        <div class="flex flex-col items-center">
                            <svg
                                class="h-10 w-10 animate-spin text-blue-500"
                                xmlns="http://www.w3.org/2000/svg"
                                fill="none"
                                viewBox="0 0 24 24"
                            >
                                <circle
                                    class="opacity-25"
                                    cx="12"
                                    cy="12"
                                    r="10"
                                    stroke="currentColor"
                                    stroke-width="4"
                                ></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                            </svg>
                            <p class="mt-3 text-lg font-semibold text-gray-700">Analyzing...</p>
                        </div>
                    </div>
                </transition>
            </main>
        </div>
    </body>
</html>
