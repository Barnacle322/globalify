steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - '--no-cache'
      - '-t'
      - >-
        $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
      - .
      - '-f'
      - Dockerfile
    id: Build
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - >-
        $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
    id: Push
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    args:
      - run
      - services
      - update
      - $_SERVICE_NAME
      - '--platform=managed'
      - >-
        --image=$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
      - >-
        --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID
      - '--region=$_DEPLOY_REGION'
      - '--quiet'
      - '--set-env-vars'
      - >-
        _DATABASE_URL=${_DATABASE_URL},
        _GOOGLE_OAUTH2_CLIENT_ID=${_GOOGLE_OAUTH2_CLIENT_ID},
        _GOOGLE_OAUTH2_CLIENT_SECRET=${_GOOGLE_OAUTH2_CLIENT_SECRET},
        _LINKEDIN_OAUTH2_CLIENT_ID=${_LINKEDIN_OAUTH2_CLIENT_ID},
        _LINKEDIN_OAUTH2_CLIENT_SECRET=${_LINKEDIN_OAUTH2_CLIENT_SECRET},
        _STRIPE_PUBLISHABLE_KEY=${_STRIPE_PUBLISHABLE_KEY},
        _STRIPE_SECRET_KEY=${_STRIPE_SECRET_KEY},
        _STRIPE_WEBHOOK_SECRET=${_STRIPE_WEBHOOK_SECRET},
        _SENDGRID_API_KEY=${_SENDGRID_API_KEY},
        _PUBSUB_TYPE=${_PUBSUB_TYPE},
        _PUBSUB_PROJECT_ID=${_PUBSUB_PROJECT_ID},
        _PUBSUB_PRIVATE_KEY_ID=${_PUBSUB_PRIVATE_KEY_ID},
        _PUBSUB_PRIVATE_KEY=${_PUBSUB_PRIVATE_KEY},
        _PUBSUB_CLIENT_EMAIL=${_PUBSUB_CLIENT_EMAIL},
        _PUBSUB_CLIENT_ID=${_PUBSUB_CLIENT_ID},
        _PUBSUB_AUTH_URI=${_PUBSUB_AUTH_URI},
        _PUBSUB_TOKEN_URI=${_PUBSUB_TOKEN_URI},
        _PUBSUB_AUTH_PROVIDER_X509_CERT_URL=${_PUBSUB_AUTH_PROVIDER_X509_CERT_URL},
        _PUBSUB_CLIENT_X509_CERT_URL=${_PUBSUB_CLIENT_X509_CERT_URL},
        _PUBSUB_UNIVERSE_DOMAIN=${_PUBSUB_UNIVERSE_DOMAIN},
    id: Deploy
    entrypoint: gcloud
images:
  - >-
    $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
options:
  substitutionOption: ALLOW_LOOSE
substitutions:
  _SERVICE_NAME: globalifyxyz
  _DEPLOY_REGION: europe-north1
  _AR_HOSTNAME: europe-north1-docker.pkg.dev
  _TRIGGER_ID: f78bc905-44d2-4d17-a8fd-de1e488491a2
  _PLATFORM: managed
tags:
  - gcp-cloud-build-deploy-cloud-run
  - gcp-cloud-build-deploy-cloud-run-managed
  - globalifyxyz
