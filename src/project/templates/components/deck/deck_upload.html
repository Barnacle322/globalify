{% macro render() %}
<template id="deck-upload-template">
    <article
        class="fixed top-0 right-0 z-50 flex h-full w-full flex-col bg-white p-8 sm:top-1/2 sm:right-1/2 sm:h-auto sm:max-w-2xl sm:translate-x-1/2 sm:-translate-y-1/2 sm:rounded-xl"
    >
        <deck-upload-component @analysis-complete="handleAnalysisComplete" />
        <div class="mx-auto w-full gap-4 rounded-t-lg border p-5">
            <label for="pdf-upload" class="cursor-pointer">
                <div class="mb-5 rounded-md border-2 border-dashed border-sky-500 bg-blue-50 p-10">
                    <div class="flex flex-col items-center justify-center">
                        <input type="hidden" id="csrf_token" name="csrf_token" value="{{ csrf_token() }}" />
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" class="size-12 fill-sky-500">
                            <path
                                d="M260-160q-91 0-155.5-63T40-377q0-78 47-139t123-78q25-92 100-149t170-57q117 0 198.5 81.5T760-520q69 8 114.5 59.5T920-340q0 75-52.5 127.5T740-160H520q-33 0-56.5-23.5T440-240v-206l-64 62-56-56 160-160 160 160-56 56-64-62v206h220q42 0 71-29t29-71q0-42-29-71t-71-29h-60v-80q0-83-58.5-141.5T480-720q-83 0-141.5 58.5T280-520h-20q-58 0-99 41t-41 99q0 58 41 99t99 41h100v80H260Zm220-280Z"
                            />
                        </svg>
                        <span class="cursor-pointer text-lg text-sky-500 underline hover:text-sky-700" v-if="!fileData">
                            Select a file to upload
                        </span>
                        <span
                            class="font-bold text-sky-700"
                            v-text="'Selected File: ' + fileData.filename"
                            v-else
                        ></span>
                        <input id="pdf-upload" type="file" class="hidden" accept=".pdf" @change="handleFileUpload" />
                        <span class="text-md text-gray-500">
                            <sub>
                                Supported formats: .txt, .docx, .odt, .epub, .pdf, .html, .htm, .tsv, .json, .xls, .xlsx
                            </sub>
                        </span>
                    </div>
                </div>
            </label>

            <!-- Audience, Formality, Domain selections remain unchanged -->
            <deck-analysis-component
                v-if="fileData"
                :deck-id="uploadedDeckId"
                :file="fileData"
                @analyze="handleFileAnalyze"
            />
        </div>

        <!-- Loading Component -->
        <transition enter-active-class="animate-fade-in" leave-active-class="animate-fade-out">
            <div v-if="isAnalyzing" class="fixed inset-0 z-50 flex items-center justify-center bg-white/90">
                <div class="flex flex-col items-center">
                    <svg
                        class="h-10 w-10 animate-spin text-blue-500"
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                    >
                        <circle
                            class="opacity-25"
                            cx="12"
                            cy="12"
                            r="10"
                            stroke="currentColor"
                            stroke-width="4"
                        ></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                    </svg>
                    <p class="mt-3 text-lg font-semibold text-gray-700">Analyzing...</p>
                </div>
            </div>
        </transition>
    </article>
</template>
{% endmacro %}
