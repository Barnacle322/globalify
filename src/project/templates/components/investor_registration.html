{% macro render() %}
<template id="investor-registration-template">
    <div class="mx-auto flex w-full max-w-xl flex-col gap-9 fixed">
        <h1 class="text-4xl">Investor Account Application</h1>
        <div class="flex flex-col border rounded-lg p-4 gap-1">
            <h2>Welcome!</h2>
            <p class="text-sm text-gray-500">
                We are excited to have you join our platform. Please fill out the following information to get started.
            </p>
            <button class="bg-black text-white rounded-md w-fit px-3 py-2 mt-4 hover" @click="openRegistrationPage">
                Start Application
            </button>
        </div>
    </div>
</template>
{% endmacro %}
