{% macro render() %}
<template id="deck-summary-template">
    <article
        class="fixed top-0 right-0 z-50 flex h-full w-full flex-col bg-white sm:top-1/2 sm:right-1/2 sm:h-auto sm:max-w-2xl sm:translate-x-1/2 sm:-translate-y-1/2 sm:rounded-xl"
    >
        <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl flex flex-col">
            <div class="flex justify-center items-center p-4 sm:p-5 border-b border-gray-200 flex-shrink-0">
                <div class="flex items-center gap-3">
                    <svg
                        class="text-sky-500 size-12"
                        fill="currentColor"
                        viewBox="0 0 512.00 512.00"
                        stroke-width="1.5"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M10.5 6a7.5 7.5 0 1 0 7.5 7.5h-7.5V6Z"
                        />
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M13.5 10.5H21A7.5 7.5 0 0 0 13.5 3v7.5Z"
                        />
                    </svg>
                    <h2 class="text-lg sm:text-xl font-semibold text-gray-800 text-center">Deck Summary</h2>
                </div>
                <button
                    @click="closeSummary"
                    class="absolute right-4 text-gray-400 hover:text-gray-600 transition-colors p-1 -mr-1 cursor-pointer"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="w-6 h-6"
                    >
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="p-5 sm:p-6 overflow-y-auto">
                <div v-if="isLoading" class="text-center py-10">
                    <div
                        class="inline-block animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-sky-500"
                    ></div>
                    <p class="mt-2 text-gray-500">Loading summary...</p>
                </div>

                <div v-else-if="summaryData" class="space-y-6">
                    <div>
                        <h3 class="text-base sm:text-lg font-semibold text-gray-800 mb-2">Recommendation</h3>
                        <p
                            class="text-sm sm:text-base text-gray-700 leading-relaxed"
                            v-text="summaryData.recommendation || 'No recommendation provided.'"
                        ></p>
                    </div>

                    <div class="space-y-4">
                        <h3 class="text-base sm:text-lg font-semibold text-gray-800 mb-3">Detailed Scores</h3>
                        <div
                            v-for="(item, index) in scoreItems"
                            :key="item.key"
                            class="score-item"
                            :style="{ '--delay-index': index }"
                        >
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-sm font-medium text-gray-600" v-text="item.label"></span>
                                <span
                                    class="text-sm font-bold tabular-nums"
                                    v-text="formatScore(summaryData[item.key])"
                                >
                                </span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-1.5 overflow-hidden">
                                <div
                                    class="progress-bar-fill h-1.5 rounded-full transition-[width] duration-500 ease-out"
                                    :class="getScoreBgColorClass(summaryData[item.key])"
                                    :style="[
                                        getScoreWidthStyle(summaryData[item.key]),
                                        { transitionDelay: `calc(var(--delay-index) * 100ms)` }
                                     ]"
                                ></div>
                            </div>
                        </div>
                        <div
                            class="score-item pt-4 mt-5 pb-3 border-t border-gray-200"
                            :style="{ '--delay-index': scoreItems.length }"
                        >
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-s font-bold text-gray-700">Overall Score</span>
                                <span
                                    class="text-s font-bold tabular-nums"
                                    :class="getScoreTextColorClass(summaryData.overall_score)"
                                    v-text="formatOverallScore(summaryData.overall_score)"
                                >
                                </span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2 overflow-hidden">
                                <div
                                    class="progress-bar-fill h-2 rounded-full transition-[width] duration-500 ease-out"
                                    :class="getScoreBgColorClass(summaryData.overall_score)"
                                    :style="[
                                        getScoreWidthStyle(summaryData.overall_score),
                                        { transitionDelay: `calc(var(--delay-index) * 200ms)` }
                                     ]"
                                ></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </article>
</template>
{% endmacro %}
