{% macro render(user) %}
<!-- prettier-ignore -->
{% import "components/aside.html" as aside %} 
{{ aside.render(user if user else None) }}

<template id="navbar-template">
    <header class="sticky top-0 z-50 w-full bg-white">
        <nav class="mx-auto grid h-20 w-full max-w-8xl grid-cols-2 items-center border-b px-4 sm:grid-cols-2 lg:px-6">
            <div class="flex items-center gap-4">
                <button @click="expandAside" class="w-fit text-lg font-medium">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="block size-5"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
                        />
                    </svg>
                </button>
                <a href="/search" class="relative flex items-center gap-1">
                    <img class="hidden h-6 lg:block" src="/static/elements/logo-black.png" alt="" />
                    <div
                        class="hidden h-fit w-fit rounded-full bg-sky-500 px-1 py-1 text-[8px] font-medium leading-none tracking-tight text-white lg:block"
                    >
                        BETA
                    </div>
                </a>
            </div>
            {% if user %}

            <!-- <div class="relative hidden w-full max-w-5xl justify-self-center sm:block">
                <div id="searchbox" class="peer"></div>
                <div
                    id="hits"
                    class="pointer-events-none absolute left-1/2 top-10 w-full -translate-x-1/2 opacity-0 transition-opacity ease-in-out hover:pointer-events-auto hover:opacity-100 peer-has-[:focus]:pointer-events-auto peer-has-[:focus]:opacity-100"
                ></div>
            </div> -->
            <div class="flex gap-5 justify-self-end">
                {% if user.is_authenticated %}
                <div class="flex items-center justify-center gap-4">
                    <div class="flex items-center justify-center gap-2">
                        <div class="relative">
                            <transition enter-active-class="animate-zoom-in" leave-active-class="animate-zoom-out">
                                <notification-component
                                    v-if="notificationsOpened"
                                    ref="notifications"
                                    @all-notifications-read="handleAllNotificationsRead"
                                    @closenotifications="notificationsOpened = false"
                                ></notification-component>
                            </transition>
                            <button
                                @click="notificationsOpened ? closeNotifications() : openNotifications()"
                                class="flex"
                            >
                                <div class="relative inline-block">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        fill="none"
                                        viewBox="0 0 24 24"
                                        stroke-width="1.5"
                                        stroke="currentColor"
                                        class="size-6"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"
                                        />
                                    </svg>
                                    <span v-if="unreadNotifications" class="absolute right-0 top-0 flex size-2">
                                        <span
                                            class="absolute inline-flex h-full w-full animate-ping rounded-full bg-sky-400 opacity-75"
                                        ></span>
                                        <span class="relative inline-flex size-2 rounded-full bg-sky-500"></span>
                                    </span>
                                </div>
                            </button>
                        </div>

                        <div class="relative">
                            <transition enter-active-class="animate-zoom-in" leave-active-class="animate-zoom-out">
                                <bookmark
                                    v-if="bookmarksOpened"
                                    ref="bookmark"
                                    @closebookmarks="bookmarksOpened = false"
                                    @investor-bookmarked="handleBookmark($event, 'investor')"
                                    @firm-bookmarked="handleBookmark($event, 'firm')"
                                    @company-bookmarked="handleBookmark($event, 'company')"
                                ></bookmark>
                            </transition>
                            <button @click="bookmarksOpened ? closeBookmark() : openBookmark()" class="flex">
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                    class="size-6"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z"
                                    />
                                </svg>
                            </button>
                        </div>
                    </div>
                    {% if user.user_info.picture_url %}
                    <img
                        src="{{ user.user_info.picture_url }}"
                        class="size-8 rounded-full border border-gray-200 bg-gray-50"
                    />
                    {% else %}
                    <img
                        src="/static/elements/pfp_placeholder.jpeg"
                        class="size-8 rounded-full border border-gray-200 bg-gray-50"
                    />
                    {% endif %} {% else %}
                    <a
                        href="/login"
                        class="hidden min-w-max items-center justify-center gap-2 rounded-full bg-sky-500 w-24 py-2 text-sm text-white transition-colors ease-in-out hover:bg-sky-400 sm:flex"
                    >
                        <div class="flex size-6 items-center justify-center rounded-full bg-white text-slate-900">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                fill="none"
                                viewBox="0 0 24 24"
                                stroke-width="1.5"
                                stroke="currentColor"
                                class="size-3"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"
                                />
                            </svg>
                        </div>
                        Login
                    </a>
                    {% endif %}
                </div>
            </div>
            {% endif %}
        </nav>
    </header>
</template>
{% endmacro %}
