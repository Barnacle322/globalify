<!DOCTYPE html>
<html lang="en" class="h-full">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="stylesheet" href="../static/css/main.css" />
        <title>Login</title>
    </head>
    <body class="flex h-full w-full flex-row items-center justify-between bg-black text-white overflow-hidden">
        <nav class="absolute left-0 top-0 flex h-24 w-full items-center justify-start px-9">
            <a href="/"><img class="h-[30px] w-[113px]" src="../static/elements/globalify.png" /></a>
        </nav>
        <main class="px-16 inline-flex sm:w-1/2 w-full">
            <form action="/login" method="POST" class="flex w-[313px] flex-col gap-[25px] font-medium">
                <div class="">
                    <div class="text-4xl">Welcome back</div>
                    <div class="text-4xl">{{ status }}</div>
                    <div class="">
                        <span class="text-sm">No account? Click </span><a href="/register" class="text-class underline">here</a
                        ><span class="text-class"> to sign up</span>
                    </div>
                </div>
                <div class="flex w-full flex-col gap-[7px]">
                    <div class="text-base">Email</div>
                    <input
                        id="email"
                        name="email"
                        type="email"
                        class="h-9 w-full rounded border-2 border-stone-300 bg-black px-2"
                        required
                    />
                </div>
                <div class="flex w-full flex-col gap-[7px]">
                    <div class="text-base">Password</div>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        class="h-9 w-full rounded border-2 border-stone-300 bg-black px-2"
                        required
                    />
                </div>
                <button
                    type="submit"
                    class="inline-flex h-8 w-full items-center justify-center rounded bg-sky-400 hover:bg-sky-500"
                >
                    <div class="text-base">Sign in</div>
                </button>
                <div class="w-full text-center text-sm">Or continue with</div>
                <div class="gap-2">
                    <div class="inline-flex h-[30px] w-full gap-4 text-base">
                        <a href ="" class="flex w-full items-center justify-center gap-1 rounded bg-white">
                            <img src="../static/elements/apple.svg" alt="" />
                            <div class="text-black">Apple</div>
                        </a>
                        <a href="" class="flex w-full items-center justify-center gap-1 rounded bg-white">
                            <img src="../static/elements/google.svg" alt="" />
                            <div class="text-black">Google</div>
                        </a>
                    </div>
                    <div class="text-xs text-stone-300 my-2">
                        <span>By signing in, you agree to </span><span class="underline">Terms of Service</span
                        ><span> and </span><span class="underline">Privacy Policy</span>
                    </div>
                </div>
            </form>
        </main>
        <div class="sm:block hidden w-1/2 h-full mt-48 bg-white rounded-tl-3xl overflow-hidden">
            <img class="w-full h-full object-cover" src="../static/elements/login_stock.png" alt="">
        </div>
    </body>
</html>
