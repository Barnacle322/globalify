{% macro render() %}
<script type="text/x-template" id="logo-cloud-component-template">
    <div class="mx-auto mt-4 flex h-full w-full max-w-xl flex-col justify-center gap-9 overflow-y-auto">
        <div class="flex flex-col gap-2">
            <h1 class="text-4xl font-medium">Step 2 of 8: Logo Cloud</h1>
            <span>Add optional logo cloud information.</span>
        </div>
        <div class="grid grid-cols-2 gap-x-4 gap-y-6">
            <div class="flex items-center">
                <label for="logo_cloud_title" class="text-sm font-medium text-gray-700">Logo Cloud Title</label>
            </div>
            <div>
                <input
                    class="w-full rounded-lg border border-black bg-white p-2"
                    v-model="formData.logo_cloud_title"
                    type="text"
                    id="logo_cloud_title"
                    placeholder="Title for logo showcase (e.g., 'Trusted by Top Brands')"
                />
            </div>
            <div class="flex items-center">
                <label for="cloud_logos" class="text-sm font-medium text-gray-700">Cloud Logos (PNG)</label>
            </div>
            <div>
                <input
                    class="w-full rounded-lg border border-black bg-white p-2"
                    @change="handleCloudLogosUpload"
                    type="file"
                    id="cloud_logos"
                    ref="cloudLogosInput"
                    multiple
                    accept="image/png"
                />
                <div class="mt-2 grid grid-cols-3 gap-2" v-if="formData.cloud_logos.length > 0">
                    <div v-for="(logo, index) in formData.cloud_logos" :key="logo.id || 'new-' + index" class="relative">
                        <img :src="logo.preview" class="h-24 w-full rounded-md object-cover" />
                        <button
                            @click="removeCloudLogo(index)"
                            class="absolute right-1 top-1 rounded-full bg-red-500 p-1 text-white"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="flex justify-between">
            <button
                class="mt-4 w-fit rounded-md bg-gray-300 px-3 py-2 text-black transition-colors ease-in-out hover:bg-gray-200"
                @click="previousPage"
            >
                <div class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                    </svg>
                    <span>Back</span>
                </div>
            </button>
            <button class="bg-deep-purple mt-4 w-fit rounded-md px-3 py-2 text-white hover:scale-102" @click="nextPage">
                <div class="flex items-center gap-2">
                    <span>Continue</span>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
                    </svg>
                </div>
            </button>
        </div>
    </div>
</script>
{% endmacro %}
