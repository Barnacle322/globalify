{% extends "layouts/layout_clean.html" %} {% block additional_scripts%}
<script src="/static/scripts/onboarding.js" defer></script>
<script src="/static/scripts/idempotency.js" defer></script>
{% endblock %} {% block title %}Onboarding{% endblock %} {% block head %} {{ super() }} {% endblock %} {% block content
%}
<main class="flex flex-col items-center justify-center overflow-x-hidden p-6 h-full">
    <form action="/onboarding" method="POST" class="max-w-md">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <h1 class="mb-4 text-3xl font-semibold text-center text-gray-900">We just need some more info</h1>
        <div class="mt-10 grid grid-cols-1 gap-x-6 gap-y-8 sm:grid-cols-6">
            <div class="sm:col-span-3">
                <label for="first_name" class="block text-sm font-medium leading-6 text-gray-900">First name*</label>
                <div class="mt-2">
                    <input
                        type="text"
                        name="first_name"
                        id="first_name"
                        autocomplete="given-name"
                        value="{{ user_info.first_name if user_info.first_name else ''}}"
                        required
                        class="h-12 w-full rounded-xl border border-stone-300 bg-transparent px-2"
                    />
                </div>
            </div>
            <div class="sm:col-span-3">
                <label for="last_name" class="block text-sm font-medium leading-6 text-gray-900">Last name*</label>
                <div class="mt-2">
                    <input
                        type="text"
                        name="last_name"
                        id="last_name"
                        autocomplete="family-name"
                        value="{{ user_info.last_name if user_info.last_name else ''}}"
                        required
                        class="h-12 w-full rounded-xl border border-stone-300 bg-transparent px-2"
                    />
                </div>
            </div>
            <div class="sm:col-span-4">
                <label for="username" class="block text-sm font-medium leading-6 text-gray-900">Username*</label>
                <div class="mt-2">
                    <span class="absolute hidden h-12 select-none items-center pl-3 text-gray-500 sm:flex">
                        globalify.com/user/
                    </span>
                    <input
                        type="text"
                        name="username"
                        id="username"
                        autocomplete="username"
                        pattern="[a-zA-Z0-9_]{3,20}"
                        class="h-12 w-full rounded-xl border border-stone-300 bg-transparent px-2 sm:pl-[168px]"
                        minlength="4"
                        placeholder="janesmith"
                        required
                    />
                </div>
            </div>
            <div class="sm:col-span-6">
                <label for="company_name" class="block text-sm font-medium leading-6 text-gray-900"
                    >Company name*</label
                >
                <div class="mt-2">
                    <input
                        type="text"
                        name="company_name"
                        id="company_name"
                        required
                        class="h-12 w-full rounded-xl border border-stone-300 bg-transparent px-2"
                    />
                </div>
            </div>
            <button
                type="submit"
                class="sm:col-span-6 inline-flex h-12 items-center justify-center rounded-xl bg-sky-500 px-4 text-white transition-colors ease-in-out hover:bg-sky-400"
            >
                Next
            </button>
        </div>
    </form>
</main>
{% endblock %}
