{% macro render() %}
<script type="text/x-template" id="fourth-stage-template">
    <div class="mx-auto mt-4 flex h-full w-full max-w-xl flex-col justify-center gap-9 overflow-y-auto">
        <!-- Hidden Inputs -->
        <div>
            <input type="hidden" v-model="formData.id" />
            <input type="hidden" v-model="formData.company_id" />
        </div>

        <!-- Header Section -->
        <div class="flex flex-col gap-2">
            <h1 class="text-4xl font-medium">Step 4 of 7: Mission</h1>
            <span>Add optional mission information.</span>
        </div>

        <!-- Input Fields -->
        <div class="grid grid-cols-2 gap-x-4 gap-y-6">
            <!-- Mission Title -->
            <div class="flex items-center">
                <label for="mission_title" class="text-sm font-medium text-gray-700">Mission Title</label>
            </div>
            <div>
                <input
                    class="w-full rounded-lg border border-black bg-white p-2"
                    v-model="formData.mission_title"
                    type="text"
                    id="mission_title"
                    placeholder="What drives your company? (e.g., 'Our Commitment to Excellence')"
                />
            </div>

            <!-- Mission Statement -->
            <div class="flex items-center">
                <label for="mission_statement" class="text-sm font-medium text-gray-700">Mission Statement</label>
            </div>
            <div>
                <textarea
                    class="w-full rounded-lg border border-black bg-white p-2"
                    v-model="formData.mission_statement"
                    id="mission_statement"
                    placeholder="Your company's purpose in 1-2 sentences (e.g., 'We exist to simplify technology')"
                    rows="3"
                ></textarea>
            </div>
        </div>

        <!-- Navigation -->
        <div class="flex justify-between">
            <button
                class="mt-4 w-fit rounded-md bg-gray-300 px-3 py-2 text-black transition-colors ease-in-out hover:bg-gray-200"
                @click="previousPage"
            >
                <div class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                    </svg>
                    <span>Back</span>
                </div>
            </button>
            <button class="bg-deep-purple mt-4 w-fit rounded-md px-3 py-2 text-white hover:scale-102" @click="nextPage">
                <div class="flex items-center gap-2">
                    <span>Continue</span>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
                    </svg>
                </div>
            </button>
        </div>
    </div>
</script>
{% endmacro %}
