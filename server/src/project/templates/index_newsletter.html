<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Primary Meta Tags -->
        <meta name="title" content="Globalify — Connect to the whole world of investment" />
        <meta
            name="description"
            content="Join Globalify on a mission to help entrepreneurs expand their business around the world!"
        />

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://globalify.xyz/" />
        <meta property="og:title" content="Globalify — Connect to the whole world of investment" />
        <meta
            property="og:description"
            content="Join Globalify on a mission to help entrepreneurs expand their business around the world!"
        />
        <!-- <meta property="og:image" content="https://metatags.io/images/meta-tags.png" /> -->

        <!-- Twitter -->
        <meta property="twitter:card" content="summary_large_image" />
        <meta property="twitter:url" content="https://globalify.xyz/" />
        <meta property="twitter:title" content="Globalify — Connect to the whole world of investment" />
        <meta
            property="twitter:description"
            content="Join Globalify on a mission to help entrepreneurs expand their business around the world!"
        />
        <!-- <meta property="twitter:image" content="https://metatags.io/images/meta-tags.png" /> -->

        <!-- Meta Tags Generated with https://metatags.io -->

        <link rel="stylesheet" href="../static/css/main.css" />

        <script src="../static/scripts/newsletter.js" defer></script>
        <title>Globalify — Connect to the whole world of investment</title>
    </head>
    <body class="h-full w-full bg-black text-white">
        <nav class="absolute left-0 top-0 flex h-24 w-full items-center justify-between px-9">
            <img class="h-[30px] w-[113px]" src="../static/elements/globalify.png" />
        </nav>
        <main class="relative mt-24 flex w-full flex-col justify-center overflow-x-hidden overflow-y-hidden text-white">
            <div class="flex flex-col items-center justify-center gap-6">
                <div class="max-w-[700px] px-4 text-center text-6xl sm:text-8xl">Connect globally with Globalify</div>
                <div class="flex max-w-[700px] px-4 text-center text-lg text-stone-300 sm:text-2xl">
                    Search for investors from all around the world on Globalify
                </div>
            </div>
            <div class="mt-20 flex flex-col items-center justify-center gap-10 lg:mt-60 lg:flex-row">
                <div class="relative inline-flex flex-col items-start justify-center px-4">
                    <div class="min-w-[300px] max-w-[400px] text-5xl font-medium text-white">
                        Get notified when we’re launching
                    </div>
                    <div class="absolute left-[340px] top-[55px] animate-flyoff text-4xl">
                        <div class="absolute -right-[15px] top-6 rotate-[135deg] animate-fadeoff">💨</div>
                        <div class="absolute animate-wiggle">🚀</div>
                    </div>
                    <div class="min-w-[300px] text-base font-normal text-stone-300 sm:text-xl">
                        Be the first to know when Globalify can help you with your ventures!
                    </div>
                </div>
                <form id="form" class="flex w-full max-w-[450px] justify-end gap-2 px-4">
                    <input
                        id="email"
                        name="email"
                        type="email"
                        autocomplete="email"
                        required
                        class="flex h-9 w-full animate-pulse rounded border-2 border-stone-300 bg-black px-2"
                        placeholder="Enter your email"
                    />
                    <button
                        type="submit"
                        id="submit-button"
                        class="flex h-9 w-[97px] flex-col items-end justify-center rounded-md bg-sky-400 px-4 transition-all duration-1000 ease-in-out"
                    >
                        <div class="text-base font-medium">Subscribe</div>
                    </button>
                </form>
            </div>
        </main>
    </body>
</html>
